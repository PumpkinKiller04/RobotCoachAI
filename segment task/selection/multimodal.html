<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多模态体验站</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#ffffff;--fg:#333333;--card:#fafafa;--border:#e0e0e0;
      --primary:#4a90d9;--primary-fg:#ffffff;
      --muted:#f5f5f5;--muted-fg:#888888;
      --success:#52c41a;--warning:#faad14;--danger:#ff4d4f;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;padding:.75rem}
    .container{max-width:100%;margin:0 auto}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.5rem 1.25rem;border-radius:.375rem;font-weight:500;cursor:pointer;border:none;transition:all .2s;font-size:.875rem}
    .btn-primary{background:var(--primary);color:var(--primary-fg);box-shadow:0 2px 8px rgba(74,144,217,0.3)}
    .btn-primary:hover{background:#3a7fc5;box-shadow:0 4px 12px rgba(74,144,217,0.4)}
    .btn-outline{border:1px solid var(--border);background:var(--bg);color:var(--fg)}
    .btn-outline:hover{border-color:var(--primary);color:var(--primary);background:rgba(74,144,217,0.05)}
    .card{background:var(--card);border:1px solid var(--border);border-radius:.75rem;overflow:hidden;margin-bottom:.75rem}
    .card-body{padding:1rem}
    .text-sm{font-size:.875rem}.text-xs{font-size:.75rem}.font-medium{font-weight:500}.font-semibold{font-weight:600}
    .text-muted{color:var(--muted-fg)}
    .w-full{width:100%}
    .source-split{display:flex;gap:.75rem}
    .source-split>*{flex:1;min-width:0}
    .source-panel{border:2px solid var(--border);border-radius:.5rem;padding:.75rem;text-align:center;transition:all .2s;cursor:pointer;background:var(--bg);min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .source-panel:hover{border-color:var(--primary)}
    .source-panel.active{border-color:var(--success);background:rgba(82,196,26,0.04)}
    .source-panel .panel-icon{font-size:1.5rem;margin-bottom:.25rem}
    .source-panel .panel-title{font-size:.8rem;font-weight:600;margin-bottom:.375rem}
    .source-panel .panel-hint{font-size:.7rem;color:var(--muted-fg)}
    .source-panel img{max-width:100%;max-height:90px;object-fit:contain;border-radius:.375rem;margin-bottom:.375rem}
    .source-panel .check-mark{display:none;position:absolute;top:6px;right:8px;color:var(--success);font-size:.8rem;font-weight:700}
    .source-panel.active .check-mark{display:block}
    .source-panel{position:relative}
    .refresh-link{font-size:.7rem;color:var(--primary);cursor:pointer;text-decoration:underline;margin-top:.25rem}
    .refresh-link:hover{color:#3a7fc5}
    textarea{width:100%;min-height:5rem;padding:.625rem;border:1px solid var(--border);border-radius:.375rem;background:var(--bg);color:var(--fg);font-family:inherit;resize:vertical;font-size:.875rem;transition:border-color .2s}
    textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(74,144,217,0.15)}
    textarea::placeholder{color:var(--muted-fg)}
    .typing-cursor{animation:blink 1s infinite}@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .hidden{display:none!important}
    .response-area{min-height:5rem;padding:.75rem;background:var(--muted);border-radius:.375rem;font-size:.875rem;line-height:1.5}
    .loading-area{padding:.75rem;background:var(--muted);border-radius:.375rem}
    .chip{display:inline-flex;align-items:center;gap:.25rem;padding:.375rem .75rem;border-radius:9999px;font-size:.75rem;font-weight:500;border:1px solid var(--border);background:var(--bg);margin-bottom:.375rem;transition:all .2s}
    .chip:hover{border-color:var(--primary);color:var(--primary)}
    .section-title{display:flex;align-items:center;gap:.5rem;font-size:1rem;font-weight:600;color:var(--fg);margin-bottom:.75rem}
    @media (max-width:500px){
      .source-split{flex-direction:column}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-body">
        <div class="section-title">选择图片来源</div>
        <div class="source-split">
          <div id="uploadPanel" class="source-panel" onclick="activateUpload()">
            <span class="check-mark">&#10003;</span>
            <span class="panel-icon">&#128193;</span>
            <span class="panel-title">上传图片</span>
            <span class="panel-hint">点击此处选择本地图片</span>
            <div id="uploadPreview" class="hidden" style="margin-top:.375rem;"></div>
          </div>
          <div id="galleryPanel" class="source-panel" onclick="activateGallery()">
            <span class="check-mark">&#10003;</span>
            <span class="panel-icon">&#127912;</span>
            <span class="panel-title">使用示例图片</span>
            <img id="galleryImg" src="" alt="示例图片" style="display:none;">
            <span class="panel-hint" id="galleryHint">点击此处使用示例图片</span>
            <span class="refresh-link" id="refreshLink" style="display:none;" onclick="event.stopPropagation();shuffleGalleryImage();">换一张</span>
          </div>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileSelect(event)">
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <div class="section-title">向AI提问</div>
        <textarea id="questionInput" placeholder="例如：这张图片里有什么？" rows="2"></textarea>
        <div style="display:flex;flex-wrap:wrap;gap:.375rem;margin-top:.5rem">
          <span class="chip" onclick="setQuestion('这张图片里有什么？')">这张图片里有什么？</span>
          <span class="chip" onclick="setQuestion('描述一下这个场景')">描述一下这个场景</span>
          <span class="chip" onclick="setQuestion('有什么特别之处？')">有什么特别之处？</span>
        </div>
        <button id="submitBtn" class="btn btn-primary w-full" style="margin-top:.75rem" onclick="submitQuestion()">提交问题</button>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <div class="section-title">AI回答</div>
        <div id="responseArea" class="response-area">
          <p class="text-sm text-muted" id="responsePlaceholder">AI的回答将显示在这里...</p>
        </div>
        <div id="loadingArea" class="hidden loading-area">
          <p class="text-sm">AI正在思考中<span class="typing-cursor">...</span></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    var GALLERY_IMAGES = [
      '../../图例/0434490cca64ccd44183a5cdfe9e443c.jpg',
      '../../图例/10ca8b2d9886742d85ed098d1bce109c.jpg',
      '../../图例/2027f5c5504ee61c48457c06d0e0b458.jpg',
      '../../图例/2b4b7d36a54149db500f81e780eaf50b.jpg',
      '../../图例/356600dbe88984c12feb38d7c8bd608e.jpg',
      '../../图例/4181ed16213158eb0e5dc30f5e76161f.jpg',
      '../../图例/4ba0bc2e1a1b3ffec9d8f48ca1c1f264.jpg',
      '../../图例/4e31d5616457a79f4d840e3269529a7f.jpg',
      '../../图例/59d710e0a6a0d1cd4304fbfd41e696a8.jpg',
      '../../图例/74017363ffd2b1611243c9d83000323f.jpg',
      '../../图例/83023f864d9cc48bc4d9c57a28add95b.jpg',
      '../../图例/83f0b7258fd550563a19ffc07a6c4e89.jpg',
      '../../图例/b98859d8ca87595ff9b95cf7cbcaa54d.jpg',
      '../../图例/c72f2a03e05b421cd5186293e34caec1.jpg',
      '../../图例/e71060f965e577109afb726fbe0e5c50.jpg'
    ];

    var uploadedImage = null;

    function shuffleArray(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
      }
      return a;
    }

    function shuffleGalleryImage() {
      var shuffled = shuffleArray(GALLERY_IMAGES);
      var img = document.getElementById('galleryImg');
      img.src = shuffled[0];
    }

    function activateUpload() {
      document.getElementById('galleryPanel').classList.remove('active');
      document.getElementById('uploadPanel').classList.add('active');
      document.getElementById('fileInput').click();
    }

    function activateGallery() {
      var galleryPanel = document.getElementById('galleryPanel');
      var galleryImg = document.getElementById('galleryImg');

      // deselect upload
      document.getElementById('uploadPanel').classList.remove('active');
      document.getElementById('uploadPreview').classList.add('hidden');
      document.getElementById('uploadPreview').innerHTML = '';

      galleryPanel.classList.add('active');

      // 直接用图片 URL，不需要转 base64，零延迟
      if (galleryPanel.classList.contains('active')) {
        shuffleGalleryImage();
      }
      uploadedImage = galleryImg.src;
    }

    function handleFileSelect(e){
      var file = e.target.files[0];
      if (!file) return;
      // deselect gallery
      document.getElementById('galleryPanel').classList.remove('active');
      // select upload
      document.getElementById('uploadPanel').classList.add('active');
      loadUserImage(file);
    }

    function loadUserImage(file){
      var reader = new FileReader();
      reader.onload = function(ev){
        uploadedImage = ev.target.result;
        var preview = document.getElementById('uploadPreview');
        preview.innerHTML = '<img src="' + uploadedImage + '" style="max-width:100%;max-height:80px;object-fit:contain;border-radius:.375rem;">';
        preview.classList.remove('hidden');
      };
      reader.readAsDataURL(file);
    }

    function initGallery() {
      var img = document.getElementById('galleryImg');
      if (!img) return;
      shuffleGalleryImage();
      img.style.display = 'block';
      document.getElementById('galleryHint').style.display = 'none';
      document.getElementById('refreshLink').style.display = 'inline';
    }

    function setQuestion(q){document.getElementById('questionInput').value=q}

    function renderMarkdown(text) {
      var html = text;
      // bold
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // italic
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      // headings
      html = html.replace(/^### (.+)$/gm, '<h4 style="margin:.5rem 0 .25rem;font-size:.95rem">$1</h4>');
      html = html.replace(/^## (.+)$/gm, '<h3 style="margin:.6rem 0 .3rem;font-size:1rem">$1</h3>');
      html = html.replace(/^# (.+)$/gm, '<h3 style="margin:.6rem 0 .3rem;font-size:1.05rem">$1</h3>');
      // unordered list items
      html = html.replace(/^- (.+)$/gm, '<li style="margin-left:1.2rem">$1</li>');
      // ordered list items
      html = html.replace(/^\d+\. (.+)$/gm, '<li style="margin-left:1.2rem">$1</li>');
      // inline code
      html = html.replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,.06);padding:1px 4px;border-radius:3px;font-size:.85em">$1</code>');
      // blockquote
      html = html.replace(/^> (.+)$/gm, '<blockquote style="border-left:3px solid #ddd;margin:.4rem 0;padding:.2rem .6rem;color:#666">$1</blockquote>');
      // line breaks
      html = html.replace(/\n\n/g, '<br><br>');
      html = html.replace(/\n/g, '<br>');
      return html;
    }

    var API_CONFIG = {
      model: 'Pro/moonshotai/Kimi-K2.6'
    };

    async function submitQuestion(){
      var q = document.getElementById('questionInput').value.trim();
      if(!q) return;

      var responseArea = document.getElementById('responseArea');
      var loadingArea = document.getElementById('loadingArea');
      var submitBtn = document.getElementById('submitBtn');

      responseArea.innerHTML = '<p class="text-sm" id="responseText"></p>';
      var placeholder = document.getElementById('responsePlaceholder');
      if (placeholder) placeholder.remove();
      loadingArea.classList.remove('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = '思考中...';

      try {
        var content;
        if (uploadedImage) {
          content = [
            { type: 'text', text: q },
            { type: 'image_url', image_url: { url: uploadedImage } }
          ];
        } else {
          content = q;
        }

        var response = await fetch('/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: API_CONFIG.model,
            messages: [{ role: 'user', content: content }],
            stream: true,
            temperature: 0.1,
            max_tokens: 200,
            top_p: 0.7
          })
        });

        if (!response.ok) {
          var errorData = await response.json().catch(function() { return null; });
          throw new Error('请求失败: ' + response.status + ' - ' + (errorData && errorData.error ? errorData.error.message : response.statusText));
        }

        var reader = response.body.getReader();
        var decoder = new TextDecoder();
        var textEl = document.getElementById('responseText');
        var fullText = '';
        var MAX_LENGTH = 150;

        loadingArea.classList.add('hidden');

        while (true) {
          var result = await reader.read();
          if (result.done) break;

          var chunk = decoder.decode(result.value);
          var lines = chunk.split('\n');

          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            if (line.startsWith('data: ')) {
              var data = line.slice(6);
              if (data === '[DONE]') continue;

              try {
                var json = JSON.parse(data);
                var delta = json.choices && json.choices[0] && json.choices[0].delta && json.choices[0].delta.content;
                if (delta) {
                  if (fullText.length < MAX_LENGTH) {
                    var remaining = MAX_LENGTH - fullText.length;
                    var addText = delta.slice(0, remaining);
                    fullText += addText;
                    textEl.innerHTML = renderMarkdown(fullText);
                  }
                }
              } catch (e) {
                console.warn('解析响应失败:', e);
              }
            }
          }
        }

        if (!fullText) {
          textEl.innerHTML = 'AI未返回有效响应，请重试。';
          textEl.classList.add('text-muted');
        }

      } catch (error) {
        console.error('API调用失败:', error);
        loadingArea.classList.add('hidden');
        var textEl = document.getElementById('responseText') || document.createElement('p');
        textEl.innerHTML = '请求失败: ' + error.message + '。请检查网络连接后重试。';
        textEl.classList.add('text-muted');
        if (!document.getElementById('responseText')) {
          responseArea.innerHTML = '';
          responseArea.appendChild(textEl);
        }
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '提交问题';
      }
    }

    initGallery();
  </script>
</body>
</html>
