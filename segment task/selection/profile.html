<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>选手档案 - 赛道试跑区</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#f8fafc;--fg:#0f172a;--card:#fff;--border:#e2e8f0;
      --primary:#3b82f6;--primary-fg:#fff;
      --muted:#f1f5f9;--muted-fg:#64748b;
      --success:#22c55e;--warning:#f59e0b;--danger:#ef4444;
    }
    @media(prefers-color-scheme:dark){
      :root{
        --bg:#0f172a;--fg:#f8fafc;--card:#1e293b;--border:#334155;
        --muted:#1e293b;--muted-fg:#94a3b8;
      }
    }
    body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh}
    .container{max-width:1200px;margin:0 auto;padding:.25rem}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.625rem 1.25rem;border-radius:.5rem;font-weight:500;cursor:pointer;border:none;transition:all .2s}
    .btn-primary{background:var(--primary);color:var(--primary-fg)}
    .btn-primary:hover{opacity:.9}
    .btn-outline{border:1px solid var(--border);background:var(--card)}
    .card{background:var(--card);border:1px solid var(--border);border-radius:.75rem;overflow:hidden}
    .card-body{padding:.5rem}
    .text-sm{font-size:.875rem}.text-xs{font-size:.75rem}.font-medium{font-weight:500}.font-semibold{font-weight:600}
    .text-muted{color:var(--muted-fg)}
    .grid{display:grid}.gap-4{gap:1rem}.gap-6{gap:1.5rem}
    .w-full{width:100%}
    header{position:sticky;top:0;z-index:50;background:var(--card);border-bottom:1px solid var(--border);backdrop-filter:blur(8px);display:none}
    header .container{display:flex;align-items:center;justify-content:space-between;height:4rem}
    .logo{display:flex;align-items:center;gap:.75rem}
    .logo-icon{width:2.5rem;height:2.5rem;background:linear-gradient(135deg,var(--primary),#8b5cf6);border-radius:.5rem;display:flex;align-items:center;justify-content:center}
    .tab-nav{display:flex;gap:.5rem;border-bottom:1px solid var(--border);background:var(--muted);padding:.5rem 1rem}
    .tab-btn{display:flex;align-items:center;gap:.5rem;padding:.75rem 1.5rem;background:transparent;border:none;cursor:pointer;font-size:.875rem;font-weight:500;color:var(--muted-fg);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
    .tab-btn.active{background:var(--card);color:var(--primary);border-bottom-color:var(--primary)}
    .tab-btn span{width:1.5rem;height:1.5rem;background:var(--primary);color:var(--primary-fg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700}
    .tab-content{padding:1.5rem 0}
    .tab-panel{display:none}.tab-panel.active{display:block}
    .progress{height:.5rem;background:var(--muted);border-radius:9999px;overflow:hidden}
    .progress-bar{height:100%;background:var(--primary);transition:width .3s}
    .flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
    .rounded-full{border-radius:9999px}.rounded-xl{border-radius:.75rem}.rounded-lg{border-radius:.5rem}
    .space-y-4>*{margin-bottom:.75rem}.space-y-6>*{margin-bottom:1.5rem}
    .aspect-video{aspect-ratio:16/9}.aspect-square{aspect-ratio:1}
    .robot-container{position:relative;width:100%;overflow:hidden;border:2px dashed var(--border);border-radius:.75rem;background:linear-gradient(to bottom,var(--muted),var(--card))}
    .robot-svg{width:100%;height:auto;display:block}
    .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(239,68,68,.3)}
    .sensor-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem}
    .sensor-item{display:flex;align-items:center;gap:.5rem;padding:.5rem;border-radius:.5rem}
    .sensor-dot{width:.75rem;height:.75rem;border-radius:50%}
    .pulse{animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .scan-line{position:absolute;left:0;right:0;height:4px;background:linear-gradient(to bottom,transparent,rgba(59,130,246,.5),transparent);animation:scan 2s linear infinite}
    @keyframes scan{0%{top:0}100%{top:100%}}
    .track-view{position:relative;border-radius:.75rem;overflow:hidden;border:1px solid var(--border)}
    .hotspot{position:absolute;width:2rem;height:2rem;background:var(--primary);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;animation:hotspot-pulse 2s infinite;transform:translate(-50%,-50%)}
    @keyframes hotspot-pulse{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.4)}50%{box-shadow:0 0 0 10px rgba(59,130,246,0)}}
    .hotspot.discovered{background:var(--success);animation:none}
    .popup{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
    .popup-content{background:var(--card);border-radius:.75rem;max-width:24rem;width:100%;padding:1.5rem}
    .upload-zone{border:2px dashed var(--muted-fg);border-radius:.75rem;padding:2rem;text-align:center;cursor:pointer;transition:all .2s}
    .upload-zone:hover{border-color:var(--primary);background:rgba(59,130,246,.05)}
    .upload-zone.has-image{border-color:var(--primary);border-style:solid}
    .upload-zone img{width:100%;height:100%;object-fit:contain;border-radius:.5rem}
    textarea{width:100%;min-height:6rem;padding:.75rem;border:1px solid var(--border);border-radius:.5rem;background:var(--card);color:var(--fg);font-family:inherit;resize:vertical}
    .app-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem}
    .app-card{padding:1.25rem;border-radius:.75rem;border:1px solid var(--border);background:var(--card);transition:all .2s}
    .app-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
    .drag-item{padding:1rem;border:1px solid var(--border);border-radius:.5rem;background:var(--card);cursor:grab;transition:all .2s;user-select:none}
    .drag-item:hover{background:var(--muted);transform:scale(1.02)}
    .drag-item.installed{opacity:.5;cursor:not-allowed}
    .drop-zone{padding:.5rem;border:2px dashed var(--border);border-radius:.5rem;min-height:3rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .drop-zone.hover{border-color:var(--primary);background:rgba(59,130,246,.1)}
    .glow-effect{position:relative}
    .glow-effect::after{content:'';position:absolute;inset:-10px;border-radius:50%;background:radial-gradient(circle,rgba(34,197,94,.3),transparent 70%);pointer-events:none}
    .badge{display:inline-flex;align-items:center;gap:.25rem;padding:.25rem .75rem;border-radius:9999px;font-size:.75rem;font-weight:500}
    .badge-blue{background:rgba(59,130,246,.1);color:#3b82f6}
    .badge-green{background:rgba(34,197,94,.1);color:#22c55e}
    .badge-purple{background:rgba(139,92,246,.1);color:#8b5cf6}
    .status-bar{height:1rem;background:var(--muted);border-radius:9999px;overflow:hidden}
    .status-fill{height:100%;background:linear-gradient(to right,var(--primary),#8b5cf6,var(--success));transition:width .5s}
    .typing-cursor{animation:blink 1s infinite}@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .fade-in{animation:fadeIn .3s}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .hidden{display:none!important}
    
    /* Markdown样式 */
    .markdown h1{font-size:1.5rem;font-weight:700;margin:1.25rem 0 .75rem;color:var(--fg)}
    .markdown h2{font-size:1.25rem;font-weight:600;margin:1rem 0 .5rem;color:var(--fg)}
    .markdown h3{font-size:1.125rem;font-weight:600;margin:.75rem 0 .5rem;color:var(--fg)}
    .markdown strong{font-weight:600;color:var(--fg)}
    .markdown em{font-style:italic}
    .markdown ul{list-style:disc;margin:.5rem 0 .5rem 1.5rem;padding-left:.5rem}
    .markdown ol{list-style:decimal;margin:.5rem 0 .5rem 1.5rem;padding-left:.5rem}
    .markdown li{margin:.25rem 0;padding-left:.25rem}
    .markdown code{background:var(--muted);padding:.25rem .5rem;border-radius:.25rem;font-family:monospace;font-size:.875rem}
    .markdown pre{background:#1e293b;color:#4ade80;padding:1rem;border-radius:.5rem;overflow-x:auto;font-family:monospace;font-size:.875rem;margin:.5rem 0}
    .markdown blockquote{border-left:4px solid var(--primary);padding:.5rem 1rem;margin:.5rem 0;background:rgba(59,130,246,.05);border-radius:0 .25rem .25rem 0}
    .markdown p{margin:.5rem 0}
  </style>
</head>
<body>
  <main class="container">
    <section id="profile">
      <div style="position:relative;margin-bottom:.25rem">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem" id="trackPanels">
          <div class="card">
            <div class="card-body" style="text-align:center">
              <h3 style="font-size:1rem;font-weight:600;margin-bottom:.25rem;color:#c0392b;font-size:.9rem">第一视角 · 机器人所见画面</h3>
              <canvas id="fpvCanvas" width="520" height="320" style="width:100%;height:auto;border-radius:.5rem;background:#000"></canvas>
              <button id="simBtn" class="btn btn-primary" style="padding:.75rem 2.5rem;font-size:1.05rem;font-weight:700;margin-top:.4rem">开始试跑</button>
              <p id="simStatus" style="margin-top:.25rem;font-size:.75rem;color:#64748b">点击按钮，观察初代机（仅摄像头）在赛道上的表现</p>
            </div>
          </div>
          <div class="card">
            <div class="card-body" style="text-align:center">
              <h3 style="font-size:1rem;font-weight:600;margin-bottom:.25rem;color:#c0392b;font-size:.9rem">第三视角 · 俯瞰赛道</h3>
              <canvas id="tpvCanvas" width="520" height="380" style="width:100%;height:auto;border-radius:.5rem;background:#000"></canvas>
            </div>
          </div>
        </div>
        <!-- 失败弹窗，覆盖在两个视角中间 -->
        <div id="failOverlay" class="hidden" style="position:absolute;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:50;border-radius:.75rem">
          <div style="background:var(--card);border-radius:1rem;padding:2.5rem 2rem;text-align:center;max-width:400px;width:90%;border:3px solid #ef4444;box-shadow:0 20px 60px rgba(239,68,68,.3);animation:fadeIn .3s">
            <div style="font-size:4rem;margin-bottom:.75rem">⚠️</div>
            <h3 style="color:#dc2626;font-weight:700;font-size:1.5rem;margin-bottom:.75rem">犯规出局！</h3>
            <p style="color:#64748b;line-height:1.8;font-size:.95rem;margin-bottom:.5rem">
              初代机在<strong style="color:#c0392b">直道</strong>上跑得很顺利
            </p>
            <p style="color:#64748b;line-height:1.8;font-size:.95rem;margin-bottom:.5rem">
              但快进入<strong style="color:#c0392b">弯道</strong>时<strong style="color:#dc2626">提前转弯</strong>，冲出了跑道
            </p>
            <p style="color:#94a3b8;line-height:1.7;font-size:.85rem;margin-bottom:1.5rem">
              原因：只靠摄像头一种传感器，无法准确判断弯道距离和自身位置，导致转向时机错误
            </p>
            <button onclick="resetSim()" class="btn btn-primary" style="min-width:120px">再看一次</button>
          </div>
        </div>
      </div>
    </section>
  </main>
  
  <script>
    // ========== Tab 1: 赛道试跑区 — 双视角Canvas动画 ==========
    const fpvCanvas = document.getElementById('fpvCanvas');
    const fpvCtx = fpvCanvas.getContext('2d');
    const tpvCanvas = document.getElementById('tpvCanvas');
    const tpvCtx = tpvCanvas.getContext('2d');
    const failOverlay = document.getElementById('failOverlay');
    const simBtn = document.getElementById('simBtn');
    const simStatus = document.getElementById('simStatus');

    // 标准操场跑道参数（横放：上下两条直道 + 左右两端半圆形弯道）
    const T = {
      cx: 260, cy: 190,          // 赛道中心
      leftX: 155,                 // 左弯道圆心 X
      rightX: 365,                // 右弯道圆心 X
      curveR: 90,                 // 弯道半径（中心线）
      halfW: 24,                  // 跑道半宽 (总宽48px)
      get outerTop()    { return this.cy - this.curveR - this.halfW; },   // 91
      get outerBottom() { return this.cy + this.curveR + this.halfW; },   // 289
      get innerTop()    { return this.cy - this.curveR + this.halfW; },   // 139
      get innerBottom() { return this.cy + this.curveR - this.halfW; },   // 241
      get outerR()      { return this.curveR + this.halfW; },              // 99
      get innerR()      { return this.curveR - this.halfW; }               // 51
    };

    let animState = 'idle';       // idle | straight | approaching | offtrack | done
    let robot = { x: 400, y: T.outerBottom - 22 };  // 起点：右下直道
    let fpvCurve = 0;             // 第一视角弯道弯曲程度
    let fpvOfftrack = 0;          // 偏离跑道程度
    let scrollOffset = 0;         // 第一视角跑道后退滚动
    let animFrame = 0;
    let animId = null;

    // 判断点是否在跑道上（横放标准操场）
    function isOnTrack(x, y) {
      if (x >= T.leftX && x <= T.rightX) {
        // 直道区域：检查 y 是否在上下直道范围内
        return (y >= T.outerTop && y <= T.innerTop) ||
               (y >= T.innerBottom && y <= T.outerBottom);
      } else if (x < T.leftX) {
        // 左弯道区域：检查到左弯道圆心的距离
        const dx = x - T.leftX, dy = y - T.cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        return dist >= T.innerR && dist <= T.outerR;
      } else {
        // 右弯道区域
        const dx = x - T.rightX, dy = y - T.cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        return dist >= T.innerR && dist <= T.outerR;
      }
    }

    // 绘制第三视角（横放标准操场俯瞰）
    function drawTPV() {
      const ctx = tpvCtx;
      const W = tpvCanvas.width, H = tpvCanvas.height;
      ctx.clearRect(0, 0, W, H);

      // 背景草地
      ctx.fillStyle = '#7cb342';
      ctx.fillRect(0, 0, W, H);

      // ===== 红色橡胶跑道（横放：上下直道 + 左右弯道）=====
      // 外轮廓（顺时针）
      ctx.beginPath();
      ctx.moveTo(T.leftX, T.outerTop);
      ctx.lineTo(T.rightX, T.outerTop);
      ctx.arc(T.rightX, T.cy, T.outerR, -Math.PI/2, Math.PI/2);
      ctx.lineTo(T.leftX, T.outerBottom);
      ctx.arc(T.leftX, T.cy, T.outerR, Math.PI/2, -Math.PI/2);
      ctx.closePath();
      // 内轮廓（逆时针挖空）
      ctx.moveTo(T.leftX, T.innerTop);
      ctx.lineTo(T.rightX, T.innerTop);
      ctx.arc(T.rightX, T.cy, T.innerR, -Math.PI/2, Math.PI/2, true);
      ctx.lineTo(T.leftX, T.innerBottom);
      ctx.arc(T.leftX, T.cy, T.innerR, Math.PI/2, -Math.PI/2, true);
      ctx.closePath();
      ctx.fillStyle = '#c0392b';
      ctx.fill('evenodd');

      // 跑道颗粒纹理
      ctx.fillStyle = 'rgba(180,60,40,0.2)';
      for (let i = 0; i < 220; i++) {
        let px, py;
        const sec = Math.random();
        if (sec < 0.4) {
          px = T.leftX + Math.random() * (T.rightX - T.leftX);
          py = T.outerTop + Math.random() * (T.innerTop - T.outerTop);
        } else if (sec < 0.8) {
          px = T.leftX + Math.random() * (T.rightX - T.leftX);
          py = T.innerBottom + Math.random() * (T.outerBottom - T.innerBottom);
        } else if (sec < 0.9) {
          const a = -Math.PI/2 + Math.random() * Math.PI;
          const r = T.innerR + Math.random() * (T.outerR - T.innerR);
          px = T.rightX + r * Math.cos(a); py = T.cy + r * Math.sin(a);
        } else {
          const a = Math.PI/2 + Math.random() * Math.PI;
          const r = T.innerR + Math.random() * (T.outerR - T.innerR);
          px = T.leftX + r * Math.cos(a); py = T.cy + r * Math.sin(a);
        }
        ctx.beginPath(); ctx.arc(px, py, 1.2, 0, Math.PI*2); ctx.fill();
      }

      // 跑道分道线（白色虚线）
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 1.2;
      ctx.setLineDash([6, 10]);
      for (let lane = 1; lane <= 3; lane++) {
        const t = lane / 4;
        const topY = T.outerTop + (T.innerTop - T.outerTop) * t;
        const btmY = T.innerBottom + (T.outerBottom - T.innerBottom) * t;
        const r = T.innerR + (T.outerR - T.innerR) * t;
        // 上直道
        ctx.beginPath(); ctx.moveTo(T.leftX, topY); ctx.lineTo(T.rightX, topY); ctx.stroke();
        // 下直道
        ctx.beginPath(); ctx.moveTo(T.leftX, btmY); ctx.lineTo(T.rightX, btmY); ctx.stroke();
        // 右弯道
        ctx.beginPath(); ctx.arc(T.rightX, T.cy, r, -Math.PI/2, Math.PI/2); ctx.stroke();
        // 左弯道
        ctx.beginPath(); ctx.arc(T.leftX, T.cy, r, Math.PI/2, -Math.PI/2); ctx.stroke();
      }
      ctx.setLineDash([]);

      // 跑道边缘白线
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(T.leftX, T.outerTop); ctx.lineTo(T.rightX, T.outerTop);
      ctx.arc(T.rightX, T.cy, T.outerR, -Math.PI/2, Math.PI/2);
      ctx.lineTo(T.leftX, T.outerBottom);
      ctx.arc(T.leftX, T.cy, T.outerR, Math.PI/2, -Math.PI/2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(T.leftX, T.innerTop); ctx.lineTo(T.rightX, T.innerTop);
      ctx.arc(T.rightX, T.cy, T.innerR, -Math.PI/2, Math.PI/2);
      ctx.lineTo(T.leftX, T.innerBottom);
      ctx.arc(T.leftX, T.cy, T.innerR, Math.PI/2, -Math.PI/2);
      ctx.stroke();

      // 中心草坪
      const grassGrad = ctx.createLinearGradient(0, T.outerTop, 0, T.outerBottom);
      grassGrad.addColorStop(0, '#66bb6a'); grassGrad.addColorStop(0.5, '#4caf50'); grassGrad.addColorStop(1, '#388e3c');
      ctx.fillStyle = grassGrad;
      ctx.beginPath();
      ctx.moveTo(T.leftX, T.innerTop); ctx.lineTo(T.rightX, T.innerTop);
      ctx.arc(T.rightX, T.cy, T.innerR, -Math.PI/2, Math.PI/2);
      ctx.lineTo(T.leftX, T.innerBottom);
      ctx.arc(T.leftX, T.cy, T.innerR, Math.PI/2, -Math.PI/2);
      ctx.closePath(); ctx.fill();

      // 足球场中线 + 中圈
      ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1;
      ctx.setLineDash([3, 6]);
      ctx.beginPath(); ctx.moveTo(T.leftX + 10, T.cy); ctx.lineTo(T.rightX - 10, T.cy); ctx.stroke();
      ctx.beginPath(); ctx.arc((T.leftX+T.rightX)/2, T.cy, 28, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);

      // 起点/终点线（右下直道）
      ctx.fillStyle = '#fff';
      const startX = T.rightX - 40;
      ctx.fillRect(startX, T.innerBottom, 36, T.outerBottom - T.innerBottom);
      ctx.fillStyle = '#333';
      ctx.font = 'bold 9px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('起/终点', startX + 18, T.innerBottom - 5);

      // ===== 机器人 =====
      if (animState !== 'idle') {
        const rx = robot.x, ry = robot.y;
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath(); ctx.arc(rx, ry + 2, 9, 0, Math.PI*2); ctx.fill();
        const bg = ctx.createRadialGradient(rx - 2, ry - 2, 1, rx, ry, 9);
        bg.addColorStop(0, '#64b5f6'); bg.addColorStop(1, '#1565c0');
        ctx.fillStyle = bg;
        ctx.beginPath(); ctx.arc(rx, ry, 9, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
        // 摄像头朝左（前进方向）
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(rx - 4, ry, 3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(rx - 4, ry, 1.5, 0, Math.PI*2); ctx.fill();
        // 方向指示
        ctx.strokeStyle = '#ffeb3b'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(rx - 9, ry); ctx.lineTo(rx - 18, ry); ctx.stroke();
        if (animState === 'offtrack' || animState === 'done') {
          ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 3;
          ctx.beginPath(); ctx.moveTo(rx-7, ry-7); ctx.lineTo(rx+7, ry+7);
          ctx.moveTo(rx+7, ry-7); ctx.lineTo(rx-7, ry+7); ctx.stroke();
        }
      }
      ctx.fillStyle = '#fff'; ctx.font = '10px system-ui'; ctx.textAlign = 'left';
      ctx.fillText('标准操场 · 红色橡胶跑道', 10, H - 8);
    }

    // 绘制第一视角（机器人所见画面，跑道向后倒退）
    function drawFPV() {
      const ctx = fpvCtx;
      const W = fpvCanvas.width, H = fpvCanvas.height;
      ctx.clearRect(0, 0, W, H);

      // 轻微左右晃动
      const wobble = Math.sin(animFrame * 0.15) * 3;
      ctx.save();
      ctx.translate(wobble, 0);

      // 天空
      const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.45);
      skyGrad.addColorStop(0, '#87ceeb'); skyGrad.addColorStop(1, '#c9e8f5');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, H * 0.45);

      // 学校建筑（底部落在水平线上）
      const horizonY = H * 0.42;
      const buildings = [
        { x: 10, w: 50, h: H * 0.26 },
        { x: 70, w: 48, h: H * 0.30 },
        { x: 340, w: 60, h: H * 0.28 },
        { x: 415, w: 48, h: H * 0.24 },
      ];
      buildings.forEach(b => {
        const by = horizonY - b.h;
        ctx.fillStyle = '#e8d5b5'; ctx.fillRect(b.x, by, b.w, b.h);
        ctx.fillStyle = '#d4c4a8'; ctx.fillRect(b.x + 5, by - 3, b.w - 10, 5);
        ctx.fillStyle = '#87ceeb';
        for (let wx = b.x + 5; wx < b.x + b.w - 7; wx += 11)
          for (let wy = by + 10; wy < by + b.h - 10; wy += 13)
            ctx.fillRect(wx, wy, 5, 7);
      });

      // 远处树木（底部落在水平线上）
      for (let tx = 140; tx < 370; tx += 50) {
        ctx.fillStyle = '#5d4037'; ctx.fillRect(tx - 2, horizonY - 18, 4, 18);
        ctx.fillStyle = '#388e3c'; ctx.beginPath(); ctx.arc(tx, horizonY - 22, 12, 0, Math.PI*2); ctx.fill();
      }

      // ===== 跑道区域 =====
      const centerX = W / 2;
      const vanishX = centerX + fpvCurve * 70 + fpvOfftrack * 25;

      // 背景草地
      ctx.fillStyle = '#7cb342'; ctx.fillRect(0, horizonY, W, H - horizonY);

      // 跑道梯形（透视）
      const nearL = vanishX - 240 + fpvOfftrack * 20;
      const nearR = vanishX + 240 + fpvOfftrack * 20;
      const farL  = vanishX - 65 - fpvCurve * 50;
      const farR  = vanishX + 65 - fpvCurve * 40;

      // 红色跑道
      ctx.fillStyle = '#c0392b';
      ctx.beginPath();
      ctx.moveTo(nearL, H); ctx.lineTo(nearR, H);
      if (fpvCurve > 0.08) {
        const cpY = horizonY + (H - horizonY) * 0.35;
        ctx.quadraticCurveTo(nearR * 0.6 + farR * 0.4, cpY, farR, horizonY);
        ctx.lineTo(farL, horizonY);
        ctx.quadraticCurveTo(nearL * 0.6 + farL * 0.4, cpY, nearL, H);
      } else {
        ctx.lineTo(farR, horizonY); ctx.lineTo(farL, horizonY); ctx.closePath();
      }
      ctx.fill();

      // 跑道颗粒（跑道向后倒退 — 向视野下方流动）
      ctx.fillStyle = 'rgba(180,60,40,0.22)';
      const particleCount = 50;
      for (let i = 0; i < particleCount; i++) {
        const baseT = (i / particleCount + scrollOffset / 600) % 1;
        const t = 0.08 + baseT * 0.88;
        const y = horizonY + (H - horizonY) * t;
        const lx = nearL + (farL - nearL) * (1 - t) * 0.85;
        const rx = nearR + (farR - nearR) * (1 - t) * 0.85;
        const x = lx + (rx - lx) * (0.08 + (i * 0.017) % 0.85);
        ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI*2); ctx.fill();
      }

      // 跑道分道线（裁剪到跑道区域内，不超出）
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(nearL, H); ctx.lineTo(nearR, H);
      if (fpvCurve > 0.08) {
        const cpY = horizonY + (H - horizonY) * 0.35;
        ctx.quadraticCurveTo(nearR * 0.6 + farR * 0.4, cpY, farR, horizonY);
        ctx.lineTo(farL, horizonY);
        ctx.quadraticCurveTo(nearL * 0.6 + farL * 0.4, cpY, nearL, H);
      } else {
        ctx.lineTo(farR, horizonY); ctx.lineTo(farL, horizonY); ctx.closePath();
      }
      ctx.clip();
      ctx.strokeStyle = 'rgba(255,255,255,0.7)';
      ctx.lineWidth = 1.5;
      for (let lane = 1; lane <= 5; lane++) {
        const t = lane / 6;
        const lx = nearL + (nearR - nearL) * t;
        const rx = farL + (farR - farL) * t;
        ctx.setLineDash([10, 12]);
        ctx.lineDashOffset = scrollOffset;
        ctx.beginPath(); ctx.moveTo(lx, H); ctx.lineTo(rx, horizonY);
        ctx.stroke();
      }
      ctx.setLineDash([]);
      ctx.lineDashOffset = 0;
      ctx.restore();

      // 跑道边缘白线
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(nearL, H);
      if (fpvCurve > 0.08) {
        const cpY = horizonY + (H - horizonY) * 0.32;
        ctx.quadraticCurveTo(nearL * 0.55 + farL * 0.45, cpY, farL, horizonY);
      } else { ctx.lineTo(farL, horizonY); }
      ctx.stroke();
      ctx.beginPath(); ctx.moveTo(nearR, H);
      if (fpvCurve > 0.08) {
        const cpY = horizonY + (H - horizonY) * 0.32;
        ctx.quadraticCurveTo(nearR * 0.55 + farR * 0.45, cpY, farR, horizonY);
      } else { ctx.lineTo(farR, horizonY); }
      ctx.stroke();

      // 前方弯道时，跑道弯曲 + 偏离后出现草地
      if (fpvOfftrack > 0.2) {
        const a = fpvOfftrack;
        ctx.fillStyle = `rgba(124,179,66,${a * 0.55})`;
        ctx.beginPath();
        ctx.moveTo(vanishX - 35, horizonY); ctx.lineTo(vanishX + 35, horizonY);
        ctx.lineTo(vanishX + 25, horizonY + 70); ctx.lineTo(vanishX - 25, horizonY + 70);
        ctx.closePath(); ctx.fill();
      }

      if (animState === 'offtrack') {
        const a = 0.3 + Math.sin(animFrame * 0.22) * 0.18;
        ctx.fillStyle = `rgba(239,68,68,${a})`;
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 24px system-ui'; ctx.textAlign = 'center';
        ctx.fillText('⚠ 冲出跑道！', W/2, H*0.55);
        ctx.font = '14px system-ui';
        ctx.fillText('摄像头无法判断弯道距离', W/2, H*0.62);
      }
      if (animState === 'done') {
        ctx.fillStyle = 'rgba(239,68,68,0.28)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 24px system-ui'; ctx.textAlign = 'center';
        ctx.fillText('⚠ 冲出跑道！', W/2, H*0.55);
      }
      ctx.restore();
    }

    drawTPV(); drawFPV();

    function resetSim() {
      if (animId) { cancelAnimationFrame(animId); animId = null; }
      animState = 'idle';
      robot = { x: T.rightX - 20, y: T.outerBottom - 22 };
      fpvCurve = 0; fpvOfftrack = 0; scrollOffset = 0; animFrame = 0;
      failOverlay.classList.add('hidden');
      simBtn.disabled = false;
      simBtn.textContent = '开始试跑';
      simStatus.textContent = '点击按钮，观察初代机（仅摄像头）在赛道上的表现';
      drawTPV(); drawFPV();
    }

    simBtn.addEventListener('click', startSim);

    function startSim() {
      if (animState === 'straight' || animState === 'approaching' || animState === 'offtrack') return;
      if (animId) { cancelAnimationFrame(animId); animId = null; }
      animState = 'straight';
      robot = { x: T.rightX - 20, y: T.outerBottom - 22 };
      fpvCurve = 0; fpvOfftrack = 0; scrollOffset = 0; animFrame = 0;
      failOverlay.classList.add('hidden');
      simBtn.disabled = true;
      simBtn.textContent = '试跑中...';
      simStatus.textContent = '初代机仅靠摄像头在赛道上行驶...';
      loop();
    }

    function loop() {
      animFrame++;
      scrollOffset += 2.5;  // 跑道向后倒退

      if (animState === 'straight') {
        // 沿下直道向左匀速移动，轻微上下摇晃
        robot.x -= 0.55;
        robot.y += Math.sin(animFrame * 0.12) * 0.6;
        fpvCurve = 0; fpvOfftrack = 0;

        // 接近左弯道（距圆心约40px）
        if (robot.x <= T.leftX + 45) {
          animState = 'approaching';
        }
      } else if (animState === 'approaching') {
        // 应沿左弯道转弯，但初代机判断不了弯道距离
        robot.x -= 0.5;
        robot.y -= 0.3;   // 提前且不足的上转
        fpvCurve = Math.min(1, fpvCurve + 0.022);
        fpvOfftrack = Math.min(1, fpvOfftrack + 0.012);

        if (!isOnTrack(robot.x, robot.y)) {
          animState = 'offtrack';
        }
      } else if (animState === 'offtrack') {
        robot.x -= 0.5;
        robot.y -= 0.7;   // 继续偏移
        fpvCurve = Math.min(1, fpvCurve + 0.025);
        fpvOfftrack = Math.min(1, fpvOfftrack + 0.035);

        if (fpvOfftrack >= 0.95) {
          animState = 'done';
          failOverlay.classList.remove('hidden');
          cancelAnimationFrame(animId); animId = null;
          drawTPV(); drawFPV();
          return;
        }
      }

      drawTPV(); drawFPV();
      if (animState !== 'done') animId = requestAnimationFrame(loop);
    }

  </script>
</body>
</html>
