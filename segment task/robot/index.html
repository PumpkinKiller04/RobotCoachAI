<!DOCTYPE html>
<html lang="zh-CN">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>机器人跳跃游戏</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: Arial, sans-serif;
                background-color: #f0f0f0;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }

            .game-container {
                position: relative;
                text-align: center;
                background-color: #000;
                border-radius: 10px;
                padding: 20px;
                box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            }

            .game-title {
                color: #00ff00;
                font-size: 24px;
                font-weight: bold;
                margin-bottom: 20px;
                text-shadow: 0 0 10px #00ff00;
            }

            canvas {
                background-color: #111;
                border: 2px solid #00ff00;
                border-radius: 5px;
            }

            .game-info {
                display: flex;
                justify-content: space-between;
                margin-top: 10px;
                color: #00ff00;
                font-size: 16px;
            }

            .score {
                font-weight: bold;
            }

            .high-score {
                font-weight: bold;
                color: #ffff00;
            }

            .instructions {
                font-style: italic;
            }

            .game-over {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background-color: rgba(0, 0, 0, 0.8);
                border: 2px solid #ff0000;
                border-radius: 10px;
                padding: 20px;
                color: #ff0000;
                display: none;
            }

            .game-over-text {
                font-size: 24px;
                font-weight: bold;
                margin-bottom: 10px;
            }

            .final-score {
                margin-bottom: 20px;
                font-size: 18px;
            }

            #restartButton {
                background-color: #ff0000;
                color: white;
                border: none;
                padding: 10px 20px;
                font-size: 16px;
                border-radius: 5px;
                cursor: pointer;
                transition: background-color 0.3s;
            }

            #restartButton:hover {
                background-color: #cc0000;
            }

            .start-screen {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background-color: rgba(0, 0, 0, 0.8);
                border: 2px solid #00ff00;
                border-radius: 10px;
                padding: 20px;
                color: #00ff00;
            }

            .start-text {
                font-size: 20px;
                font-weight: bold;
            }

            .mode-selector {
                display: flex;
                justify-content: center;
                gap: 10px;
                margin: 15px 0;
            }

            .mode-button {
                background-color: #333;
                color: #00ff00;
                border: 1px solid #00ff00;
                padding: 10px 15px;
                border-radius: 5px;
                cursor: pointer;
                font-size: 14px;
                transition: all 0.3s;
            }

            .mode-button:hover {
                background-color: #555;
                box-shadow: 0 0 10px #00ff00;
            }

            .mode-button.active {
                background-color: #00ff00;
                color: #000;
                font-weight: bold;
            }

            .ai-stats {
                display: flex;
                justify-content: space-between;
                margin-top: 10px;
                color: #00ff00;
                font-size: 14px;
                display: none;
            }

            .attempts, .ai-high-score {
                font-weight: bold;
            }
            
            #resetAiButton {
                background-color: #ff6600;
                color: white;
                border: none;
                padding: 5px 10px;
                font-size: 12px;
                border-radius: 3px;
                cursor: pointer;
                margin-left: 10px;
            }
            
            #resetAiButton:hover {
                background-color: #cc5200;
            }
        </style>
    </head>
<body>
    <div class="game-container">
        <div class="game-title">选手训练营</div>
        <div class="mode-selector">
            <button id="mode1Button" class="mode-button active">模式一：教练操控台</button>
            <button id="mode2Button" class="mode-button">模式二：AI训练模式</button>
            <button id="mode3Button" class="mode-button">模式三：学习成果展示</button>
        </div>
        <canvas id="gameCanvas" width="800" height="300"></canvas>
        <div class="game-info">
            <div class="score">得分: <span id="score">0</span></div>
            <div class="high-score">历史最高分: <span id="highScore">0</span></div>
            <div class="instructions">按空格键或↑键跳跃</div>
        </div>
        <div class="ai-stats" id="aiStats">
            <div class="attempts">尝试次数: <span id="attempts">0</span></div>
            <div class="ai-high-score">最高得分: <span id="aiHighScore">0</span></div>
            <button id="resetAiButton">重置AI训练</button>
        </div>
        <div class="game-over" id="gameOver">
            <div class="game-over-text">游戏结束</div>
            <div class="final-score">最终得分: <span id="finalScore">0</span></div>
            <button id="restartButton">重新开始</button>
        </div>
        <div class="start-screen" id="startScreen">
            <div class="start-text">按空格键开始游戏</div>
        </div>
    </div>
    <script>
        // 游戏常量
        const GAME_CONSTANTS = {
            WIDTH: 800,
            HEIGHT: 300,
            GRAVITY: 0.6,
            JUMP_FORCE: -12,
            GROUND_Y: 200,
            BASE_SPEED: 5,
            MAX_SPEED: 12,
            SPEED_INCREMENT: 0.01
        };

        // 游戏模式
        const GAME_MODES = {
            PLAYER: 1,
            AI_TRAINING: 2,
            AI_DISPLAY: 3
        };

        let currentMode = GAME_MODES.PLAYER;

        // 游戏状态
        const GAME_STATES = {
            START: 'start',
            PLAYING: 'playing',
            GAME_OVER: 'gameOver'
        };

        let gameState = GAME_STATES.START;
        let currentSpeed = GAME_CONSTANTS.BASE_SPEED;
        let scoreTimer = 0;
        let scoreInterval = 100; // 每100ms增加1分，即每秒10分
        let speedTimer = 0;
        let speedInterval = 3000; // 每3秒增加一次速度
        
        // 模式一玩家数据
        let mode1Data = {
            score: 0,
            highScore: 0
        };
        
        // 模式二AI训练数据
        let mode2Data = {
            score: 0,
            attempts: 0,
            highScore: 0
        };
        
        // 模式三AI展示数据
        let mode3Data = {
            score: 0,
            highScore: 0
        };
        
        // 当前模式的得分
        let score = 0;

        // Q-learning算法参数
        const Q_LEARNING = {
            LEARNING_RATE: 0.1,
            DISCOUNT_FACTOR: 0.95,
            EXPLORATION_RATE: 0.1,
            EXPLORATION_DECAY: 0.999,
            MIN_EXPLORATION: 0.01
        };

        // Q表
        let qTable = {};
        
        // 初始化Q表预装常识
        function initializeQTableWithCommonSense() {
            for (let distance = 0; distance < 10; distance++) {
                for (let speed = 0; speed < 5; speed++) {
                    for (let jump = 0; jump < 2; jump++) {
                        // 普通路障（类型=0）的状态，Q值正常从0开始
                        let normalState = `${distance},0,${speed},${jump}`;
                        qTable[normalState] = { jump: 0, wait: 0 };
                        
                        // 紫色横梁（类型=1）的状态，预装常识
                        let beamState = `${distance},1,${speed},${jump}`;
                        qTable[beamState] = { jump: -50, wait: 0 }; // 跳跃动作初始化为-50
                    }
                }
            }
        }
        
        // 初始化Q表
        initializeQTableWithCommonSense();
        
        // 状态空间参数
        const STATE_PARAMS = {
            DISTANCE_BUCKETS: 10, // 距离分桶数
            SPEED_BUCKETS: 5, // 速度分桶数
            MAX_DISTANCE: 300 // 最大检测距离
        };

        // 游戏对象
        let robot = {
            x: 50,
            y: GAME_CONSTANTS.GROUND_Y,
            width: 50,
            height: 50,
            velocity: 0,
            isJumping: false,
            frame: 0
        };

        let obstacles = [];
        let obstaclesTimer = 0;
        let obstaclesInterval = 1500;
        let obstacleCounter = 0; // 障碍物计数器，用于控制横梁障碍物的生成

        // 画布和上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // DOM 元素
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const finalScoreElement = document.getElementById('finalScore');
        const gameOverElement = document.getElementById('gameOver');
        const startScreenElement = document.getElementById('startScreen');
        const restartButton = document.getElementById('restartButton');

        // 事件监听
        restartButton.addEventListener('click', restartGame);
        document.addEventListener('keydown', handleKeyDown);
        document.addEventListener('keyup', handleKeyUp);

        // 模式切换按钮事件
        document.getElementById('mode1Button').addEventListener('click', () => switchMode(GAME_MODES.PLAYER));
        document.getElementById('mode2Button').addEventListener('click', () => switchMode(GAME_MODES.AI_TRAINING));
        document.getElementById('mode3Button').addEventListener('click', () => switchMode(GAME_MODES.AI_DISPLAY));
        
        // 重置AI按钮事件
        document.getElementById('resetAiButton').addEventListener('click', () => {
            if (confirm('确定要重置AI训练数据吗？这将清空所有训练进度。')) {
                // 重置AI训练数据
                resetAiTraining();
                // 重置Q表到初始状态
                qTable = {};
                initializeQTableWithCommonSense();
                // 重置游戏，确保重新开始
                restartGame();
                alert('AI训练数据已重置');
            }
        });

        // 切换游戏模式
        function switchMode(mode) {
            currentMode = mode;
            
            // 更新按钮状态
            document.getElementById('mode1Button').classList.remove('active');
            document.getElementById('mode2Button').classList.remove('active');
            document.getElementById('mode3Button').classList.remove('active');
            
            if (mode === GAME_MODES.PLAYER) {
                document.getElementById('mode1Button').classList.add('active');
                document.getElementById('aiStats').style.display = 'none';
                document.querySelector('.high-score').style.display = 'block';
                document.querySelector('.instructions').textContent = '按空格键或↑键跳跃';
                // 重置游戏到开始界面
                resetToStartScreen();
            } else if (mode === GAME_MODES.AI_TRAINING) {
                document.getElementById('mode2Button').classList.add('active');
                document.getElementById('aiStats').style.display = 'flex';
                document.querySelector('.high-score').style.display = 'none';
                document.querySelector('.instructions').textContent = 'AI正在自动训练...';
                // 更新显示的尝试次数和最高分（不清零）
                document.getElementById('attempts').textContent = mode2Data.attempts;
                document.getElementById('aiHighScore').textContent = mode2Data.highScore;
                // 重置游戏
                restartGame();
            } else if (mode === GAME_MODES.AI_DISPLAY) {
                document.getElementById('mode3Button').classList.add('active');
                document.getElementById('aiStats').style.display = 'none';
                document.querySelector('.high-score').style.display = 'none';
                document.querySelector('.instructions').textContent = 'AI正在展示学习成果...';
                // 重置游戏
                restartGame();
            }
        }
        
        // 重置到开始界面（仅用于模式一）
        function resetToStartScreen() {
            gameState = GAME_STATES.START;
            score = 0;
            scoreElement.textContent = score;
            // 更新最高分显示为模式一的最高分
            highScoreElement.textContent = mode1Data.highScore;
            currentSpeed = GAME_CONSTANTS.BASE_SPEED;
            robot.y = GAME_CONSTANTS.GROUND_Y;
            robot.velocity = 0;
            robot.isJumping = false;
            obstacles = [];
            obstaclesTimer = 0;
            obstacleCounter = 0;
            obstaclesInterval = 1500;
            gameOverElement.style.display = 'none';
            startScreenElement.style.display = 'block';
        }

        // 键盘状态
        let keys = {};

        // 处理键盘按下
        function handleKeyDown(event) {
            keys[event.code] = true;
            
            if (event.code === 'Space' || event.code === 'ArrowUp') {
                if (gameState === GAME_STATES.START) {
                    gameState = GAME_STATES.PLAYING;
                    startScreenElement.style.display = 'none';
                } else if (gameState === GAME_STATES.PLAYING && !robot.isJumping) {
                    jump();
                } else if (gameState === GAME_STATES.GAME_OVER) {
                    restartGame();
                }
            }
        }

        // 处理键盘释放
        function handleKeyUp(event) {
            keys[event.code] = false;
        }

        // 游戏循环
        function gameLoop(timestamp) {
            // 清除画布
            ctx.clearRect(0, 0, GAME_CONSTANTS.WIDTH, GAME_CONSTANTS.HEIGHT);
            
            // 绘制背景
            drawBackground();
            
            // 处理AI模式
            let previousState = null;
            let action = null;
            
            if (currentMode === GAME_MODES.AI_TRAINING || currentMode === GAME_MODES.AI_DISPLAY) {
                previousState = getState();
                action = aiTakeAction();
            }
            
            // 根据游戏状态执行不同操作
            switch (gameState) {
                case GAME_STATES.START:
                    drawRobot();
                    break;
                case GAME_STATES.PLAYING:
                    // 定时增加速度（仅模式一）
                    if (currentMode === GAME_MODES.PLAYER) {
                        speedTimer += 16;
                        if (speedTimer >= speedInterval && currentSpeed < GAME_CONSTANTS.MAX_SPEED) {
                            currentSpeed += GAME_CONSTANTS.SPEED_INCREMENT * 10;
                            speedTimer = 0;
                        }
                    }
                    
                    updateRobot();
                    drawRobot();
                    updateObstacles();
                    drawObstacles();
                    checkCollision();
                    updateScore();
                    
                    // AI训练逻辑
            if (currentMode === GAME_MODES.AI_TRAINING && previousState && action) {
                const nextState = getState();
                const reward = calculateReward();
                updateQTable(previousState, action, reward, nextState);
                
                // 衰减探索率
                if (Q_LEARNING.EXPLORATION_RATE > Q_LEARNING.MIN_EXPLORATION) {
                    Q_LEARNING.EXPLORATION_RATE *= Q_LEARNING.EXPLORATION_DECAY;
                }
            }
            break;
        case GAME_STATES.GAME_OVER:
            drawRobot();
            drawObstacles();
            
            // AI训练模式：自动重置
            if (currentMode === GAME_MODES.AI_TRAINING) {
                // 更新训练数据
                mode2Data.attempts++;
                if (score > mode2Data.highScore) {
                    mode2Data.highScore = score;
                }
                
                // 更新显示
                document.getElementById('attempts').textContent = mode2Data.attempts;
                document.getElementById('aiHighScore').textContent = mode2Data.highScore;
                
                // 重置游戏
                restartGame();
            } else {
                showGameOver();
            }
            break;
            }
            
            // 继续游戏循环
            requestAnimationFrame(gameLoop);
        }

        // 绘制背景
        function drawBackground() {
            // 绘制天空
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, GAME_CONSTANTS.WIDTH, GAME_CONSTANTS.GROUND_Y);
            
            // 绘制地面
            ctx.fillStyle = '#333';
            ctx.fillRect(0, GAME_CONSTANTS.GROUND_Y, GAME_CONSTANTS.WIDTH, GAME_CONSTANTS.HEIGHT - GAME_CONSTANTS.GROUND_Y);
            
            // 绘制网格线
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 1;
            for (let x = 0; x < GAME_CONSTANTS.WIDTH; x += 20) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, GAME_CONSTANTS.GROUND_Y);
                ctx.stroke();
            }
            for (let y = 0; y < GAME_CONSTANTS.GROUND_Y; y += 20) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(GAME_CONSTANTS.WIDTH, y);
                ctx.stroke();
            }
        }

        // 绘制机器人
        function drawRobot() {
            // 机器人身体
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(robot.x, robot.y - robot.height, robot.width, robot.height);
            
            // 机器人头部
            ctx.fillStyle = '#00cc00';
            ctx.fillRect(robot.x + 15, robot.y - robot.height - 15, 20, 15);
            
            // 机器人眼睛
            ctx.fillStyle = '#000';
            ctx.fillRect(robot.x + 20, robot.y - robot.height - 10, 5, 5);
            ctx.fillRect(robot.x + 25, robot.y - robot.height - 10, 5, 5);
            
            // 机器人手臂
            if (robot.isJumping) {
                // 跳跃时的手臂姿势
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(robot.x - 5, robot.y - robot.height + 10, 5, 15);
                ctx.fillRect(robot.x + robot.width, robot.y - robot.height + 10, 5, 15);
            } else {
                // 跑步时的手臂姿势
                ctx.fillStyle = '#00ff00';
                if (robot.frame % 2 === 0) {
                    ctx.fillRect(robot.x - 5, robot.y - robot.height + 5, 5, 15);
                    ctx.fillRect(robot.x + robot.width, robot.y - robot.height + 15, 5, 15);
                } else {
                    ctx.fillRect(robot.x - 5, robot.y - robot.height + 15, 5, 15);
                    ctx.fillRect(robot.x + robot.width, robot.y - robot.height + 5, 5, 15);
                }
            }
            
            // 机器人腿部
            if (!robot.isJumping) {
                if (robot.frame % 2 === 0) {
                    ctx.fillStyle = '#00ff00';
                    ctx.fillRect(robot.x + 10, robot.y, 10, 15);
                    ctx.fillRect(robot.x + 30, robot.y - 5, 10, 15);
                } else {
                    ctx.fillStyle = '#00ff00';
                    ctx.fillRect(robot.x + 10, robot.y - 5, 10, 15);
                    ctx.fillRect(robot.x + 30, robot.y, 10, 15);
                }
            }
            
            // 更新帧计数器
            robot.frame++;
        }

        // 更新机器人
        function updateRobot() {
            // 应用重力
            robot.velocity += GAME_CONSTANTS.GRAVITY;
            robot.y += robot.velocity;
            
            // 确保机器人不会掉出屏幕
            if (robot.y > GAME_CONSTANTS.GROUND_Y) {
                robot.y = GAME_CONSTANTS.GROUND_Y;
                robot.velocity = 0;
                robot.isJumping = false;
            }
        }

        // 跳跃
        function jump() {
            robot.velocity = GAME_CONSTANTS.JUMP_FORCE;
            robot.isJumping = true;
        }

        // 创建障碍物
        function createObstacle() {
            let type;
            
            // 模式二和模式三：节奏型横梁障碍物生成
            if (currentMode === GAME_MODES.AI_TRAINING || currentMode === GAME_MODES.AI_DISPLAY) {
                obstacleCounter++;
                // 每4个障碍物中第4个是横梁
                if (obstacleCounter % 4 === 0) {
                    // 生成紫色横梁
                    type = { width: 100, height: 20, color: '#ff00ff', type: 'beam', y: GAME_CONSTANTS.GROUND_Y - 100 };
                } else {
                    // 生成普通路障（随机选择红色、黄色或蓝色）
                    const groundObstacles = [
                        { width: 30, height: 40, color: '#ff0000', type: 'ground' },  // 红色地面障碍物
                        { width: 40, height: 30, color: '#ffaa00', type: 'ground' },  // 黄色地面障碍物
                        { width: 25, height: 50, color: '#0000ff', type: 'ground' }   // 蓝色地面障碍物
                    ];
                    type = groundObstacles[Math.floor(Math.random() * groundObstacles.length)];
                }
            } else {
                // 模式一：随机生成障碍物
                const obstacleTypes = [
                    { width: 30, height: 40, color: '#ff0000', type: 'ground' },  // 红色地面障碍物
                    { width: 40, height: 30, color: '#ffaa00', type: 'ground' },  // 黄色地面障碍物
                    { width: 25, height: 50, color: '#0000ff', type: 'ground' },  // 蓝色地面障碍物
                    { width: 100, height: 20, color: '#ff00ff', type: 'beam', y: GAME_CONSTANTS.GROUND_Y - 100 }  // 紫色横梁障碍物，提高位置
                ];
                type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
            }
            
            obstacles.push({
                x: GAME_CONSTANTS.WIDTH,
                y: type.type === 'beam' ? type.y : GAME_CONSTANTS.GROUND_Y - type.height,
                width: type.width,
                height: type.height,
                color: type.color,
                type: type.type,
                speed: currentSpeed
            });
        }

        // 更新障碍物
        function updateObstacles() {
            obstaclesTimer += 16; // 假设每帧16ms
            
            if (obstaclesTimer >= obstaclesInterval) {
                createObstacle();
                obstaclesTimer = 0;
                
                // 模式一：根据速度调整障碍物间隔
                if (currentMode === GAME_MODES.PLAYER) {
                    if (currentSpeed < GAME_CONSTANTS.BASE_SPEED + 2) {
                        // 前期速度慢时，间隔较小且固定
                        obstaclesInterval = 1000;
                    } else {
                        // 后期速度快时，间隔随机
                        obstaclesInterval = 800 + Math.random() * 600; // 800-1400ms之间随机
                    }
                }
                // 模式二和模式三：保持固定间隔
            }
            
            // 更新障碍物位置
            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].x -= obstacles[i].speed;
                
                // 移除屏幕外的障碍物
                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    i--;
                }
            }
        }

        // 绘制障碍物
        function drawObstacles() {
            for (let obstacle of obstacles) {
                ctx.fillStyle = obstacle.color;
                ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
                
                // 为障碍物添加细节
                ctx.fillStyle = '#000';
                ctx.fillRect(obstacle.x + 5, obstacle.y + 5, obstacle.width - 10, obstacle.height - 10);
            }
        }

        // 检查碰撞
        function checkCollision() {
            for (let obstacle of obstacles) {
                if (obstacle.type === 'beam') {
                    // 横梁障碍物：跳跃时碰到会死亡
                    if (
                        robot.x < obstacle.x + obstacle.width &&
                        robot.x + robot.width > obstacle.x &&
                        robot.y - robot.height < obstacle.y + obstacle.height &&
                        robot.isJumping
                    ) {
                        gameState = GAME_STATES.GAME_OVER;
                        break;
                    }
                } else {
                    // 地面障碍物：正常碰撞检测
                    if (
                        robot.x < obstacle.x + obstacle.width &&
                        robot.x + robot.width > obstacle.x &&
                        robot.y - robot.height < obstacle.y + obstacle.height &&
                        robot.y > obstacle.y
                    ) {
                        gameState = GAME_STATES.GAME_OVER;
                        break;
                    }
                }
            }
        }

        // 更新得分
        function updateScore() {
            scoreTimer += 16;
            if (scoreTimer >= scoreInterval) {
                score++;
                scoreElement.textContent = score;
                // 根据模式更新对应的得分
                if (currentMode === GAME_MODES.PLAYER) {
                    mode1Data.score = score;
                } else if (currentMode === GAME_MODES.AI_TRAINING) {
                    mode2Data.score = score;
                } else if (currentMode === GAME_MODES.AI_DISPLAY) {
                    mode3Data.score = score;
                }
                scoreTimer = 0;
            }
        }

        // 显示游戏结束画面
        function showGameOver() {
            gameOverElement.style.display = 'block';
            finalScoreElement.textContent = score;
            
            // 根据模式更新对应的最高分
            if (currentMode === GAME_MODES.PLAYER) {
                if (score > mode1Data.highScore) {
                    mode1Data.highScore = score;
                    highScoreElement.textContent = mode1Data.highScore;
                }
            } else if (currentMode === GAME_MODES.AI_TRAINING) {
                if (score > mode2Data.highScore) {
                    mode2Data.highScore = score;
                    highScoreElement.textContent = mode2Data.highScore;
                }
            } else if (currentMode === GAME_MODES.AI_DISPLAY) {
                if (score > mode3Data.highScore) {
                    mode3Data.highScore = score;
                    highScoreElement.textContent = mode3Data.highScore;
                }
            }
        }

        // 重新开始游戏
        function restartGame() {
            gameState = GAME_STATES.PLAYING;
            score = 0;
            scoreElement.textContent = score;
            // 根据模式设置速度
            if (currentMode === GAME_MODES.AI_TRAINING || currentMode === GAME_MODES.AI_DISPLAY) {
                currentSpeed = 8; // 模式二和模式三使用固定速度8
            } else {
                currentSpeed = GAME_CONSTANTS.BASE_SPEED; // 模式一使用基础速度
            }
            robot.y = GAME_CONSTANTS.GROUND_Y;
            robot.velocity = 0;
            robot.isJumping = false;
            obstacles = [];
            obstaclesTimer = 0;
            obstacleCounter = 0; // 重置障碍物计数器
            // 根据模式设置障碍物间隔
            if (currentMode === GAME_MODES.AI_TRAINING || currentMode === GAME_MODES.AI_DISPLAY) {
                obstaclesInterval = 800; // 模式二和模式三使用固定间隔800ms
            } else {
                obstaclesInterval = 1500; // 模式一使用默认间隔
            }
            gameOverElement.style.display = 'none';
            startScreenElement.style.display = 'none';
        }

        // 获取当前状态
        function getState() {
            // 找到最近的障碍物
            let closestObstacle = null;
            let minDistance = Infinity;
            
            for (let obstacle of obstacles) {
                if (obstacle.x > robot.x && obstacle.x - robot.x < minDistance) {
                    minDistance = obstacle.x - robot.x;
                    closestObstacle = obstacle;
                }
            }
            
            // 计算状态特征
            let distanceBucket = 0;
            let obstacleType = 0; // 0 = 普通路障，1 = 紫色横梁
            
            if (closestObstacle) {
                // 将距离分桶
                distanceBucket = Math.min(
                    STATE_PARAMS.DISTANCE_BUCKETS - 1,
                    Math.floor(minDistance / (STATE_PARAMS.MAX_DISTANCE / STATE_PARAMS.DISTANCE_BUCKETS))
                );
                // 判断障碍物类型
                obstacleType = closestObstacle.type === 'beam' ? 1 : 0;
            }
            
            // 将速度分桶
            let speedBucket = Math.min(
                STATE_PARAMS.SPEED_BUCKETS - 1,
                Math.floor((currentSpeed - GAME_CONSTANTS.BASE_SPEED) / ((GAME_CONSTANTS.MAX_SPEED - GAME_CONSTANTS.BASE_SPEED) / STATE_PARAMS.SPEED_BUCKETS))
            );
            
            // 跳跃状态
            let jumpState = robot.isJumping ? 1 : 0;
            
            // 返回状态字符串（10距离×2类型）
            return `${distanceBucket},${obstacleType},${speedBucket},${jumpState}`;
        }

        // 选择动作
        function selectAction(state) {
            // 模式三：纯利用，不探索
            if (currentMode === GAME_MODES.AI_DISPLAY) {
                // 利用：选择Q值最大的动作
                if (!qTable[state]) {
                    qTable[state] = { jump: 0, wait: 0 };
                }
                return qTable[state].jump > qTable[state].wait ? 'jump' : 'wait';
            } else if (currentMode === GAME_MODES.AI_TRAINING) {
                // 模式二：探索与利用
                if (Math.random() < Q_LEARNING.EXPLORATION_RATE) {
                    // 探索：随机选择动作
                    return Math.random() > 0.5 ? 'jump' : 'wait';
                } else {
                    // 利用：选择Q值最大的动作
                    if (!qTable[state]) {
                        qTable[state] = { jump: 0, wait: 0 };
                    }
                    return qTable[state].jump > qTable[state].wait ? 'jump' : 'wait';
                }
            }
            return 'wait'; // 默认动作
        }

        // 更新Q表
        function updateQTable(state, action, reward, nextState) {
            if (!qTable[state]) {
                qTable[state] = { jump: 0, wait: 0 };
            }
            
            if (!qTable[nextState]) {
                qTable[nextState] = { jump: 0, wait: 0 };
            }
            
            // Q-learning更新公式
            const bestNextAction = qTable[nextState].jump > qTable[nextState].wait ? 'jump' : 'wait';
            const tdTarget = reward + Q_LEARNING.DISCOUNT_FACTOR * qTable[nextState][bestNextAction];
            const tdError = tdTarget - qTable[state][action];
            qTable[state][action] += Q_LEARNING.LEARNING_RATE * tdError;
        }

        // 计算奖励
        function calculateReward() {
            let reward = 0;
            
            // 存活奖励
            reward += 0.1;
            
            // 得分奖励
            reward += score * 0.01;
            
            // 碰撞惩罚
            if (gameState === GAME_STATES.GAME_OVER) {
                reward -= 10;
            }
            
            return reward;
        }

        // AI执行动作
        function aiTakeAction() {
            if (currentMode === GAME_MODES.AI_TRAINING || currentMode === GAME_MODES.AI_DISPLAY) {
                const state = getState();
                const action = selectAction(state);
                
                if (action === 'jump' && !robot.isJumping) {
                    jump();
                }
                
                return action;
            }
            return null;
        }

        // 重置AI训练
        function resetAiTraining() {
            mode2Data.attempts = 0;
            mode2Data.highScore = 0;
            mode2Data.score = 0;
            document.getElementById('attempts').textContent = mode2Data.attempts;
            document.getElementById('aiHighScore').textContent = mode2Data.highScore;
        }

        // 开始游戏循环
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
