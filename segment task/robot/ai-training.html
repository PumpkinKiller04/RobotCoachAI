<!DOCTYPE html>
<html lang="zh-CN">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AI训练模式</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: Arial, sans-serif;
                background-color: transparent;
                display: flex;
                justify-content: center;
                align-items: flex-start;
                min-height: 100%;
                overflow: hidden;
            }

            .game-container {
                position: relative;
                text-align: center;
                background-color: #000;
                border-radius: 10px;
                padding: 15px;
                box-shadow: 0 0 15px rgba(0, 0, 0, 0.6);
                display: inline-block;
            }

            .game-title {
                color: #00ff00;
                font-size: 18px;
                font-weight: bold;
                margin-bottom: 12px;
                text-shadow: 0 0 10px #00ff00;
            }

            canvas {
                background-color: #111;
                border: 2px solid #00ff00;
                border-radius: 5px;
            }

            .game-info {
                display: flex;
                justify-content: space-between;
                margin-top: 8px;
                color: #00ff00;
                font-size: 13px;
            }

            .score {
                font-weight: bold;
            }

            .instructions {
                font-style: italic;
            }

            .game-over {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background-color: rgba(0, 0, 0, 0.8);
                border: 2px solid #ff0000;
                border-radius: 10px;
                padding: 20px;
                color: #ff0000;
                display: none;
            }

            .game-over-text {
                font-size: 24px;
                font-weight: bold;
                margin-bottom: 10px;
            }

            .final-score {
                margin-bottom: 20px;
                font-size: 18px;
            }

            #restartButton {
                background-color: #ff0000;
                color: white;
                border: none;
                padding: 10px 20px;
                font-size: 16px;
                border-radius: 5px;
                cursor: pointer;
                transition: background-color 0.3s;
            }

            #restartButton:hover {
                background-color: #cc0000;
            }

            .ai-stats {
                display: flex;
                justify-content: space-between;
                margin-top: 8px;
                color: #00ff00;
                font-size: 12px;
            }

            .attempts, .ai-high-score {
                font-weight: bold;
            }
            
            #resetAiButton {
                background-color: #ff6600;
                color: white;
                border: none;
                padding: 4px 8px;
                font-size: 10px;
                border-radius: 3px;
                cursor: pointer;
                margin-left: 8px;
            }
            
            #resetAiButton:hover {
                background-color: #cc5200;
            }

            .start-screen {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background-color: rgba(0, 0, 0, 0.8);
                border: 2px solid #00ff00;
                border-radius: 8px;
                padding: 15px;
                color: #00ff00;
            }

            .start-text {
                font-size: 16px;
                font-weight: bold;
            }
        </style>
    </head>
<body>
    <div class="game-container">
        <div class="game-title">AI训练模式</div>
        <canvas id="gameCanvas" width="480" height="180"></canvas>
        <div class="game-info">
            <div class="score">得分: <span id="score">0</span></div>
            <div class="instructions">AI正在自动训练...</div>
        </div>
        <div class="ai-stats" id="aiStats">
            <div class="attempts">尝试次数: <span id="attempts">0</span></div>
            <div class="ai-high-score">最高得分: <span id="aiHighScore">0</span></div>
            <button id="resetAiButton">重置AI训练</button>
        </div>
        <div class="game-over" id="gameOver">
            <div class="game-over-text">游戏结束</div>
            <div class="final-score">最终得分: <span id="finalScore">0</span></div>
            <button id="restartButton">重新开始</button>
        </div>
        <div class="start-screen" id="startScreen">
            <div class="start-text">按空格键开始AI训练</div>
        </div>
    </div>
    <script>
        const GAME_CONSTANTS = {
            WIDTH: 480,
            HEIGHT: 180,
            GRAVITY: 0.6,
            JUMP_FORCE: -11,
            GROUND_Y: 115,
            BASE_SPEED: 4,
            MAX_SPEED: 10,
            SPEED_INCREMENT: 0.01
        };

        const GAME_STATES = {
            START: 'start',
            PLAYING: 'playing',
            GAME_OVER: 'gameOver'
        };

        // 障碍物类型ID: 0=红色, 1=黄色, 2=蓝色, 3=横梁
        const OT = { RED: 0, YELLOW: 1, BLUE: 2, BEAM: 3 };

        // ---- Q-learning 参数 ----
        var qTable = {};
        var explorationRate = 0.3;
        var LR = 0.4;           // 学习率 — 高，因为每个障碍物只学一次
        var DF = 0.9;           // 折扣因子

        function initQTable() {
            for (var d = 0; d < 12; d++) {
                for (var t = 0; t < 4; t++) {
                    for (var j = 0; j < 2; j++) {
                        var key = d + ',' + t + ',' + j;
                        if (t === OT.BEAM) {
                            // 横梁：跳跃 = 坏，等待 = 好
                            qTable[key] = { jump: -20, wait: 5 };
                        } else {
                            // 地面障碍物：等待 = 坏，跳跃 = 好
                            qTable[key] = { jump: 5, wait: -20 };
                        }
                    }
                }
            }
        }
        initQTable();

        // 预装常识的快捷Q表初始化
        function qGet(state) {
            if (!qTable[state]) qTable[state] = { jump: 0, wait: 0 };
            return qTable[state];
        }

        // ---- 游戏状态 ----
        var gameState = GAME_STATES.START;
        var currentSpeed = 7;
        var score = 0;
        var scoreTimer = 0;
        var scoreInterval = 100;

        var aiAttempts = 0;
        var aiHighScore = 0;

        var robot = {
            x: 35, y: GAME_CONSTANTS.GROUND_Y,
            width: 32, height: 32,
            velocity: 0, isJumping: false,
            frame: 0
        };

        var obstacles = [];
        var obstaclesTimer = 0;
        var obstaclesInterval = 850;
        var obstacleCounter = 0;

        // ---- 事件驱动学习：记录每个障碍物触发时的决策 ----
        var currentObstacleId = 0;
        var decisionState = null;    // 障碍物进入判定区时的状态
        var decisionAction = null;   // AI在那一刻的选择
        var obstacleHandled = false; // 当前障碍物是否已结算过

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverElement = document.getElementById('gameOver');
        const startScreenElement = document.getElementById('startScreen');

        document.getElementById('restartButton').addEventListener('click', restartGame);
        document.addEventListener('keydown', handleKeyDown);

        document.getElementById('resetAiButton').addEventListener('click', function() {
            if (confirm('确定要重置AI训练数据吗？这将清空所有训练进度。')) {
                aiAttempts = 0;
                aiHighScore = 0;
                document.getElementById('attempts').textContent = 0;
                document.getElementById('aiHighScore').textContent = 0;
                qTable = {};
                initQTable();
                explorationRate = 0.3;
                restartGame();
                alert('AI训练数据已重置');
            }
        });

        function handleKeyDown(event) {
            if (event.code === 'Space') {
                event.preventDefault();
                if (gameState === GAME_STATES.START) {
                    gameState = GAME_STATES.PLAYING;
                    startScreenElement.style.display = 'none';
                }
            }
        }

        // ============ 主循环 ============
        function gameLoop() {
            ctx.clearRect(0, 0, GAME_CONSTANTS.WIDTH, GAME_CONSTANTS.HEIGHT);
            drawBackground();

            if (gameState === GAME_STATES.START) {
                drawRobot();
            } else if (gameState === GAME_STATES.PLAYING) {
                updateRobot();
                drawRobot();
                updateObstacles();   // 内含事件检测和学习
                drawObstacles();
                checkCollision();    // 内含死亡学习
                updateScore();
                aiThink();           // AI决策
            } else if (gameState === GAME_STATES.GAME_OVER) {
                drawRobot();
                drawObstacles();
                aiAttempts++;
                if (score > aiHighScore) aiHighScore = score;
                document.getElementById('attempts').textContent = aiAttempts;
                document.getElementById('aiHighScore').textContent = aiHighScore;
                restartGame();
            }

            requestAnimationFrame(gameLoop);
        }

        // ============ AI 决策（每帧调用） ============
        function aiThink() {
            var closest = getClosestObstacle();
            if (!closest) return;

            var dist = closest.x - robot.x;
            // 只在障碍物进入判定范围(0-360px)时做决策
            if (dist <= 0 || dist > 360) return;

            var distBucket = Math.min(11, Math.floor(dist / 30));  // 0-11, 每30px一档
            var typeId = closest.typeId;
            var jumpState = robot.isJumping ? 1 : 0;
            var state = distBucket + ',' + typeId + ',' + jumpState;

            // 如果障碍物刚进入判定范围，记录这个时刻的决策
            if (!decisionState || closest._id !== currentObstacleId) {
                decisionState = state;
                currentObstacleId = closest._id;
                obstacleHandled = false;
            }

            // 选择动作
            var action;
            if (Math.random() < explorationRate) {
                action = Math.random() > 0.5 ? 'jump' : 'wait';
            } else {
                var q = qGet(state);
                action = q.jump > q.wait ? 'jump' : 'wait';
            }

            // 执行动作
            if (action === 'jump' && !robot.isJumping) {
                robot.velocity = GAME_CONSTANTS.JUMP_FORCE;
                robot.isJumping = true;
                // 记录起跳时的状态，用于后续学习
                if (!obstacleHandled) {
                    decisionState = state;
                    decisionAction = 'jump';
                }
            }
            if (action === 'wait' && !obstacleHandled) {
                decisionAction = 'wait';
            }
        }

        // ============ 障碍物更新 + 通过检测 ============
        var _obsIdCounter = 0;
        function updateObstacles() {
            obstaclesTimer += 16;
            if (obstaclesTimer >= obstaclesInterval) {
                createObstacle();
                obstaclesTimer = 0;
            }

            for (var i = 0; i < obstacles.length; i++) {
                var ob = obstacles[i];
                ob.x -= ob.speed;

                // 检测：障碍物完全通过了机器人 → 成功！给予正奖励
                if (!ob._handled && ob.x + ob.width < robot.x) {
                    ob._handled = true;
                    obstacleHandled = true;

                    if (ob.typeId === OT.BEAM) {
                        // 横梁通过：不跳就是成功
                        learnFromOutcome(decisionState, decisionAction, +8);
                    } else {
                        // 地面障碍物通过：跳了就是成功
                        learnFromOutcome(decisionState, decisionAction, +10);
                    }

                    decisionState = null;
                    decisionAction = null;
                }

                // 移除屏幕外的障碍物
                if (ob.x + ob.width < 0) {
                    obstacles.splice(i, 1);
                    i--;
                }
            }
        }

        // ============ 碰撞检测 + 死亡学习 ============
        function checkCollision() {
            for (var i = 0; i < obstacles.length; i++) {
                var ob = obstacles[i];
                var hOverlap = robot.x < ob.x + ob.width && robot.x + robot.width > ob.x;

                if (!hOverlap) continue;

                if (ob.typeId === OT.BEAM) {
                    // 横梁：跳跃时碰到 = 死
                    if (robot.isJumping &&
                        robot.y - robot.height < ob.y + ob.height &&
                        robot.y > ob.y) {
                        learnFromOutcome(decisionState, decisionAction, -20);
                        gameState = GAME_STATES.GAME_OVER;
                        return;
                    }
                } else {
                    // 地面障碍物：碰到 = 死
                    if (robot.y - robot.height < ob.y + ob.height && robot.y > ob.y) {
                        learnFromOutcome(decisionState, decisionAction, -20);
                        gameState = GAME_STATES.GAME_OVER;
                        return;
                    }
                }
            }
        }

        // ============ Q-learning 核心：只在关键事件时更新 ============
        function learnFromOutcome(state, action, reward) {
            if (!state || !action) return;

            var q = qGet(state);
            var oldValue = q[action];

            // 简化Q-update：Q(s,a) += LR * (reward - Q(s,a))
            // 不依赖下一状态，直接用即时奖励（因为每个障碍物事件是独立的）
            q[action] = oldValue + LR * (reward - oldValue);

            // 衰减探索率
            if (explorationRate > 0.05) {
                explorationRate *= 0.998;
            }

            decisionState = null;
            decisionAction = null;
        }

        // ============ 辅助函数 ============
        function getClosestObstacle() {
            var closest = null;
            var minDist = Infinity;
            for (var i = 0; i < obstacles.length; i++) {
                var d = obstacles[i].x - robot.x;
                if (d > 0 && d < minDist) {
                    minDist = d;
                    closest = obstacles[i];
                }
            }
            return closest;
        }

        function createObstacle() {
            obstacleCounter++;
            var t;
            if (obstacleCounter % 4 === 0) {
                t = { w: 70, h: 14, c: '#ff00ff', tid: OT.BEAM, y: GAME_CONSTANTS.GROUND_Y - 65 };
            } else {
                var pool = [
                    { w: 24, h: 26, c: '#ff0000', tid: OT.RED },
                    { w: 28, h: 20, c: '#ffaa00', tid: OT.YELLOW },
                    { w: 22, h: 32, c: '#0000ff', tid: OT.BLUE }
                ];
                t = pool[Math.floor(Math.random() * pool.length)];
            }
            obstacles.push({
                _id: ++_obsIdCounter,
                _handled: false,
                x: GAME_CONSTANTS.WIDTH,
                y: t.tid === OT.BEAM ? t.y : GAME_CONSTANTS.GROUND_Y - t.h,
                width: t.w, height: t.h,
                color: t.c, typeId: t.tid,
                speed: currentSpeed
            });
        }

        function updateScore() {
            scoreTimer += 16;
            if (scoreTimer >= scoreInterval) {
                score++;
                scoreElement.textContent = score;
                scoreTimer = 0;
            }
        }

        function restartGame() {
            gameState = GAME_STATES.PLAYING;
            score = 0;
            scoreElement.textContent = 0;
            currentSpeed = 7;
            robot.y = GAME_CONSTANTS.GROUND_Y;
            robot.velocity = 0;
            robot.isJumping = false;
            obstacles = [];
            obstaclesTimer = 0;
            obstacleCounter = 0;
            obstaclesInterval = 850;
            decisionState = null;
            decisionAction = null;
            obstacleHandled = false;
            gameOverElement.style.display = 'none';
            startScreenElement.style.display = 'none';
        }

        // ============ 渲染函数 ============
        function drawBackground() {
            var gy = GAME_CONSTANTS.GROUND_Y;
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, GAME_CONSTANTS.WIDTH, gy);
            ctx.fillStyle = '#333';
            ctx.fillRect(0, gy, GAME_CONSTANTS.WIDTH, GAME_CONSTANTS.HEIGHT - gy);
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 1;
            for (var x = 0; x < GAME_CONSTANTS.WIDTH; x += 14) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, gy); ctx.stroke();
            }
            for (var y = 0; y < gy; y += 14) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(GAME_CONSTANTS.WIDTH, y); ctx.stroke();
            }
        }

        function drawRobot() {
            var rx = robot.x, ry = robot.y, rh = robot.height, rw = robot.width;
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(rx, ry - rh, rw, rh);
            ctx.fillStyle = '#00cc00';
            ctx.fillRect(rx + 10, ry - rh - 10, 12, 10);
            ctx.fillStyle = '#000';
            ctx.fillRect(rx + 13, ry - rh - 7, 3, 3);
            ctx.fillRect(rx + 16, ry - rh - 7, 3, 3);
            ctx.fillStyle = '#00ff00';
            if (robot.isJumping) {
                ctx.fillRect(rx - 3, ry - rh + 6, 3, 10);
                ctx.fillRect(rx + rw, ry - rh + 6, 3, 10);
            } else {
                if (robot.frame % 2 === 0) {
                    ctx.fillRect(rx - 3, ry - rh + 3, 3, 10);
                    ctx.fillRect(rx + rw, ry - rh + 10, 3, 10);
                } else {
                    ctx.fillRect(rx - 3, ry - rh + 10, 3, 10);
                    ctx.fillRect(rx + rw, ry - rh + 3, 3, 10);
                }
            }
            if (!robot.isJumping) {
                ctx.fillStyle = '#00ff00';
                if (robot.frame % 2 === 0) {
                    ctx.fillRect(rx + 6, ry, 6, 10);
                    ctx.fillRect(rx + 20, ry - 3, 6, 10);
                } else {
                    ctx.fillRect(rx + 6, ry - 3, 6, 10);
                    ctx.fillRect(rx + 20, ry, 6, 10);
                }
            }
            robot.frame++;
        }

        function updateRobot() {
            robot.velocity += GAME_CONSTANTS.GRAVITY;
            robot.y += robot.velocity;
            if (robot.y > GAME_CONSTANTS.GROUND_Y) {
                robot.y = GAME_CONSTANTS.GROUND_Y;
                robot.velocity = 0;
                robot.isJumping = false;
            }
        }

        function drawObstacles() {
            for (var i = 0; i < obstacles.length; i++) {
                var ob = obstacles[i];
                ctx.fillStyle = ob.color;
                ctx.fillRect(ob.x, ob.y, ob.width, ob.height);
                ctx.fillStyle = '#000';
                ctx.fillRect(ob.x + 3, ob.y + 3, ob.width - 6, ob.height - 6);
            }
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
