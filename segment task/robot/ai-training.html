<!DOCTYPE html>
<html lang="zh-CN">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AI训练模式</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: Arial, sans-serif;
                background-color: transparent;
                display: flex;
                justify-content: center;
                align-items: flex-start;
                min-height: 100%;
                overflow: hidden;
            }

            .game-container {
                position: relative;
                text-align: center;
                background-color: #000;
                border-radius: 10px;
                padding: 15px;
                box-shadow: 0 0 15px rgba(0, 0, 0, 0.6);
                display: inline-block;
            }

            .game-title {
                color: #00ff00;
                font-size: 18px;
                font-weight: bold;
                margin-bottom: 12px;
                text-shadow: 0 0 10px #00ff00;
            }

            canvas {
                background-color: #111;
                border: 2px solid #00ff00;
                border-radius: 5px;
            }

            .game-info {
                display: flex;
                justify-content: space-between;
                margin-top: 8px;
                color: #00ff00;
                font-size: 13px;
            }

            .score {
                font-weight: bold;
            }

            .instructions {
                font-style: italic;
            }

            .game-over {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background-color: rgba(0, 0, 0, 0.8);
                border: 2px solid #ff0000;
                border-radius: 10px;
                padding: 20px;
                color: #ff0000;
                display: none;
            }

            .game-over-text {
                font-size: 24px;
                font-weight: bold;
                margin-bottom: 10px;
            }

            .final-score {
                margin-bottom: 20px;
                font-size: 18px;
            }

            #restartButton {
                background-color: #ff0000;
                color: white;
                border: none;
                padding: 10px 20px;
                font-size: 16px;
                border-radius: 5px;
                cursor: pointer;
                transition: background-color 0.3s;
            }

            #restartButton:hover {
                background-color: #cc0000;
            }

            .ai-stats {
                display: flex;
                justify-content: space-between;
                margin-top: 8px;
                color: #00ff00;
                font-size: 12px;
            }

            .attempts, .ai-high-score {
                font-weight: bold;
            }
            
            #resetAiButton {
                background-color: #ff6600;
                color: white;
                border: none;
                padding: 4px 8px;
                font-size: 10px;
                border-radius: 3px;
                cursor: pointer;
                margin-left: 8px;
            }
            
            #resetAiButton:hover {
                background-color: #cc5200;
            }

            .start-screen {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background-color: rgba(0, 0, 0, 0.8);
                border: 2px solid #00ff00;
                border-radius: 8px;
                padding: 15px;
                color: #00ff00;
            }

            .start-text {
                font-size: 16px;
                font-weight: bold;
            }
        </style>
    </head>
<body>
    <div class="game-container">
        <div class="game-title">AI训练模式</div>
        <canvas id="gameCanvas" width="480" height="180"></canvas>
        <div class="game-info">
            <div class="score">得分: <span id="score">0</span></div>
            <div class="instructions">AI正在自动训练...</div>
        </div>
        <div class="ai-stats" id="aiStats">
            <div class="attempts">尝试次数: <span id="attempts">0</span></div>
            <div class="ai-high-score">最高得分: <span id="aiHighScore">0</span></div>
            <button id="resetAiButton">重置AI训练</button>
        </div>
        <div class="game-over" id="gameOver">
            <div class="game-over-text">游戏结束</div>
            <div class="final-score">最终得分: <span id="finalScore">0</span></div>
            <button id="restartButton">重新开始</button>
        </div>
        <div class="start-screen" id="startScreen">
            <div class="start-text">按空格键开始AI训练</div>
        </div>
    </div>
    <script>
        const GAME_CONSTANTS = {
            WIDTH: 480,
            HEIGHT: 180,
            GRAVITY: 0.6,
            JUMP_FORCE: -11,
            GROUND_Y: 115,
            BASE_SPEED: 4,
            MAX_SPEED: 10,
            SPEED_INCREMENT: 0.01
        };

        const GAME_STATES = {
            START: 'start',
            PLAYING: 'playing',
            GAME_OVER: 'gameOver'
        };

        let gameState = GAME_STATES.START;
        let currentSpeed = 8;
        let scoreTimer = 0;
        let scoreInterval = 100;

        let mode2Data = {
            score: 0,
            attempts: 0,
            highScore: 0
        };

        let score = 0;

        const Q_LEARNING = {
            LEARNING_RATE: 0.15,
            DISCOUNT_FACTOR: 0.95,
            EXPLORATION_RATE: 0.25,
            EXPLORATION_DECAY: 0.9993,
            MIN_EXPLORATION: 0.02
        };

        // 障碍物类型: 0=红色地面, 1=黄色地面, 2=蓝色地面, 3=横梁
        const OBSTACLE_TYPES = { RED: 0, YELLOW: 1, BLUE: 2, BEAM: 3 };

        let qTable = {};

        function initializeQTableWithCommonSense() {
            for (let d = 0; d < 10; d++) {
                for (let s = 0; s < 5; s++) {
                    for (let j = 0; j < 2; j++) {
                        // 地面障碍物(类型0-2)：正常从零开始，AI自己试错学习
                        for (let t = 0; t < 3; t++) {
                            qTable[d + ',' + t + ',' + s + ',' + j] = { jump: 0, wait: 0 };
                        }
                        // 横梁(类型3)：跳跃初始化为负值，AI学会不跳
                        qTable[d + ',3,' + s + ',' + j] = { jump: -50, wait: 0 };
                    }
                }
            }
        }

        initializeQTableWithCommonSense();

        const STATE_PARAMS = {
            DISTANCE_BUCKETS: 10,
            SPEED_BUCKETS: 5,
            MAX_DISTANCE: 300
        };

        let robot = {
            x: 35,
            y: GAME_CONSTANTS.GROUND_Y,
            width: 32,
            height: 32,
            velocity: 0,
            isJumping: false,
            frame: 0
        };

        let obstacles = [];
        let obstaclesTimer = 0;
        let obstaclesInterval = 800;
        let obstacleCounter = 0;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const scoreElement = document.getElementById('score');
        const finalScoreElement = document.getElementById('finalScore');
        const gameOverElement = document.getElementById('gameOver');
        const restartButton = document.getElementById('restartButton');

        restartButton.addEventListener('click', restartGame);
        document.addEventListener('keydown', handleKeyDown);

        const startScreenElement = document.getElementById('startScreen');

        function handleKeyDown(event) {
            if (event.code === 'Space') {
                event.preventDefault();
                if (gameState === GAME_STATES.START) {
                    gameState = GAME_STATES.PLAYING;
                    startScreenElement.style.display = 'none';
                }
            }
        }

        document.getElementById('resetAiButton').addEventListener('click', () => {
            if (confirm('确定要重置AI训练数据吗？这将清空所有训练进度。')) {
                resetAiTraining();
                qTable = {};
                initializeQTableWithCommonSense();
                Q_LEARNING.EXPLORATION_RATE = 0.25;
                restartGame();
                alert('AI训练数据已重置');
            }
        });

        function gameLoop(timestamp) {
            ctx.clearRect(0, 0, GAME_CONSTANTS.WIDTH, GAME_CONSTANTS.HEIGHT);
            drawBackground();

            let previousState = getState();
            let action = aiTakeAction();

            switch (gameState) {
                case GAME_STATES.START:
                    drawRobot();
                    break;
                case GAME_STATES.PLAYING:
                    updateRobot();
                    drawRobot();
                    updateObstacles();
                    drawObstacles();
                    checkCollision();
                    updateScore();

                    if (previousState && action) {
                        const nextState = getState();
                        const reward = calculateReward();
                        updateQTable(previousState, action, reward, nextState);

                        if (Q_LEARNING.EXPLORATION_RATE > Q_LEARNING.MIN_EXPLORATION) {
                            Q_LEARNING.EXPLORATION_RATE *= Q_LEARNING.EXPLORATION_DECAY;
                        }
                    }
                    break;
                case GAME_STATES.GAME_OVER:
                    drawRobot();
                    drawObstacles();
                    
                    mode2Data.attempts++;
                    if (score > mode2Data.highScore) {
                        mode2Data.highScore = score;
                    }

                    document.getElementById('attempts').textContent = mode2Data.attempts;
                    document.getElementById('aiHighScore').textContent = mode2Data.highScore;

                    restartGame();
                    break;
            }

            requestAnimationFrame(gameLoop);
        }

        function drawBackground() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, GAME_CONSTANTS.WIDTH, GAME_CONSTANTS.GROUND_Y);
            ctx.fillStyle = '#333';
            ctx.fillRect(0, GAME_CONSTANTS.GROUND_Y, GAME_CONSTANTS.WIDTH, GAME_CONSTANTS.HEIGHT - GAME_CONSTANTS.GROUND_Y);
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 1;
            for (let x = 0; x < GAME_CONSTANTS.WIDTH; x += 14) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, GAME_CONSTANTS.GROUND_Y);
                ctx.stroke();
            }
            for (let y = 0; y < GAME_CONSTANTS.GROUND_Y; y += 14) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(GAME_CONSTANTS.WIDTH, y);
                ctx.stroke();
            }
        }

        function drawRobot() {
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(robot.x, robot.y - robot.height, robot.width, robot.height);
            ctx.fillStyle = '#00cc00';
            ctx.fillRect(robot.x + 10, robot.y - robot.height - 10, 12, 10);
            ctx.fillStyle = '#000';
            ctx.fillRect(robot.x + 13, robot.y - robot.height - 7, 3, 3);
            ctx.fillRect(robot.x + 16, robot.y - robot.height - 7, 3, 3);

            if (robot.isJumping) {
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(robot.x - 3, robot.y - robot.height + 6, 3, 10);
                ctx.fillRect(robot.x + robot.width, robot.y - robot.height + 6, 3, 10);
            } else {
                ctx.fillStyle = '#00ff00';
                if (robot.frame % 2 === 0) {
                    ctx.fillRect(robot.x - 3, robot.y - robot.height + 3, 3, 10);
                    ctx.fillRect(robot.x + robot.width, robot.y - robot.height + 10, 3, 10);
                } else {
                    ctx.fillRect(robot.x - 3, robot.y - robot.height + 10, 3, 10);
                    ctx.fillRect(robot.x + robot.width, robot.y - robot.height + 3, 3, 10);
                }
            }

            if (!robot.isJumping) {
                if (robot.frame % 2 === 0) {
                    ctx.fillStyle = '#00ff00';
                    ctx.fillRect(robot.x + 6, robot.y, 6, 10);
                    ctx.fillRect(robot.x + 20, robot.y - 3, 6, 10);
                } else {
                    ctx.fillStyle = '#00ff00';
                    ctx.fillRect(robot.x + 6, robot.y - 3, 6, 10);
                    ctx.fillRect(robot.x + 20, robot.y, 6, 10);
                }
            }

            robot.frame++;
        }

        function updateRobot() {
            robot.velocity += GAME_CONSTANTS.GRAVITY;
            robot.y += robot.velocity;

            if (robot.y > GAME_CONSTANTS.GROUND_Y) {
                robot.y = GAME_CONSTANTS.GROUND_Y;
                robot.velocity = 0;
                robot.isJumping = false;
            }
        }

        function jump() {
            robot.velocity = GAME_CONSTANTS.JUMP_FORCE;
            robot.isJumping = true;
        }

        function createObstacle() {
            obstacleCounter++;
            let type;

            // 每4个障碍物中的第4个是横梁，形成可学习的规律
            if (obstacleCounter % 4 === 0) {
                type = { width: 70, height: 14, color: '#ff00ff', typeId: OBSTACLE_TYPES.BEAM, y: GAME_CONSTANTS.GROUND_Y - 65 };
            } else {
                // 红黄蓝各有独立类型ID，AI能分别学习每种障碍物的跳跃策略
                const groundObstacles = [
                    { width: 24, height: 26, color: '#ff0000', typeId: OBSTACLE_TYPES.RED },
                    { width: 28, height: 20, color: '#ffaa00', typeId: OBSTACLE_TYPES.YELLOW },
                    { width: 22, height: 32, color: '#0000ff', typeId: OBSTACLE_TYPES.BLUE }
                ];
                type = groundObstacles[Math.floor(Math.random() * groundObstacles.length)];
            }

            obstacles.push({
                x: GAME_CONSTANTS.WIDTH,
                y: type.typeId === OBSTACLE_TYPES.BEAM ? type.y : GAME_CONSTANTS.GROUND_Y - type.height,
                width: type.width,
                height: type.height,
                color: type.color,
                typeId: type.typeId,
                speed: currentSpeed
            });
        }

        function updateObstacles() {
            obstaclesTimer += 16;

            if (obstaclesTimer >= obstaclesInterval) {
                createObstacle();
                obstaclesTimer = 0;
            }

            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].x -= obstacles[i].speed;

                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    i--;
                }
            }
        }

        function drawObstacles() {
            for (let obstacle of obstacles) {
                ctx.fillStyle = obstacle.color;
                ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
                ctx.fillStyle = '#000';
                ctx.fillRect(obstacle.x + 3, obstacle.y + 3, obstacle.width - 6, obstacle.height - 6);
            }
        }

        function checkCollision() {
            for (let obstacle of obstacles) {
                if (obstacle.typeId === OBSTACLE_TYPES.BEAM) {
                    if (
                        robot.x < obstacle.x + obstacle.width &&
                        robot.x + robot.width > obstacle.x &&
                        robot.y - robot.height < obstacle.y + obstacle.height &&
                        robot.isJumping
                    ) {
                        gameState = GAME_STATES.GAME_OVER;
                        break;
                    }
                } else {
                    if (
                        robot.x < obstacle.x + obstacle.width &&
                        robot.x + robot.width > obstacle.x &&
                        robot.y - robot.height < obstacle.y + obstacle.height &&
                        robot.y > obstacle.y
                    ) {
                        gameState = GAME_STATES.GAME_OVER;
                        break;
                    }
                }
            }
        }

        function updateScore() {
            scoreTimer += 16;
            if (scoreTimer >= scoreInterval) {
                score++;
                scoreElement.textContent = score;
                mode2Data.score = score;
                scoreTimer = 0;
            }
        }

        function restartGame() {
            gameState = GAME_STATES.PLAYING;
            score = 0;
            scoreElement.textContent = score;
            currentSpeed = 8;
            robot.y = GAME_CONSTANTS.GROUND_Y;
            robot.velocity = 0;
            robot.isJumping = false;
            obstacles = [];
            obstaclesTimer = 0;
            obstacleCounter = 0;
            obstaclesInterval = 800;
            gameOverElement.style.display = 'none';
        }

        function getState() {
            let closestObstacle = null;
            let minDistance = Infinity;

            for (let obstacle of obstacles) {
                if (obstacle.x > robot.x && obstacle.x - robot.x < minDistance) {
                    minDistance = obstacle.x - robot.x;
                    closestObstacle = obstacle;
                }
            }

            let distanceBucket = 0;
            let obstacleType = 0;

            if (closestObstacle) {
                distanceBucket = Math.min(
                    STATE_PARAMS.DISTANCE_BUCKETS - 1,
                    Math.floor(minDistance / (STATE_PARAMS.MAX_DISTANCE / STATE_PARAMS.DISTANCE_BUCKETS))
                );
                obstacleType = closestObstacle.typeId;
            }

            let speedBucket = Math.min(
                STATE_PARAMS.SPEED_BUCKETS - 1,
                Math.floor((currentSpeed - GAME_CONSTANTS.BASE_SPEED) / ((GAME_CONSTANTS.MAX_SPEED - GAME_CONSTANTS.BASE_SPEED) / STATE_PARAMS.SPEED_BUCKETS))
            );

            let jumpState = robot.isJumping ? 1 : 0;

            return `${distanceBucket},${obstacleType},${speedBucket},${jumpState}`;
        }

        function selectAction(state) {
            if (Math.random() < Q_LEARNING.EXPLORATION_RATE) {
                return Math.random() > 0.5 ? 'jump' : 'wait';
            } else {
                if (!qTable[state]) {
                    qTable[state] = { jump: 0, wait: 0 };
                }
                return qTable[state].jump > qTable[state].wait ? 'jump' : 'wait';
            }
        }

        function updateQTable(state, action, reward, nextState) {
            if (!qTable[state]) {
                qTable[state] = { jump: 0, wait: 0 };
            }

            if (!qTable[nextState]) {
                qTable[nextState] = { jump: 0, wait: 0 };
            }

            const bestNextAction = qTable[nextState].jump > qTable[nextState].wait ? 'jump' : 'wait';
            const tdTarget = reward + Q_LEARNING.DISCOUNT_FACTOR * qTable[nextState][bestNextAction];
            const tdError = tdTarget - qTable[state][action];
            qTable[state][action] += Q_LEARNING.LEARNING_RATE * tdError;
        }

        function calculateReward() {
            let reward = 0.1;
            reward += score * 0.02;
            if (gameState === GAME_STATES.GAME_OVER) {
                reward -= 15;
            }
            return reward;
        }

        function aiTakeAction() {
            const state = getState();
            const action = selectAction(state);

            if (action === 'jump' && !robot.isJumping) {
                jump();
            }

            return action;
        }

        function resetAiTraining() {
            mode2Data.attempts = 0;
            mode2Data.highScore = 0;
            mode2Data.score = 0;
            document.getElementById('attempts').textContent = mode2Data.attempts;
            document.getElementById('aiHighScore').textContent = mode2Data.highScore;
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
