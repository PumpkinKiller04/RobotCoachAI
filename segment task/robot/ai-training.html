<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI训练模式</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100%;
            overflow: hidden;
        }
        .game-container {
            position: relative;
            text-align: center;
            background-color: #000;
            border-radius: 10px;
            padding: 12px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.6);
            display: inline-block;
        }
        .game-title {
            color: #00ff00;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            text-shadow: 0 0 10px #00ff00;
        }
        canvas {
            background-color: #111;
            border: 2px solid #00ff00;
            border-radius: 5px;
        }
        .game-info {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            color: #00ff00;
            font-size: 12px;
        }
        .score { font-weight: bold; }
        .instructions { font-style: italic; }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.85);
            border: 2px solid #ff0000;
            border-radius: 10px;
            padding: 18px;
            color: #ff0000;
            display: none;
            z-index: 10;
        }
        .game-over-text {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .final-score { margin-bottom: 16px; font-size: 16px; }
        #restartButton {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #restartButton:hover { background-color: #cc0000; }
        .ai-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
            color: #00ff00;
            font-size: 11px;
        }
        #resetAiButton {
            background-color: #ff6600;
            color: white;
            border: none;
            padding: 3px 7px;
            font-size: 10px;
            border-radius: 3px;
            cursor: pointer;
        }
        #resetAiButton:hover { background-color: #cc5200; }
        .start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.85);
            border: 2px solid #00ff00;
            border-radius: 8px;
            padding: 14px;
            color: #00ff00;
            z-index: 10;
        }
        .start-text { font-size: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-title">AI训练模式</div>
        <canvas id="gameCanvas" width="480" height="200"></canvas>
        <div class="game-info">
            <div class="score">得分: <span id="score">0</span></div>
            <div class="instructions">AI正在自动训练...</div>
        </div>
        <div class="ai-stats" id="aiStats">
            <span>尝试: <span id="attempts">0</span></span>
            <span>最高: <span id="aiHighScore">0</span></span>
            <button id="resetAiButton">重置AI训练</button>
        </div>
        <div class="game-over" id="gameOver">
            <div class="game-over-text">游戏结束</div>
            <div class="final-score">最终得分: <span id="finalScore">0</span></div>
            <button id="restartButton">重新开始</button>
        </div>
        <div class="start-screen" id="startScreen">
            <div class="start-text">按空格键开始AI训练</div>
        </div>
    </div>

    <script>
        const GAME_CONSTANTS = {
            WIDTH: 480,
            HEIGHT: 200,
            GRAVITY: 0.6,
            JUMP_FORCE: -11.5,
            GROUND_Y: 135,
            BASE_SPEED: 5,
            MAX_SPEED: 10,
            SPEED_INCREMENT: 0.005
        };

        const GAME_STATES = {
            START: 'start',
            PLAYING: 'playing',
            GAME_OVER: 'gameOver'
        };

        const Q_LEARNING = {
            LEARNING_RATE: 0.1,
            DISCOUNT_FACTOR: 0.95,
            EXPLORATION_RATE: 0.15,
            EXPLORATION_DECAY: 0.9995,
            MIN_EXPLORATION: 0.02
        };

        const STATE_PARAMS = {
            DISTANCE_BUCKETS: 10,
            SPEED_BUCKETS: 5,
            MAX_DISTANCE: 280
        };

        let gameState = GAME_STATES.START;
        let currentSpeed = 7;
        let score = 0;
        let scoreTimer = 0;
        let scoreInterval = 100;
        let aiAttempts = 0;
        let aiHighScore = 0;

        let robot = {
            x: 40,
            y: GAME_CONSTANTS.GROUND_Y,
            width: 40,
            height: 40,
            velocity: 0,
            isJumping: false,
            frame: 0
        };

        let obstacles = [];
        let obstaclesTimer = 0;
        let obstaclesInterval = 900;
        let obstacleCounter = 0;

        let qTable = {};

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const scoreElement = document.getElementById('score');
        const finalScoreElement = document.getElementById('finalScore');
        const gameOverElement = document.getElementById('gameOver');
        const startScreenElement = document.getElementById('startScreen');
        const restartButton = document.getElementById('restartButton');

        restartButton.addEventListener('click', restartGame);
        document.addEventListener('keydown', handleKeyDown);

        document.getElementById('resetAiButton').addEventListener('click', function() {
            if (confirm('确定要重置AI训练数据吗？这将清空所有训练进度。')) {
                aiAttempts = 0;
                aiHighScore = 0;
                document.getElementById('attempts').textContent = 0;
                document.getElementById('aiHighScore').textContent = 0;
                qTable = {};
                initQTable();
                Q_LEARNING.EXPLORATION_RATE = 0.15;
                restartGame();
                alert('AI训练数据已重置');
            }
        });

        function initQTable() {
            for (let d = 0; d < STATE_PARAMS.DISTANCE_BUCKETS; d++) {
                for (let s = 0; s < STATE_PARAMS.SPEED_BUCKETS; s++) {
                    for (let j = 0; j < 2; j++) {
                        // 地面障碍物：正常从零开始
                        qTable[d + ',0,' + s + ',' + j] = { jump: 0, wait: 0 };
                        // 横梁障碍物：跳跃初始化为负值，AI 学会不跳
                        qTable[d + ',1,' + s + ',' + j] = { jump: -50, wait: 0 };
                    }
                }
            }
        }
        initQTable();

        function handleKeyDown(event) {
            if (event.code === 'Space') {
                event.preventDefault();
                if (gameState === GAME_STATES.START) {
                    gameState = GAME_STATES.PLAYING;
                    startScreenElement.style.display = 'none';
                }
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, GAME_CONSTANTS.WIDTH, GAME_CONSTANTS.HEIGHT);
            drawBackground();

            var previousState = getState();
            var action = aiTakeAction();

            switch (gameState) {
                case GAME_STATES.START:
                    drawRobot();
                    break;
                case GAME_STATES.PLAYING:
                    updateRobot();
                    drawRobot();
                    updateObstacles();
                    drawObstacles();
                    checkCollision();
                    updateScore();

                    if (previousState && action) {
                        var nextState = getState();
                        var reward = calculateReward();
                        updateQTable(previousState, action, reward, nextState);
                        if (Q_LEARNING.EXPLORATION_RATE > Q_LEARNING.MIN_EXPLORATION) {
                            Q_LEARNING.EXPLORATION_RATE *= Q_LEARNING.EXPLORATION_DECAY;
                        }
                    }
                    break;
                case GAME_STATES.GAME_OVER:
                    drawRobot();
                    drawObstacles();
                    aiAttempts++;
                    if (score > aiHighScore) aiHighScore = score;
                    document.getElementById('attempts').textContent = aiAttempts;
                    document.getElementById('aiHighScore').textContent = aiHighScore;
                    restartGame();
                    break;
            }

            // 每10帧更新探索率显示
            if (aiAttempts > 0 && aiAttempts % 10 === 0 && gameState === GAME_STATES.PLAYING) {
                // 静默更新
            }

            requestAnimationFrame(gameLoop);
        }

        function drawBackground() {
            var gy = GAME_CONSTANTS.GROUND_Y;
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, GAME_CONSTANTS.WIDTH, gy);
            ctx.fillStyle = '#333';
            ctx.fillRect(0, gy, GAME_CONSTANTS.WIDTH, GAME_CONSTANTS.HEIGHT - gy);
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 1;
            for (var x = 0; x < GAME_CONSTANTS.WIDTH; x += 16) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, gy);
                ctx.stroke();
            }
            for (var y = 0; y < gy; y += 16) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(GAME_CONSTANTS.WIDTH, y);
                ctx.stroke();
            }
        }

        function drawRobot() {
            var rx = robot.x, ry = robot.y, rh = robot.height, rw = robot.width;
            // 身体
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(rx, ry - rh, rw, rh);
            // 头部
            ctx.fillStyle = '#00cc00';
            ctx.fillRect(rx + 12, ry - rh - 13, 16, 13);
            // 眼睛
            ctx.fillStyle = '#000';
            ctx.fillRect(rx + 15, ry - rh - 9, 4, 4);
            ctx.fillRect(rx + 21, ry - rh - 9, 4, 4);
            // 手臂
            ctx.fillStyle = '#00ff00';
            if (robot.isJumping) {
                ctx.fillRect(rx - 4, ry - rh + 8, 4, 12);
                ctx.fillRect(rx + rw, ry - rh + 8, 4, 12);
            } else {
                if (robot.frame % 2 === 0) {
                    ctx.fillRect(rx - 4, ry - rh + 4, 4, 12);
                    ctx.fillRect(rx + rw, ry - rh + 12, 4, 12);
                } else {
                    ctx.fillRect(rx - 4, ry - rh + 12, 4, 12);
                    ctx.fillRect(rx + rw, ry - rh + 4, 4, 12);
                }
            }
            // 腿
            if (!robot.isJumping) {
                ctx.fillStyle = '#00ff00';
                if (robot.frame % 2 === 0) {
                    ctx.fillRect(rx + 8, ry, 8, 12);
                    ctx.fillRect(rx + 24, ry - 4, 8, 12);
                } else {
                    ctx.fillRect(rx + 8, ry - 4, 8, 12);
                    ctx.fillRect(rx + 24, ry, 8, 12);
                }
            }
            robot.frame++;
        }

        function updateRobot() {
            robot.velocity += GAME_CONSTANTS.GRAVITY;
            robot.y += robot.velocity;
            if (robot.y > GAME_CONSTANTS.GROUND_Y) {
                robot.y = GAME_CONSTANTS.GROUND_Y;
                robot.velocity = 0;
                robot.isJumping = false;
            }
        }

        function jump() {
            if (!robot.isJumping) {
                robot.velocity = GAME_CONSTANTS.JUMP_FORCE;
                robot.isJumping = true;
            }
        }

        function createObstacle() {
            obstacleCounter++;
            var type;
            // 每4个障碍物中的第4个是横梁，形成可学习的规律
            if (obstacleCounter % 4 === 0) {
                type = { width: 90, height: 16, color: '#ff00ff', type: 'beam', y: GAME_CONSTANTS.GROUND_Y - 72 };
            } else {
                var groundObs = [
                    { width: 24, height: 34, color: '#ff0000', type: 'ground' },
                    { width: 32, height: 26, color: '#ffaa00', type: 'ground' },
                    { width: 20, height: 42, color: '#0000ff', type: 'ground' }
                ];
                type = groundObs[Math.floor(Math.random() * groundObs.length)];
            }
            obstacles.push({
                x: GAME_CONSTANTS.WIDTH,
                y: type.type === 'beam' ? type.y : GAME_CONSTANTS.GROUND_Y - type.height,
                width: type.width,
                height: type.height,
                color: type.color,
                type: type.type,
                speed: currentSpeed
            });
        }

        function updateObstacles() {
            obstaclesTimer += 16;
            if (obstaclesTimer >= obstaclesInterval) {
                createObstacle();
                obstaclesTimer = 0;
            }
            for (var i = 0; i < obstacles.length; i++) {
                obstacles[i].x -= obstacles[i].speed;
                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    i--;
                }
            }
        }

        function drawObstacles() {
            for (var i = 0; i < obstacles.length; i++) {
                var ob = obstacles[i];
                ctx.fillStyle = ob.color;
                ctx.fillRect(ob.x, ob.y, ob.width, ob.height);
                ctx.fillStyle = 'rgba(0,0,0,0.35)';
                ctx.fillRect(ob.x + 4, ob.y + 3, ob.width - 8, ob.height - 6);
            }
        }

        function checkCollision() {
            for (var i = 0; i < obstacles.length; i++) {
                var ob = obstacles[i];
                if (ob.type === 'beam') {
                    // 横梁：跳跃时碰到才死，不跳就能安全通过
                    if (robot.isJumping &&
                        robot.x < ob.x + ob.width &&
                        robot.x + robot.width > ob.x &&
                        robot.y - robot.height < ob.y + ob.height &&
                        robot.y > ob.y) {
                        gameState = GAME_STATES.GAME_OVER;
                        break;
                    }
                } else {
                    // 地面障碍物：必须跳过去
                    if (robot.x < ob.x + ob.width &&
                        robot.x + robot.width > ob.x &&
                        robot.y - robot.height < ob.y + ob.height &&
                        robot.y > ob.y) {
                        gameState = GAME_STATES.GAME_OVER;
                        break;
                    }
                }
            }
        }

        function updateScore() {
            scoreTimer += 16;
            if (scoreTimer >= scoreInterval) {
                score++;
                scoreElement.textContent = score;
                scoreTimer = 0;
            }
        }

        function restartGame() {
            gameState = GAME_STATES.PLAYING;
            score = 0;
            scoreElement.textContent = 0;
            currentSpeed = 7;
            robot.y = GAME_CONSTANTS.GROUND_Y;
            robot.velocity = 0;
            robot.isJumping = false;
            obstacles = [];
            obstaclesTimer = 0;
            obstacleCounter = 0;
            obstaclesInterval = 900;
            gameOverElement.style.display = 'none';
            startScreenElement.style.display = 'none';
        }

        function getState() {
            var closestObstacle = null;
            var minDistance = Infinity;
            for (var i = 0; i < obstacles.length; i++) {
                if (obstacles[i].x > robot.x && (obstacles[i].x - robot.x) < minDistance) {
                    minDistance = obstacles[i].x - robot.x;
                    closestObstacle = obstacles[i];
                }
            }
            var distanceBucket = 0;
            var obstacleType = 0;
            if (closestObstacle) {
                distanceBucket = Math.min(
                    STATE_PARAMS.DISTANCE_BUCKETS - 1,
                    Math.floor(minDistance / (STATE_PARAMS.MAX_DISTANCE / STATE_PARAMS.DISTANCE_BUCKETS))
                );
                obstacleType = closestObstacle.type === 'beam' ? 1 : 0;
            }
            var speedBucket = Math.min(
                STATE_PARAMS.SPEED_BUCKETS - 1,
                Math.floor((currentSpeed - GAME_CONSTANTS.BASE_SPEED) / ((GAME_CONSTANTS.MAX_SPEED - GAME_CONSTANTS.BASE_SPEED) / STATE_PARAMS.SPEED_BUCKETS))
            );
            var jumpState = robot.isJumping ? 1 : 0;
            return distanceBucket + ',' + obstacleType + ',' + speedBucket + ',' + jumpState;
        }

        function selectAction(state) {
            if (Math.random() < Q_LEARNING.EXPLORATION_RATE) {
                return Math.random() > 0.5 ? 'jump' : 'wait';
            }
            if (!qTable[state]) {
                qTable[state] = { jump: 0, wait: 0 };
            }
            return qTable[state].jump > qTable[state].wait ? 'jump' : 'wait';
        }

        function updateQTable(state, action, reward, nextState) {
            if (!qTable[state]) qTable[state] = { jump: 0, wait: 0 };
            if (!qTable[nextState]) qTable[nextState] = { jump: 0, wait: 0 };
            var bestNext = qTable[nextState].jump > qTable[nextState].wait ? 'jump' : 'wait';
            var tdTarget = reward + Q_LEARNING.DISCOUNT_FACTOR * qTable[nextState][bestNext];
            var tdError = tdTarget - qTable[state][action];
            qTable[state][action] += Q_LEARNING.LEARNING_RATE * tdError;
        }

        function calculateReward() {
            var reward = 0.1;
            reward += score * 0.02;
            if (gameState === GAME_STATES.GAME_OVER) {
                reward -= 10;
            }
            return reward;
        }

        function aiTakeAction() {
            var state = getState();
            var action = selectAction(state);
            if (action === 'jump') jump();
            return action;
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
