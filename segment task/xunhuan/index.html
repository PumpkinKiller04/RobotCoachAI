<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>感知→决策→行动 闭环实验</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Microsoft YaHei','PingFang SC',sans-serif;
    font-size:12px;
    background:#0f172a;
    width:620px;
    height:330px;
    overflow:hidden;
}
body::before{
    content:'';
    position:fixed;top:0;left:0;width:100%;height:100%;
    background-image:radial-gradient(rgba(255,255,255,0.03) 1px,transparent 1px);
    background-size:18px 18px;
    pointer-events:none;z-index:0;
}

.container{position:relative;z-index:1;width:620px;height:330px;display:flex;flex-direction:column;}

/* ---- header ---- */
.header{
    padding:5px 16px;
    display:flex;justify-content:space-between;align-items:center;
    border-bottom:1px solid rgba(255,255,255,0.06);
    flex-shrink:0;
}
.title{color:#cbd5e1;font-size:12px;font-weight:500;letter-spacing:0.5px;}
.header-right{display:flex;align-items:center;gap:6px;}
.mode-tag{
    color:#64748b;font-size:10px;
    padding:2px 8px;border-radius:6px;
    border:1px solid rgba(255,255,255,0.08);
}
.btn{
    padding:4px 12px;border:none;border-radius:10px;
    font-size:10px;font-weight:600;
    cursor:pointer;transition:all .25s;
}
.btn-go{background:#22c55e;color:#fff;box-shadow:0 1px 4px rgba(34,197,94,.25);}
.btn-go:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 2px 8px rgba(34,197,94,.35);}
.btn-go:disabled{background:#334155;color:#64748b;cursor:not-allowed;box-shadow:none;}

/* ---- main ---- */
.main{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:5px 14px;gap:4px;
}

/* ---- panel (above canvas) ---- */
.panel{
    width:100%;
    background:rgba(255,255,255,0.02);
    border-radius:6px;
    padding:4px 8px 5px;
    display:flex;flex-direction:column;gap:2px;
    border:1px solid rgba(255,255,255,0.06);
    flex-shrink:0;
}
.panel-title{
    color:#94a3b8;font-size:10px;font-weight:600;
    text-align:center;
}
.panel-list{display:flex;flex-direction:row;gap:6px;justify-content:center;}
.mod{
    flex:1;max-width:150px;padding:5px 8px;border-radius:5px;
    display:flex;align-items:center;gap:6px;
    cursor:grab;transition:all .3s;
    box-shadow:0 1px 4px rgba(0,0,0,.3);
    user-select:none;
}
.mod:hover:not(.used){transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.4);}
.mod.dragging{opacity:.5;}
.mod.used{opacity:.2;cursor:not-allowed;}
.mod .mi{font-size:15px;flex-shrink:0;}
.mod .ml{font-size:11px;font-weight:600;color:#fff;}
.mod .md{font-size:9px;color:rgba(255,255,255,.5);margin-top:0;}
.mod.sb{background:linear-gradient(135deg,#ef4444,#dc2626);}
.mod.db{background:linear-gradient(135deg,#06b6d4,#0891b2);}
.mod.ab{background:linear-gradient(135deg,#f59e0b,#d97706);}

.prog-bar{height:2px;background:rgba(255,255,255,0.08);border-radius:1px;overflow:hidden;}
.prog-fill{height:100%;background:#4ade80;border-radius:1px;transition:width .3s;}

/* ---- canvas ---- */
.canvas-wrap{
    position:relative;
    width:460px;height:240px;flex-shrink:0;
    background:rgba(255,255,255,0.012);
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.05);
}
.canvas-svg{
    position:absolute;top:0;left:0;width:100%;height:100%;
    pointer-events:none;
}
.canvas-svg line{
    stroke:rgba(255,255,255,0.16);
    stroke-width:1.8;
    transition:stroke .4s,opacity .4s;
}
.canvas-svg line.on{stroke:#4ade80;stroke-width:2.2;}
.canvas-svg line.off{opacity:0;}
.canvas-svg line.wait{
    stroke:#fbbf24;stroke-width:2.2;
    stroke-dasharray:5 4;
    animation:dashPulse .8s ease-in-out infinite;
}
@keyframes dashPulse{
    0%,100%{stroke-dashoffset:0;opacity:.6;}
    50%{stroke-dashoffset:-10;opacity:1;}
}

/* ---- drop target ---- */
.dt{
    position:absolute;
    width:44px;height:44px;
    border-radius:50%;
    border:2px dashed rgba(255,255,255,0.13);
    z-index:5;
    transition:border-color .3s,background .3s,transform .2s;
}
.dt.filled{border-color:transparent;}
.dt.hover{border-color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.05);transform:scale(1.04);}
.dt.p1{left:40px;top:98px;}
.dt.p2{left:208px;top:98px;}
.dt.p3{left:376px;top:98px;}
.dt.t1{left:208px;top:16px;}
.dt.t2{left:348px;top:180px;}
.dt.t3{left:68px;top:180px;}

/* ---- placed node ---- */
.node{
    position:absolute;
    width:44px;height:44px;
    border-radius:50%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    box-shadow:0 3px 12px rgba(0,0,0,.5);
    z-index:20;
    cursor:pointer;
    transition:box-shadow .3s,transform .2s;
    user-select:none;
}
.node:hover{transform:scale(1.05);}
.node .ni{font-size:15px;}
.node .nl{font-size:9px;font-weight:700;color:#fff;margin-top:0;letter-spacing:0.5px;}
.node.sense{background:linear-gradient(135deg,#ef4444,#dc2626);}
.node.decision{background:linear-gradient(135deg,#06b6d4,#0891b2);}
.node.action{background:linear-gradient(135deg,#f59e0b,#d97706);}
.node.glow{animation:glowPulse 1s ease-in-out infinite;}
.node.pick{box-shadow:0 0 0 3px #4ade80,0 0 12px rgba(74,222,128,.5);animation:none;}
@keyframes glowPulse{
    0%,100%{box-shadow:0 3px 12px rgba(0,0,0,.5),0 0 3px rgba(251,191,36,.25);}
    50%{box-shadow:0 3px 12px rgba(0,0,0,.5),0 0 10px rgba(251,191,36,.45);}
}

/* ---- robot ---- */
.rb-ct{
    position:absolute;
    z-index:50;pointer-events:none;
    transform:translate(-50%,-75%);
}
.rb-head{
    width:16px;height:13px;
    background:#22c55e;border:1.5px solid #16a34a;
    position:relative;margin-bottom:1px;border-radius:2px;
    box-shadow:0 0 5px rgba(34,197,94,.4);
}
.rb-eye{
    position:absolute;width:9px;height:3px;
    background:#064e3b;top:3px;left:50%;transform:translateX(-50%);border-radius:1px;
}
.rb-body{
    width:24px;height:18px;
    background:#22c55e;border:1.5px solid #16a34a;
    border-radius:2px;position:relative;
    box-shadow:0 0 5px rgba(34,197,94,.4);
}
.rb-body-inner{
    position:absolute;top:3px;left:5px;width:14px;height:5px;
    background:#16a34a;border-radius:1px;
}
.rb-arm{
    position:absolute;width:6px;height:14px;
    background:#22c55e;border:1.5px solid #16a34a;
    border-radius:2px;top:2px;
}
.rb-arm.l{left:-7px;transform-origin:top center;animation:armL .26s ease-in-out infinite alternate;}
.rb-arm.r{right:-7px;transform-origin:top center;animation:armR .26s ease-in-out infinite alternate;}
.rb-legs{display:flex;gap:5px;margin-top:1px;}
.rb-leg{
    width:7px;height:10px;
    background:#22c55e;border:1.5px solid #16a34a;
    border-radius:2px;
}
.rb-leg.l{transform-origin:top center;animation:legL .26s ease-in-out infinite alternate;}
.rb-leg.r{transform-origin:top center;animation:legR .26s ease-in-out infinite alternate;}
.rb-shadow{
    width:20px;height:4px;background:rgba(0,0,0,.35);
    border-radius:50%;margin-top:1px;
    animation:shad .26s ease-in-out infinite alternate;
}
@keyframes armL{0%{transform:rotate(-28deg)}100%{transform:rotate(28deg)}}
@keyframes armR{0%{transform:rotate(28deg)}100%{transform:rotate(-28deg)}}
@keyframes legL{0%{transform:rotate(-16deg)}100%{transform:rotate(16deg)}}
@keyframes legR{0%{transform:rotate(16deg)}100%{transform:rotate(-16deg)}}
@keyframes shad{0%{transform:scaleX(1);opacity:.35}100%{transform:scaleX(.7);opacity:.15}}

.rb-ct.step .rb{animation:bob .26s ease-in-out infinite alternate;}
@keyframes bob{0%{transform:translateY(0)}100%{transform:translateY(-3px)}}

/* ---- overlay / modal ---- */
.ov{
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,.7);
    display:flex;align-items:center;justify-content:center;
    z-index:1000;
    animation:fadeIn .3s;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.md{
    background:#1e293b;border-radius:10px;
    padding:16px 14px;max-width:280px;width:92%;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
    color:#e2e8f0;
}
.md.warn{border:2px solid rgba(245,158,11,.5);}
.md.ok{border:2px solid rgba(34,197,94,.5);}
.md-icon{font-size:24px;margin-bottom:4px;}
.md-title{font-size:14px;font-weight:700;margin-bottom:5px;}
.md-title.warn{color:#fbbf24;}
.md-title.ok{color:#4ade80;}
.md-text{font-size:11px;line-height:1.5;color:#94a3b8;margin-bottom:3px;}
.md-highlight{
    background:rgba(255,255,255,0.04);padding:7px 9px;
    border-radius:5px;margin-bottom:8px;
    font-size:10px;line-height:1.5;color:#cbd5e1;
    text-align:left;border:1px solid rgba(255,255,255,0.06);
}
.md-highlight em{color:#fbbf24;font-style:normal;font-weight:600;}
.md-btn{
    padding:7px 20px;border:none;border-radius:5px;
    font-size:11px;font-weight:600;cursor:pointer;
    transition:all .3s;
}
.md-btn.warn{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;}
.md-btn.ok{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;}
.md-btn:hover{transform:translateY(-1px);}

/* ---- bottom hint ---- */
.btm-hint{
    position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.82);
    color:#fbbf24;padding:4px 12px;border-radius:10px;
    font-size:10px;font-weight:600;z-index:400;
    border:1px solid rgba(251,191,36,.2);
    transition:color .3s,border-color .3s;
}
.btm-hint.done{color:#4ade80;border-color:rgba(74,222,128,.3);}

/* ---- lap badge ---- */
.lap-badge{
    position:fixed;top:60px;right:12px;
    background:rgba(0,0,0,.75);
    color:#4ade80;padding:3px 8px;border-radius:8px;
    font-size:9px;font-weight:600;z-index:400;
    border:1px solid rgba(74,222,128,.2);
}

/* ---- toasts ---- */
.ok-toast{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:rgba(22,163,74,.92);
    color:#fff;padding:8px 16px;border-radius:5px;
    font-size:11px;font-weight:600;z-index:800;
    box-shadow:0 4px 16px rgba(0,0,0,.4);
    animation:fadeIn .4s;
}
.err-toast{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:rgba(239,68,68,.9);
    color:#fff;padding:8px 14px;border-radius:5px;
    font-size:11px;font-weight:600;z-index:1500;
    box-shadow:0 4px 16px rgba(0,0,0,.4);
    animation:shake .5s;
}
@keyframes shake{
    0%,100%{transform:translate(-50%,-50%)}
    25%{transform:translate(calc(-50% - 5px),-50%)}
    75%{transform:translate(calc(-50% + 5px),-50%)}
}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 class="title">感知 → 决策 → 行动 闭环实验</h1>
        <div class="header-right">
            <span class="mode-tag" id="modeTag">第一阶段</span>
            <button class="btn btn-go" id="submitBtn" disabled>运行</button>
        </div>
    </div>

    <div class="main">
        <div class="panel">
            <div class="panel-title">拖动下方模块至图中对应位置</div>
            <div class="panel-list">
                <div class="mod sb" draggable="true" data-module="sense">
                    <div class="mi">👁️</div>
                    <div><div class="ml">感知</div><div class="md">观察收集信息</div></div>
                </div>
                <div class="mod db" draggable="true" data-module="decision">
                    <div class="mi">🧠</div>
                    <div><div class="ml">决策</div><div class="md">分析做出判断</div></div>
                </div>
                <div class="mod ab" draggable="true" data-module="action">
                    <div class="mi">⚡</div>
                    <div><div class="ml">行动</div><div class="md">执行产生影响</div></div>
                </div>
            </div>
            <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
        </div>

        <div class="canvas-wrap" id="canvas">
            <svg class="canvas-svg" viewBox="0 0 460 240">
                <defs>
                    <marker id="ah" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
                        <polygon points="0 0, 7 2.5, 0 5" fill="#4ade80"/>
                    </marker>
                    <marker id="ahy" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
                        <polygon points="0 0, 7 2.5, 0 5" fill="#fbbf24"/>
                    </marker>
                </defs>
                <line id="la1" class="on"  x1="90" y1="120" x2="200" y2="120" marker-end="url(#ah)"/>
                <line id="la2" class="on"  x1="258" y1="120" x2="368" y2="120" marker-end="url(#ah)"/>
                <line id="ta1" class="off" x1="248" y1="56" x2="360" y2="184" marker-end="url(#ah)"/>
                <line id="ta2" class="off" x1="346" y1="202" x2="114" y2="202" marker-end="url(#ah)"/>
                <line id="ta3" class="off" x1="108" y1="186" x2="218" y2="56" marker-end="url(#ahy)"/>
            </svg>
            <div class="dt p1" id="dt1" data-target="sense"></div>
            <div class="dt p2" id="dt2" data-target="decision"></div>
            <div class="dt p3" id="dt3" data-target="action"></div>
        </div>
    </div>
</div>

<script>
// ========== STATE ==========
const S={
    mode:'linear',
    placed:{},
    linked:false,
    sel:null,
    running:false,
    rbt:null,
    rid:null,
};

// ========== DOM REFS ==========
const canvas=document.getElementById('canvas');
const btn=document.getElementById('submitBtn');
const tag=document.getElementById('modeTag');
const pf=document.getElementById('progFill');
const dt1=document.getElementById('dt1'),dt2=document.getElementById('dt2'),dt3=document.getElementById('dt3');
const la1=document.getElementById('la1'),la2=document.getElementById('la2');
const ta1=document.getElementById('ta1'),ta2=document.getElementById('ta2'),ta3=document.getElementById('ta3');
const mods=document.querySelectorAll('.mod');
const dts=document.querySelectorAll('.dt');
let drag=null;

// ========== DRAG & DROP ==========
mods.forEach(m=>{
    m.addEventListener('dragstart',e=>{
        if(m.classList.contains('used')){e.preventDefault();return;}
        drag=m;m.classList.add('dragging');e.dataTransfer.effectAllowed='move';
    });
    m.addEventListener('dragend',()=>{if(drag){drag.classList.remove('dragging');drag=null;}});
});
dts.forEach(t=>{
    t.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';t.classList.add('hover');});
    t.addEventListener('dragleave',()=>t.classList.remove('hover'));
    t.addEventListener('drop',e=>{
        e.preventDefault();t.classList.remove('hover');
        if(!drag||S.placed[t.dataset.target])return;
        const mt=drag.dataset.module,tt=t.dataset.target;
        const n=mkNode(mt);
        snapNode(n,t);canvas.appendChild(n);
        S.placed[tt]={node:n,type:mt};
        t.classList.add('filled');
        drag.classList.add('used');drag.draggable=false;
        updBtn();updProg();
    });
});
btn.addEventListener('click',()=>{
    if(S.running)return;
    if(S.mode==='linear')doLinear();
    if(S.mode==='ready')doLoop();
});

// ========== NODE HELPERS ==========
function snapNode(n,t){
    const tr=t.getBoundingClientRect();
    const cr=canvas.getBoundingClientRect();
    n.style.left=(tr.left-cr.left)+'px';
    n.style.top=(tr.top-cr.top)+'px';
}
function mkNode(t){
    const n=document.createElement('div');
    n.className='node '+t;n.dataset.type=t;
    const ic={sense:'👁️',decision:'🧠',action:'⚡'};
    const lb={sense:'感知',decision:'决策',action:'行动'};
    n.innerHTML=`<div class="ni">${ic[t]}</div><div class="nl">${lb[t]}</div>`;
    n.addEventListener('click',()=>onNode(n));
    return n;
}
function onNode(n){
    if(S.mode==='connect'&&!S.linked){doConnect(n);return;}
    if(S.mode==='linear'&&!S.running)rmNode(n);
}
function rmNode(n){
    const t=n.dataset.type;n.remove();
    for(const[k,v]of Object.entries(S.placed)){
        if(v.type===t){
            delete S.placed[k];
            document.querySelector(`.dt[data-target="${k}"]`)?.classList.remove('filled');
            break;
        }
    }
    const m=document.querySelector(`.mod[data-module="${t}"]`);
    if(m){m.classList.remove('used');m.draggable=true;}
    updBtn();updProg();
}

// ========== UI HELPERS ==========
function updBtn(){
    const c=Object.keys(S.placed).length;
    if(S.mode==='ready'){btn.disabled=false;btn.textContent='运行闭环';}
    else if(S.mode==='connect'){btn.disabled=true;btn.textContent='请先连线';}
    else{btn.disabled=c<3;btn.textContent='运行';}
}
function updProg(){pf.style.width=(Object.keys(S.placed).length/3*100)+'%';}

// ========== LINEAR ==========
function doLinear(){
    if(Object.keys(S.placed).length<3)return;
    const ord=['sense','decision','action'].map(k=>S.placed[k]?.type).filter(Boolean);
    if(ord.join(',')!=='sense,decision,action'){toast('摆放错误');return;}
    runLinear();
}
function runLinear(){
    S.running=true;btn.disabled=true;killRbt();

    const pts = getLoopPoints();
    if(!pts) return;

    const ct=mkRbt();
    canvas.appendChild(ct);
    posRbt(ct,pts[0]);
    S.rbt=ct;

    const segs=[{a:pts[0],b:pts[1],ms:1100},{a:pts[1],b:pts[2],ms:1100}];
    let si=0,t0=Date.now();
    (function tick(){
        if(si>=segs.length){ct.classList.add('step');setTimeout(showWarn,500);return;}
        const s=segs[si],p=Math.min((Date.now()-t0)/s.ms,1);
        posRbt(ct,{x:s.a.x+(s.b.x-s.a.x)*p,y:s.a.y+(s.b.y-s.a.y)*p});
        if(p>=1){si++;t0=Date.now();}
        requestAnimationFrame(tick);
    })();
}

// ========== LOOP (continuous) ==========
function doLoop(){if(!S.linked)return;runLoop();}
function runLoop(){
    S.running=true;btn.disabled=true;killRbt();

    const ptsAll = getLoopPoints();
    if(!ptsAll) return;

    const pts = [ptsAll[0], ptsAll[1], ptsAll[2]];

    const ct=mkRbt();
    canvas.appendChild(ct);
    posRbt(ct,pts[0]);
    S.rbt=ct;

    const badge=document.createElement('div');
    badge.className='lap-badge';badge.id='lapBadge';
    badge.textContent='圈数 0';
    document.body.appendChild(badge);

    let seg=0,t0=Date.now(),laps=0,notified=false;
    (function tick(){
        const p=Math.min((Date.now()-t0)/900,1);
        const a=pts[seg],b=pts[(seg+1)%3];
        posRbt(ct,{x:a.x+(b.x-a.x)*p,y:a.y+(b.y-a.y)*p});
        if(p>=1){seg++;if(seg>=3){seg=0;laps++;badge.textContent='圈数 '+laps;}t0=Date.now();}
        if(!notified&&laps>=2){notified=true;okToast('闭环运转正常！机器人持续循环中');}
        S.rid=requestAnimationFrame(tick);
    })();
}

// ========== ROBOT HELPERS ==========
function getLoopPoints(){
    const sn=S.placed['sense']?.node;
    const dn=S.placed['decision']?.node;
    const an=S.placed['action']?.node;
    if(!sn||!dn||!an)return null;
    const cr=canvas.getBoundingClientRect();
    return [
        nodeCR(sn, cr),
        nodeCR(dn, cr),
        nodeCR(an, cr),
    ];
}
function nodeCR(n, cr){
    const nr=n.getBoundingClientRect();
    return {x:nr.left+nr.width/2-cr.left, y:nr.top+nr.height/2-cr.top};
}
function posRbt(ct,cp){
    ct.style.left=cp.x+'px';
    ct.style.top=cp.y+'px';
}
function mkRbt(){
    const c=document.createElement('div');c.className='rb-ct';
    c.innerHTML=`
        <div class="rb">
            <div class="rb-head"><div class="rb-eye"></div></div>
            <div class="rb-body">
                <div class="rb-body-inner"></div>
                <div class="rb-arm l"></div>
                <div class="rb-arm r"></div>
            </div>
            <div class="rb-legs">
                <div class="rb-leg l"></div>
                <div class="rb-leg r"></div>
            </div>
        </div>
        <div class="rb-shadow"></div>`;
    return c;
}
function killRbt(){
    if(S.rbt){S.rbt.remove();S.rbt=null;}
    if(S.rid){cancelAnimationFrame(S.rid);S.rid=null;}
    const b=document.getElementById('lapBadge');if(b)b.remove();
    S.running=false;
}

// ========== WARNING MODAL ==========
function showWarn(){
    const ov=document.createElement('div');ov.className='ov';
    ov.innerHTML=`
        <div class="md warn">
            <div class="md-icon">⚠️</div>
            <div class="md-title warn">机器人跑完就停了</div>
            <div class="md-text">如果半路杀出个失控的对手，它就遭殃了。</div>
            <div class="md-highlight">
                <em>怎么办？</em> 把最后的「行动」重新接回到最前面的「感知」，形成一个不断循环的闭环——<br>
                <em>感知 → 决策 → 行动 → 再感知 → …</em>
            </div>
            <div class="md-text" style="color:#fbbf24;font-weight:600;">试试把行动和感知连起来！</div>
            <button class="md-btn warn" id="goBtn">开始连线</button>
        </div>`;
    document.body.appendChild(ov);
    document.getElementById('goBtn').addEventListener('click',()=>{ov.remove();killRbt();toTri();});
}

// ========== SWITCH TO TRIANGLE ==========
function toTri(){
    S.mode='connect';S.linked=false;S.sel=null;
    tag.textContent='第二阶段 · 闭合回路';
    la1.classList.add('off');la1.classList.remove('on');
    la2.classList.add('off');la2.classList.remove('on');
    ta1.classList.remove('off');ta1.classList.add('on');
    ta2.classList.remove('off');ta2.classList.add('on');
    ta3.classList.remove('off');ta3.classList.add('wait');
    setDT(dt1,'t1',!!S.placed['sense']);
    setDT(dt2,'t2',!!S.placed['decision']);
    setDT(dt3,'t3',!!S.placed['action']);
    const map={sense:dt1,decision:dt2,action:dt3};
    for(const[k,v]of Object.entries(S.placed)){
        if(map[k])snapNode(v.node,map[k]);
        v.node.classList.add('glow');
    }
    hint('点击「行动」再点「感知」来闭合回路');
    updBtn();
}
function setDT(el,pos,filled){el.className='dt '+pos+(filled?' filled':'');}

// ========== CONNECTION ==========
function doConnect(n){
    const t=n.dataset.type;
    if(!S.sel){
        if(t!=='action'){toast('先点「行动」');return;}
        S.sel=t;n.classList.add('pick');hint('已选「行动」→ 再点「感知」');
    }else if(S.sel==='action'){
        if(t!=='sense'){toast('请点「感知」');return;}
        S.linked=true;S.mode='ready';
        n.classList.add('pick');ta3.classList.remove('wait');ta3.classList.add('on');
        for(const v of Object.values(S.placed))v.node.classList.remove('glow','pick');
        tag.textContent='第二阶段 · 回路已闭合';
        hint('回路闭合！点击「运行闭环」');
        document.getElementById('btmHint').classList.add('done');
        updBtn();
    }
}

// ========== HINT / TOAST ==========
function hint(msg){
    const old=document.getElementById('btmHint');if(old)old.remove();
    const h=document.createElement('div');h.className='btm-hint';h.id='btmHint';
    h.textContent=msg;document.body.appendChild(h);
}
function toast(msg){
    const t=document.createElement('div');t.className='err-toast';t.textContent=msg;
    document.body.appendChild(t);setTimeout(()=>t.remove(),1800);
}
function okToast(msg){
    const t=document.createElement('div');t.className='ok-toast';t.textContent=msg;
    document.body.appendChild(t);
    setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .6s';setTimeout(()=>t.remove(),600);},2200);
}
</script>
