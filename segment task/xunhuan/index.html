<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>иЎҘе…Ёй—ӯзҺҜеӣҫ - ж„ҹзҹҘвҶ’еҶізӯ–вҶ’иЎҢеҠЁвҶ’еҶҚж„ҹзҹҘ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .title {
            color: #e0e0e0;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .mode-indicator {
            color: #aaa;
            font-size: 12px;
            padding: 5px 14px;
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .submit-btn {
            padding: 9px 22px;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            border: none;
            border-radius: 20px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 12px rgba(74, 222, 128, 0.3);
            letter-spacing: 0.5px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 18px rgba(74, 222, 128, 0.45);
        }

        .submit-btn:disabled {
            background: #4b5563;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            opacity: 0.6;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            align-items: center;
            padding: 20px;
            gap: 20px;
        }

        .drop-zone {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle-container {
            width: 600px;
            height: 380px;
            position: relative;
        }

        .arrow-container {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .arrow-container svg {
            width: 100%;
            height: 100%;
        }

        .arrow-line {
            stroke: rgba(255,255,255,0.35);
            stroke-width: 2.5;
            stroke-dasharray: 6,4;
            transition: all 0.4s ease;
        }

        .arrow-line.hidden {
            opacity: 0;
        }

        .arrow-line.active {
            stroke: #4ade80;
            stroke-width: 4;
            stroke-dasharray: none;
        }

        .arrow-line.dashed-connect {
            stroke: #fbbf24;
            stroke-width: 3;
            stroke-dasharray: 8,5;
            animation: dashPulse 0.8s ease-in-out infinite;
            cursor: pointer;
            pointer-events: auto;
        }

        .arrow-line.dashed-connect:hover {
            stroke: #f59e0b;
            stroke-width: 4;
        }

        @keyframes dashPulse {
            0%, 100% { stroke-dashoffset: 0; opacity: 0.7; }
            50% { stroke-dashoffset: -13; opacity: 1; }
        }

        .connect-hitbox {
            position: absolute;
            pointer-events: auto;
            cursor: pointer;
            z-index: 30;
        }

        .drop-target {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            border: 2px dashed rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 5;
        }

        .drop-target.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .drop-target:hover,
        .drop-target.drag-over {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.4);
            transform: scale(1.06);
        }

        .drop-target.filled {
            border-color: transparent;
            background: transparent;
        }

        .drop-target.sense {
            top: 50%;
            left: 30px;
            transform: translateY(-50%);
        }

        .drop-target.decision {
            top: 50%;
            left: 260px;
            transform: translate(-50%, -50%);
        }

        .drop-target.action {
            top: 50%;
            right: 30px;
            transform: translateY(-50%);
        }

        /* Triangle positions */
        .drop-target.sense-triangle {
            top: 25px;
            left: 300px;
            transform: translate(-50%, 0);
        }

        .drop-target.decision-triangle {
            top: 275px;
            left: 480px;
            transform: translate(-50%, -50%);
        }

        .drop-target.action-triangle {
            top: 275px;
            left: 120px;
            transform: translate(-50%, -50%);
        }

        .modules-panel {
            width: 240px;
            background: rgba(0,0,0,0.25);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .modules-title {
            color: #ccc;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .modules-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .module {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: grab;
            transition: all 0.3s ease;
            box-shadow: 0 3px 12px rgba(0,0,0,0.3);
            user-select: none;
        }

        .module:hover:not(.used) {
            transform: translateX(4px);
            box-shadow: 0 5px 18px rgba(0,0,0,0.4);
        }

        .module.dragging {
            opacity: 0.5;
            transform: scale(1.02);
            cursor: grabbing;
        }

        .module.used {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .module-icon {
            font-size: 24px;
        }

        .module-info {
            display: flex;
            flex-direction: column;
        }

        .module-label {
            font-size: 14px;
            font-weight: 600;
            color: white;
        }

        .module-desc {
            font-size: 10px;
            color: rgba(255,255,255,0.7);
            margin-top: 2px;
        }

        .module-sense {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
        }

        .module-decision {
            background: linear-gradient(135deg, #4ecdc4 0%, #2d8a7e 100%);
        }

        .module-action {
            background: linear-gradient(135deg, #ffd93d 0%, #f0a500 100%);
        }

        .placed-node {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            z-index: 20;
            animation: popIn 0.35s ease;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .placed-node:hover {
            transform: scale(1.06);
            box-shadow: 0 6px 25px rgba(0,0,0,0.5);
        }

        .placed-node.selectable {
            animation: nodeGlow 1s ease-in-out infinite;
            border: 3px solid rgba(251, 191, 36, 0.6);
        }

        .placed-node.selected {
            border: 4px solid #4ade80;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
            animation: none;
        }

        @keyframes nodeGlow {
            0%, 100% { box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 8px rgba(251,191,36,0.3); }
            50% { box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 18px rgba(251,191,36,0.6); }
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.4); }
            to { opacity: 1; transform: scale(1); }
        }

        .placed-node-icon {
            font-size: 20px;
            margin-bottom: 2px;
        }

        .placed-node-label {
            font-size: 10px;
            font-weight: 600;
            color: white;
            text-align: center;
        }

        /* ---- Green Pixel Robot ---- */
        .robot-container {
            position: fixed;
            z-index: 500;
            pointer-events: none;
        }

        .robot {
            display: flex;
            flex-direction: column;
            align-items: center;
            image-rendering: pixelated;
            position: relative;
        }

        .robot-head {
            width: 24px;
            height: 20px;
            background: #00ff00;
            border: 2px solid #00aa00;
            position: relative;
            margin-bottom: 3px;
            border-radius: 2px;
            box-shadow: 0 0 6px rgba(0,255,0,0.4);
        }

        .robot-eye {
            position: absolute;
            width: 12px;
            height: 4px;
            background: #111;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
        }

        .robot-body {
            width: 38px;
            height: 28px;
            background: #00ff00;
            border: 2px solid #00aa00;
            border-radius: 2px;
            position: relative;
            box-shadow: 0 0 6px rgba(0,255,0,0.4);
        }

        .robot-body-inner {
            position: absolute;
            top: 5px;
            left: 8px;
            width: 22px;
            height: 8px;
            background: #00cc00;
            border-radius: 1px;
        }

        .robot-arm {
            position: absolute;
            width: 10px;
            height: 20px;
            background: #00ff00;
            border: 2px solid #00aa00;
            border-radius: 2px;
            top: 4px;
        }

        .robot-arm.left {
            left: -12px;
            transform-origin: top center;
            animation: armSwingL 0.3s ease-in-out infinite alternate;
        }

        .robot-arm.right {
            right: -12px;
            transform-origin: top center;
            animation: armSwingR 0.3s ease-in-out infinite alternate;
        }

        .robot-legs {
            display: flex;
            gap: 6px;
            margin-top: 2px;
        }

        .robot-leg {
            width: 10px;
            height: 14px;
            background: #00ff00;
            border: 2px solid #00aa00;
            border-radius: 2px;
        }

        .robot-leg.left {
            transform-origin: top center;
            animation: legSwingL 0.3s ease-in-out infinite alternate;
        }

        .robot-leg.right {
            transform-origin: top center;
            animation: legSwingR 0.3s ease-in-out infinite alternate;
        }

        .robot-shadow {
            width: 32px;
            height: 8px;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 50%;
            margin-top: 2px;
            animation: shadowPulse 0.3s ease-in-out infinite alternate;
        }

        @keyframes armSwingL {
            0% { transform: rotate(-25deg); }
            100% { transform: rotate(25deg); }
        }

        @keyframes armSwingR {
            0% { transform: rotate(25deg); }
            100% { transform: rotate(-25deg); }
        }

        @keyframes legSwingL {
            0% { transform: rotate(-15deg); }
            100% { transform: rotate(15deg); }
        }

        @keyframes legSwingR {
            0% { transform: rotate(15deg); }
            100% { transform: rotate(-15deg); }
        }

        @keyframes shadowPulse {
            0% { transform: scaleX(1); opacity: 0.35; }
            100% { transform: scaleX(0.75); opacity: 0.2; }
        }

        .robot-container.stepping .robot {
            animation: stepBob 0.3s ease-in-out infinite alternate;
        }

        @keyframes stepBob {
            0% { transform: translateY(0); }
            100% { transform: translateY(-5px); }
        }

        /* ---- Popups ---- */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: #1e293b;
            border-radius: 16px;
            padding: 30px 28px;
            max-width: 430px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: popIn 0.35s ease;
            color: #e2e8f0;
        }

        .modal.warning {
            border: 2px solid #f59e0b;
        }

        .modal.success {
            border: 2px solid #22c55e;
        }

        .modal-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            font-size: 28px;
        }

        .modal-icon.warning {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        .modal-icon.success {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .modal-title.warning { color: #f59e0b; }
        .modal-title.success { color: #4ade80; }

        .modal-text {
            font-size: 13px;
            line-height: 1.8;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        .modal-hint {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 18px;
            text-align: left;
            font-size: 12px;
            line-height: 1.7;
            color: #cbd5e1;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .modal-hint strong {
            color: #fbbf24;
        }

        .modal-btn {
            padding: 10px 32px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .modal-btn.warning {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: #fff;
        }

        .modal-btn.warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }

        .modal-btn.success {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: #fff;
        }

        .modal-btn.success:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
        }

        .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .connect-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fbbf24;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            z-index: 400;
            animation: fadeIn 0.5s ease;
            letter-spacing: 0.5px;
            border: 1px solid rgba(251,191,36,0.3);
        }

        .connect-hint.done {
            color: #4ade80;
            border-color: rgba(74,222,128,0.3);
        }

        .loop-indicator {
            position: fixed;
            top: 100px;
            right: 30px;
            background: rgba(0,0,0,0.7);
            color: #4ade80;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            z-index: 400;
            border: 1px solid rgba(74,222,128,0.3);
        }

        .step-label {
            position: absolute;
            color: rgba(255,255,255,0.4);
            font-size: 10px;
            font-weight: 600;
            text-align: center;
            pointer-events: none;
            z-index: 2;
            letter-spacing: 0.5px;
        }

        .error-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(239, 68, 68, 0.95);
            color: white;
            padding: 18px 36px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            animation: shake 0.5s ease;
            z-index: 1500;
            text-align: center;
        }

        @keyframes shake {
            0%, 100% { transform: translate(-50%, -50%); }
            25% { transform: translate(calc(-50% - 8px), -50%); }
            75% { transform: translate(calc(-50% + 8px), -50%); }
        }

        .arrow-label {
            position: absolute;
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            pointer-events: none;
            z-index: 3;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">и®ӨиҜҶгҖҢж„ҹзҹҘвҶ’еҶізӯ–вҶ’иЎҢеҠЁгҖҚй—ӯзҺҜ</h1>
            <div class="mode-indicator" id="modeIndicator">йҳ¶ж®өдёҖпјҡзәҝжҖ§жөҒзЁӢ</div>
            <button class="submit-btn" id="submitBtn" disabled>жөӢиҜ•иҝҗиЎҢ</button>
        </div>

        <div class="main-content">
            <div class="drop-zone">
                <div class="circle-container" id="circleContainer">
                    <div class="arrow-container" id="arrowContainer">
                        <svg width="600" height="380" viewBox="0 0 600 380">
                            <defs>
                                <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
                                    <polygon points="0 0, 10 4, 0 8" fill="#4ade80" />
                                </marker>
                                <marker id="arrowhead-yellow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
                                    <polygon points="0 0, 10 4, 0 8" fill="#fbbf24" />
                                </marker>
                            </defs>

                            <!-- Linear arrows: senseвҶ’decision, decisionвҶ’action -->
                            <line id="linearArrow1" class="arrow-line active" x1="115" y1="190" x2="215" y2="190" marker-end="url(#arrowhead)" />
                            <line id="linearArrow2" class="arrow-line active" x1="305" y1="190" x2="485" y2="190" marker-end="url(#arrowhead)" />

                            <!-- Triangle arrows: senseвҶ’decision, decisionвҶ’action -->
                            <line id="triArrow1" class="arrow-line hidden" x1="330" y1="100" x2="440" y2="235" marker-end="url(#arrowhead)" />
                            <line id="triArrow2" class="arrow-line hidden" x1="440" y1="275" x2="165" y2="275" marker-end="url(#arrowhead)" />

                            <!-- Triangle arrow: actionвҶ’sense (dashed, needs connection) -->
                            <line id="triArrow3" class="arrow-line hidden dashed-connect" x1="155" y1="240" x2="270" y2="95" marker-end="url(#arrowhead-yellow)" />
                        </svg>
                    </div>

                    <!-- Linear drop targets -->
                    <div class="drop-target sense" id="targetSense" data-target="sense">
                        <span class="step-label" style="top:-18px;left:50%;transform:translateX(-50%);">в‘  ж„ҹзҹҘ</span>
                    </div>
                    <div class="drop-target decision" id="targetDecision" data-target="decision">
                        <span class="step-label" style="top:-18px;left:50%;transform:translateX(-50%);">в‘Ў еҶізӯ–</span>
                    </div>
                    <div class="drop-target action" id="targetAction" data-target="action">
                        <span class="step-label" style="top:-18px;left:50%;transform:translateX(-50%);">в‘ў иЎҢеҠЁ</span>
                    </div>
                </div>
            </div>

            <div class="modules-panel">
                <div class="modules-title">еҸҜз”ЁжЁЎеқ—</div>
                <div class="modules-list">
                    <div class="module module-sense" draggable="true" data-module="sense">
                        <div class="module-icon">рҹ‘ҒпёҸ</div>
                        <div class="module-info">
                            <div class="module-label">ж„ҹзҹҘ</div>
                            <div class="module-desc">ж”¶йӣҶдҝЎжҒҜпјҢиҜҶеҲ«зҺҜеўғ</div>
                        </div>
                    </div>
                    <div class="module module-decision" draggable="true" data-module="decision">
                        <div class="module-icon">рҹ§ </div>
                        <div class="module-info">
                            <div class="module-label">еҶізӯ–</div>
                            <div class="module-desc">еҲҶжһҗеҲӨж–ӯпјҢеҲ¶е®ҡзӯ–з•Ҙ</div>
                        </div>
                    </div>
                    <div class="module module-action" draggable="true" data-module="action">
                        <div class="module-icon">вҡЎ</div>
                        <div class="module-info">
                            <div class="module-label">иЎҢеҠЁ</div>
                            <div class="module-desc">жү§иЎҢи®ЎеҲ’пјҢдә§з”ҹеҪұе“Қ</div>
                        </div>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---- State ----
        const state = {
            mode: 'linear',          // 'linear' | 'triangle-connect' | 'loop-ready' | 'running'
            placedNodes: {},         // { sense: {node, type}, decision, action }
            connectionMade: false,
            selectedForConnection: null,
            isRunning: false,
            robotEl: null,
            loopAnimId: null,
        };

        // ---- DOM refs ----
        const modules = document.querySelectorAll('.module');
        const dropTargets = document.querySelectorAll('.drop-target');
        const circleContainer = document.getElementById('circleContainer');
        const submitBtn = document.getElementById('submitBtn');
        const modeIndicator = document.getElementById('modeIndicator');
        const progressFill = document.getElementById('progressFill');
        const targetSense = document.getElementById('targetSense');
        const targetDecision = document.getElementById('targetDecision');
        const targetAction = document.getElementById('targetAction');
        const linearArrow1 = document.getElementById('linearArrow1');
        const linearArrow2 = document.getElementById('linearArrow2');
        const triArrow1 = document.getElementById('triArrow1');
        const triArrow2 = document.getElementById('triArrow2');
        const triArrow3 = document.getElementById('triArrow3');

        let draggedModule = null;

        // ---- Drag and Drop ----
        modules.forEach(m => {
            m.addEventListener('dragstart', dragStart);
            m.addEventListener('dragend', dragEnd);
        });

        dropTargets.forEach(t => {
            t.addEventListener('dragover', dragOver);
            t.addEventListener('dragleave', dragLeave);
            t.addEventListener('drop', drop);
        });

        submitBtn.addEventListener('click', handleSubmit);

        function dragStart(e) {
            if (e.target.closest('.module').classList.contains('used')) {
                e.preventDefault();
                return;
            }
            draggedModule = e.target.closest('.module');
            draggedModule.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function dragEnd() {
            if (draggedModule) {
                draggedModule.classList.remove('dragging');
                draggedModule = null;
            }
        }

        function dragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            e.target.closest('.drop-target')?.classList.add('drag-over');
        }

        function dragLeave(e) {
            e.target.closest('.drop-target')?.classList.remove('drag-over');
        }

        function drop(e) {
            e.preventDefault();
            const target = e.target.closest('.drop-target');
            target?.classList.remove('drag-over');
            if (!target || !draggedModule) return;

            const moduleType = draggedModule.dataset.module;
            const targetType = target.dataset.target;

            if (!state.placedNodes[targetType]) {
                const placedNode = createPlacedNode(moduleType);
                positionNodeToTarget(placedNode, target);
                circleContainer.appendChild(placedNode);
                state.placedNodes[targetType] = { node: placedNode, type: moduleType };

                target.classList.add('filled');
                draggedModule.classList.add('used');
                draggedModule.draggable = false;

                updateSubmitButton();
                updateProgress();
            }
        }

        function positionNodeToTarget(node, target) {
            const targetRect = target.getBoundingClientRect();
            const containerRect = circleContainer.getBoundingClientRect();
            node.style.left = `${targetRect.left - containerRect.left}px`;
            node.style.top = `${targetRect.top - containerRect.top}px`;
        }

        function createPlacedNode(type) {
            const node = document.createElement('div');
            node.className = `placed-node module-${type}`;
            node.dataset.type = type;

            const icons = { sense: 'рҹ‘ҒпёҸ', decision: 'рҹ§ ', action: 'вҡЎ' };
            const labels = { sense: 'ж„ҹзҹҘ', decision: 'еҶізӯ–', action: 'иЎҢеҠЁ' };
            const colors = {
                sense: 'linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%)',
                decision: 'linear-gradient(135deg, #4ecdc4 0%, #2d8a7e 100%)',
                action: 'linear-gradient(135deg, #ffd93d 0%, #f0a500 100%)'
            };

            node.style.background = colors[type];
            node.innerHTML = `
                <div class="placed-node-icon">${icons[type]}</div>
                <div class="placed-node-label">${labels[type]}</div>
            `;

            node.addEventListener('click', (e) => onNodeClick(e, node));
            return node;
        }

        function onNodeClick(e, node) {
            // In triangle-connect mode, handle connection clicking
            if (state.mode === 'triangle-connect' && !state.connectionMade) {
                handleConnectionClick(node);
                return;
            }

            // Otherwise, clicking removes the node (only in linear mode, not running)
            if (state.mode === 'linear' && !state.isRunning) {
                removePlacedNode(node);
            }
        }

        function removePlacedNode(node) {
            if (!node) return;
            const type = node.dataset.type;
            node.remove();

            for (const [targetType, data] of Object.entries(state.placedNodes)) {
                if (data.type === type) {
                    delete state.placedNodes[targetType];
                    const target = document.querySelector(`.drop-target[data-target="${targetType}"]`);
                    target?.classList.remove('filled');
                    break;
                }
            }

            const module = document.querySelector(`.module[data-module="${type}"]`);
            if (module) {
                module.classList.remove('used');
                module.draggable = true;
            }

            updateSubmitButton();
            updateProgress();
        }

        function updateSubmitButton() {
            const count = Object.keys(state.placedNodes).length;
            if (state.mode === 'loop-ready') {
                submitBtn.disabled = false;
                submitBtn.textContent = 'иҝҗиЎҢй—ӯзҺҜ';
            } else if (state.mode === 'triangle-connect') {
                submitBtn.disabled = true;
                submitBtn.textContent = 'иҜ·е…Ҳиҝһзәҝ';
            } else {
                submitBtn.disabled = count < 3;
                submitBtn.textContent = 'жөӢиҜ•иҝҗиЎҢ';
            }
        }

        function updateProgress() {
            const count = Object.keys(state.placedNodes).length;
            progressFill.style.width = `${(count / 3) * 100}%`;
        }

        // ---- Submit ----
        function handleSubmit() {
            if (state.isRunning) return;

            if (state.mode === 'linear') {
                handleLinearSubmit();
            } else if (state.mode === 'loop-ready') {
                handleLoopSubmit();
            }
        }

        function getPlacedOrder() {
            const order = ['sense', 'decision', 'action'];
            return order.map(k => state.placedNodes[k]?.type).filter(Boolean);
        }

        function isCorrectOrder() {
            return getPlacedOrder().join(',') === 'sense,decision,action';
        }

        function handleLinearSubmit() {
            if (Object.keys(state.placedNodes).length < 3) return;

            if (!isCorrectOrder()) {
                showErrorToast('йЎәеәҸй”ҷиҜҜпјҒиҜ·жҢүжӯЈзЎ®йЎәеәҸж”ҫзҪ®пјҡв‘ ж„ҹзҹҘ вҶ’ в‘ЎеҶізӯ– вҶ’ в‘ўиЎҢеҠЁ');
                return;
            }

            runRobotLinear();
        }

        function handleLoopSubmit() {
            if (!state.connectionMade) return;
            runRobotLoop();
        }

        // ---- Robot: Linear Run (senseвҶ’decisionвҶ’action, then step in place) ----
        function runRobotLinear() {
            state.isRunning = true;
            submitBtn.disabled = true;
            removeExistingRobot();

            const senseNode = state.placedNodes['sense']?.node;
            const decisionNode = state.placedNodes['decision']?.node;
            const actionNode = state.placedNodes['action']?.node;

            if (!senseNode || !decisionNode || !actionNode) return;

            const senseRect = senseNode.getBoundingClientRect();
            const decisionRect = decisionNode.getBoundingClientRect();
            const actionRect = actionNode.getBoundingClientRect();

            // Robot is position:fixed, so use viewport coordinates directly
            const points = [
                { x: senseRect.left + senseRect.width/2 - 38, y: senseRect.top + senseRect.height/2 - 35 },
                { x: decisionRect.left + decisionRect.width/2 - 38, y: decisionRect.top + decisionRect.height/2 - 35 },
                { x: actionRect.left + actionRect.width/2 - 38, y: actionRect.top + actionRect.height/2 - 35 },
            ];

            const robot = createRobot();
            document.body.appendChild(robot);
            robot.style.left = `${points[0].x}px`;
            robot.style.top = `${points[0].y}px`;
            state.robotEl = robot;

            const segments = [
                { from: points[0], to: points[1], duration: 1200 },
                { from: points[1], to: points[2], duration: 1200 },
            ];

            let segIdx = 0;
            let segStart = Date.now();

            function animate() {
                if (segIdx >= segments.length) {
                    // Arrived at action - step in place
                    robot.classList.add('stepping');
                    setTimeout(() => showLinearWarningModal(), 600);
                    return;
                }

                const seg = segments[segIdx];
                const elapsed = Date.now() - segStart;
                const progress = Math.min(elapsed / seg.duration, 1);

                const cx = seg.from.x + (seg.to.x - seg.from.x) * progress;
                const cy = seg.from.y + (seg.to.y - seg.from.y) * progress;
                robot.style.left = `${cx}px`;
                robot.style.top = `${cy}px`;

                if (progress >= 1) {
                    segIdx++;
                    segStart = Date.now();
                }

                requestAnimationFrame(animate);
            }

            requestAnimationFrame(animate);
        }

        // ---- Robot: Loop Run (continuous triangle) ----
        function runRobotLoop() {
            state.isRunning = true;
            submitBtn.disabled = true;
            removeExistingRobot();

            const senseNode = state.placedNodes['sense']?.node;
            const decisionNode = state.placedNodes['decision']?.node;
            const actionNode = state.placedNodes['action']?.node;

            if (!senseNode || !decisionNode || !actionNode) return;

            const senseRect = senseNode.getBoundingClientRect();
            const decisionRect = decisionNode.getBoundingClientRect();
            const actionRect = actionNode.getBoundingClientRect();

            // Robot is position:fixed, so use viewport coordinates directly
            const points = [
                { x: senseRect.left + senseRect.width/2 - 38, y: senseRect.top + senseRect.height/2 - 35 },
                { x: decisionRect.left + decisionRect.width/2 - 38, y: decisionRect.top + decisionRect.height/2 - 35 },
                { x: actionRect.left + actionRect.width/2 - 38, y: actionRect.top + actionRect.height/2 - 35 },
            ];

            const robot = createRobot();
            document.body.appendChild(robot);
            robot.style.left = `${points[0].x}px`;
            robot.style.top = `${points[0].y}px`;
            state.robotEl = robot;

            // Show lap counter
            const lapIndicator = document.createElement('div');
            lapIndicator.className = 'loop-indicator';
            lapIndicator.id = 'lapIndicator';
            lapIndicator.textContent = 'й—ӯзҺҜиҝҗиЎҢдёӯвҖҰ еңҲж•°: 0';
            document.body.appendChild(lapIndicator);

            let currentSeg = 0;
            let segStart = Date.now();
            const segDuration = 1000;
            let laps = 0;
            const maxLaps = 3;

            function animate() {
                const elapsed = Date.now() - segStart;
                const progress = Math.min(elapsed / segDuration, 1);

                const from = points[currentSeg];
                const to = points[(currentSeg + 1) % 3];

                const cx = from.x + (to.x - from.x) * progress;
                const cy = from.y + (to.y - from.y) * progress;
                robot.style.left = `${cx}px`;
                robot.style.top = `${cy}px`;

                if (progress >= 1) {
                    currentSeg++;
                    if (currentSeg >= 3) {
                        currentSeg = 0;
                        laps++;
                        lapIndicator.textContent = `й—ӯзҺҜиҝҗиЎҢдёӯвҖҰ еңҲж•°: ${laps}`;
                    }
                    segStart = Date.now();
                }

                if (laps < maxLaps) {
                    state.loopAnimId = requestAnimationFrame(animate);
                } else {
                    // Done - robot keeps stepping in place
                    robot.classList.add('stepping');
                    lapIndicator.textContent = `е®ҢжҲҗ ${maxLaps} еңҲпјҒй—ӯзҺҜиҝҗиҪ¬жӯЈеёё`;
                    lapIndicator.style.color = '#4ade80';
                    lapIndicator.style.borderColor = 'rgba(74,222,128,0.5)';
                    setTimeout(() => showSuccessLoopModal(), 800);
                }
            }

            state.loopAnimId = requestAnimationFrame(animate);
        }

        function createRobot() {
            const container = document.createElement('div');
            container.className = 'robot-container';
            container.innerHTML = `
                <div class="robot">
                    <div class="robot-head"><div class="robot-eye"></div></div>
                    <div class="robot-body">
                        <div class="robot-body-inner"></div>
                        <div class="robot-arm left"></div>
                        <div class="robot-arm right"></div>
                    </div>
                    <div class="robot-legs">
                        <div class="robot-leg left"></div>
                        <div class="robot-leg right"></div>
                    </div>
                </div>
                <div class="robot-shadow"></div>
            `;
            return container;
        }

        function removeExistingRobot() {
            if (state.robotEl) {
                state.robotEl.remove();
                state.robotEl = null;
            }
            if (state.loopAnimId) {
                cancelAnimationFrame(state.loopAnimId);
                state.loopAnimId = null;
            }
            const lapInd = document.getElementById('lapIndicator');
            if (lapInd) lapInd.remove();
        }

        // ---- Warning Modal (linear mode вҶ’ need loop) ----
        function showLinearWarningModal() {
            const overlay = document.createElement('div');
            overlay.className = 'overlay';
            overlay.id = 'warningOverlay';
            overlay.innerHTML = `
                <div class="modal warning">
                    <div class="modal-icon warning">вҡ пёҸ</div>
                    <div class="modal-title warning">зәҝжҖ§жөҒзЁӢжңүйЈҺйҷ©пјҒ</div>
                    <div class="modal-text">
                        жңәеҷЁдәәжҢүз…§гҖҢж„ҹзҹҘвҶ’еҶізӯ–вҶ’иЎҢеҠЁгҖҚи·‘е®ҢдәҶдёҖи¶ҹпјҢ<br>
                        дҪҶеҰӮжһңйҖ”дёӯеҮәзҺ°зӘҒеҸ‘жғ…еҶөпјҲжҜ”еҰӮеҜ№жүӢеӨұжҺ§еҶІиҝҮжқҘпјүпјҢ<br>
                        е®ғи·‘е®Ңд№ӢеҗҺе°ұеҒңеңЁйӮЈйҮҢпјҢж— жі•з»§з»ӯеә”еҜ№еҸҳеҢ–гҖӮ
                    </div>
                    <div class="modal-hint">
                        <strong>рҹ’Ў иҰҒи®©жңәеҷЁдәәжҢҒз»ӯе®үе…ЁиҝҗиҪ¬пјҢйңҖиҰҒеҪўжҲҗй—ӯзҺҜпјҡ</strong><br>
                        жҠҠгҖҢиЎҢеҠЁгҖҚзҡ„з»“жһңйҮҚж–°йҖҒеӣһгҖҢж„ҹзҹҘгҖҚпјҢи®©жңәеҷЁдәәдёҚж–ӯ<br>
                        ж„ҹзҹҘвҶ’еҶізӯ–вҶ’иЎҢеҠЁвҶ’<span style="color:#fbbf24;">еҶҚж„ҹзҹҘ</span>вҶ’еҶҚеҶізӯ–вҶ’еҶҚиЎҢеҠЁвҖҰ
                    </div>
                    <div class="modal-text" style="color:#fbbf24;font-weight:600;">
                        жҺҘдёӢжқҘпјҢиҜ·дҪ дәІжүӢжҠҠгҖҢиЎҢеҠЁгҖҚе’ҢгҖҢж„ҹзҹҘгҖҚиҝһжҺҘиө·жқҘпјҒ
                    </div>
                    <button class="modal-btn warning" id="goConnectBtn">ејҖе§Ӣиҝһзәҝ</button>
                </div>
            `;

            document.body.appendChild(overlay);

            document.getElementById('goConnectBtn').addEventListener('click', () => {
                overlay.remove();
                removeExistingRobot();
                switchToTriangleMode();
            });
        }

        // ---- Switch to Triangle Mode ----
        function switchToTriangleMode() {
            state.mode = 'triangle-connect';
            state.connectionMade = false;
            state.selectedForConnection = null;
            modeIndicator.textContent = 'йҳ¶ж®өдәҢпјҡй—ӯеҗҲеӣһи·Ҝ вҖ” иҜ·иҝһжҺҘ иЎҢеҠЁвҶ’ж„ҹзҹҘ';

            // Switch arrows
            linearArrow1.classList.add('hidden');
            linearArrow1.classList.remove('active');
            linearArrow2.classList.add('hidden');
            linearArrow2.classList.remove('active');
            triArrow1.classList.remove('hidden');
            triArrow1.classList.add('active');
            triArrow2.classList.remove('hidden');
            triArrow2.classList.add('active');
            triArrow3.classList.remove('hidden');
            triArrow3.classList.add('dashed-connect');

            // Reposition drop targets to triangle
            targetSense.className = 'drop-target sense-triangle' + (state.placedNodes['sense'] ? ' filled' : '');
            targetDecision.className = 'drop-target decision-triangle' + (state.placedNodes['decision'] ? ' filled' : '');
            targetAction.className = 'drop-target action-triangle' + (state.placedNodes['action'] ? ' filled' : '');

            // Update step labels
            targetSense.querySelector('.step-label').textContent = 'ж„ҹзҹҘ';
            targetDecision.querySelector('.step-label').textContent = 'еҶізӯ–';
            targetAction.querySelector('.step-label').textContent = 'иЎҢеҠЁ';

            // Reposition placed nodes
            repositionAllNodes();
            makeNodesSelectable();

            // Show connect hint
            showConnectHint();
            updateSubmitButton();
        }

        function repositionAllNodes() {
            const targets = {
                sense: targetSense,
                decision: targetDecision,
                action: targetAction,
            };

            for (const [key, data] of Object.entries(state.placedNodes)) {
                if (targets[key]) {
                    positionNodeToTarget(data.node, targets[key]);
                }
            }
        }

        function makeNodesSelectable() {
            for (const data of Object.values(state.placedNodes)) {
                data.node.classList.add('selectable');
            }
        }

        function showConnectHint(text) {
            removeConnectHint();
            const hint = document.createElement('div');
            hint.className = 'connect-hint';
            hint.id = 'connectHint';
            hint.textContent = text || 'рҹ‘Ҷ иҜ·дҫқж¬ЎзӮ№еҮ»гҖҢиЎҢеҠЁгҖҚе’ҢгҖҢж„ҹзҹҘгҖҚжқҘй—ӯеҗҲеӣһи·Ҝ';
            document.body.appendChild(hint);
        }

        function removeConnectHint() {
            const el = document.getElementById('connectHint');
            if (el) el.remove();
        }

        // ---- Connection Drawing ----
        function handleConnectionClick(node) {
            const nodeType = node.dataset.type;

            if (!state.selectedForConnection) {
                // First click
                if (nodeType !== 'action') {
                    showErrorToast('иҜ·е…ҲзӮ№еҮ»гҖҢиЎҢеҠЁгҖҚиҠӮзӮ№');
                    return;
                }
                state.selectedForConnection = nodeType;
                node.classList.add('selected');
                showConnectHint('е·ІйҖүдёӯгҖҢиЎҢеҠЁгҖҚвҶ’ зҺ°еңЁиҜ·зӮ№еҮ»гҖҢж„ҹзҹҘгҖҚ');
            } else if (state.selectedForConnection === 'action') {
                // Second click
                if (nodeType !== 'sense') {
                    showErrorToast('иҜ·зӮ№еҮ»гҖҢж„ҹзҹҘгҖҚиҠӮзӮ№жқҘиҝһжҺҘ');
                    return;
                }

                // Connection made!
                state.connectionMade = true;
                state.mode = 'loop-ready';
                node.classList.add('selected');

                // Solidify arrow
                triArrow3.classList.remove('dashed-connect');
                triArrow3.classList.add('active');

                // Remove selectable styles
                for (const data of Object.values(state.placedNodes)) {
                    data.node.classList.remove('selectable', 'selected');
                }

                modeIndicator.textContent = 'йҳ¶ж®өдәҢпјҡй—ӯзҺҜе·Ій—ӯеҗҲпјҒзӮ№еҮ»иҝҗиЎҢ';
                removeConnectHint();
                showConnectHint('вң… й—ӯзҺҜеӣһи·Ҝе·Ій—ӯеҗҲпјҒзӮ№еҮ»гҖҢиҝҗиЎҢй—ӯзҺҜгҖҚжөӢиҜ•');
                setTimeout(() => {
                    const hint = document.getElementById('connectHint');
                    if (hint) hint.classList.add('done');
                }, 100);

                updateSubmitButton();
            }
        }

        // ---- Success Modal ----
        function showSuccessLoopModal() {
            const overlay = document.createElement('div');
            overlay.className = 'overlay';
            overlay.id = 'successOverlay';
            overlay.innerHTML = `
                <div class="modal success">
                    <div class="modal-icon success">рҹҺү</div>

                        д»ҺгҖҢзӣІзӣ®иЎҢеҠЁгҖҚеҸҳеҫ—гҖҢзЁіеҰҘеҸҜйқ гҖҚгҖӮ
                    </div>

                        дёҚж–ӯж„ҹзҹҘеҜ№жүӢдҪҚзҪ® вҶ’ еҶізӯ–еҰӮдҪ•иәІйҒҝ вҶ’ жү§иЎҢиәІйҒҝеҠЁдҪң<br>
                        вҶ’ еҶҚж„ҹзҹҘжҳҜеҗҰжҲҗеҠҹ вҶ’ еҶҚи°ғж•ҙвҖҰ еҫӘзҺҜеҫҖеӨҚгҖӮ
                    </div>
                    <div class="modal-text" style="color:#4ade80;font-weight:600;">
                        иҝҷе°ұжҳҜ AI жҢҒз»ӯеҸҜйқ иҝҗиҪ¬зҡ„ж ёеҝғжңәеҲ¶пјҒ
                    </div>
                    <button class="modal-btn success" id="resetBtn">йҮҚж–°дҪ“йӘҢ</button>
                </div>
            `;

            document.body.appendChild(overlay);

            document.getElementById('resetBtn').addEventListener('click', () => {

        // ---- Error Toast ----
        function showErrorToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'error-toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2200);
        }

        // ---- Reset ----
        function resetAll() {
            removeExistingRobot();
            removeConnectHint();
            const lapInd = document.getElementById('lapIndicator');
            if (lapInd) lapInd.remove();

            // Clear placed nodes
            document.querySelectorAll('.placed-node').forEach(n => n.remove());
            state.placedNodes = {};
            state.mode = 'linear';
            state.connectionMade = false;
            state.selectedForConnection = null;
            state.isRunning = false;

            // Reset modules
            modules.forEach(m => {
                m.classList.remove('used');
                m.draggable = true;
            });

            // Reset drop targets to linear positions
            targetSense.className = 'drop-target sense';
            targetSense.querySelector('.step-label').textContent = 'в‘  ж„ҹзҹҘ';
            targetDecision.className = 'drop-target decision';
            targetDecision.querySelector('.step-label').textContent = 'в‘Ў еҶізӯ–';
