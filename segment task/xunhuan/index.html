<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>补全闭环图 - 感知→决策→行动→再感知</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.1);
        }

        .title {
            color: white;
            font-size: 18px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        .mode-indicator {
            color: white;
            font-size: 12px;
            padding: 4px 12px;
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
        }

        .submit-btn {
            padding: 8px 20px;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 12px rgba(74, 222, 128, 0.4);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.5);
        }

        .submit-btn:disabled {
            background: #6b7280;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            align-items: center;
            padding: 15px;
            gap: 20px;
        }

        .drop-zone {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle-container {
            width: 550px;
            height: 320px;
            position: relative;
        }

        .arrow-container {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .arrow-line {
            stroke: rgba(255,255,255,0.6);
            stroke-width: 2;
            stroke-dasharray: 5,3;
            transition: stroke 0.3s ease, opacity 0.5s ease;
        }

        .arrow-line.hidden {
            opacity: 0;
        }

        .arrow-line.active {
            stroke: #4ade80;
            stroke-width: 4;
        }

        .drop-target {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 5;
        }

        .drop-target.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .hidden {
            display: none;
        }

        .drop-target:hover,
        .drop-target.drag-over {
            background: rgba(255,255,255,0.2);
            transform: scale(1.08);
        }

        .drop-target.filled {
            background: rgba(255,255,255,0.15);
        }

        .drop-target.sense {
            top: 50%;
            left: 30px;
            transform: translateY(-50%);
        }

        .drop-target.decision {
            top: 50%;
            left: 275px;
            transform: translate(-50%, -50%);
        }

        .drop-target.action {
            top: 50%;
            right: 30px;
            transform: translateY(-50%);
        }

        .modules-panel {
            width: 240px;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modules-title {
            color: white;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .modules-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .module {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: grab;
            transition: all 0.3s ease;
            box-shadow: 0 3px 12px rgba(0,0,0,0.2);
            user-select: none;
        }

        .module:hover:not(.used) {
            transform: translateX(4px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .module.dragging {
            opacity: 0.5;
            transform: scale(1.02);
            cursor: grabbing;
        }

        .module.used {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .module-icon {
            font-size: 24px;
        }

        .module-info {
            display: flex;
            flex-direction: column;
        }

        .module-label {
            font-size: 14px;
            font-weight: 600;
            color: white;
        }

        .module-desc {
            font-size: 10px;
            color: rgba(255,255,255,0.7);
        }

        .module-sense {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
        }

        .module-decision {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
        }

        .module-action {
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
        }

        .success-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(74, 222, 128, 0.95);
            color: white;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
            z-index: 1000;
            text-align: center;
        }

        .success-message .emoji {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(239, 68, 68, 0.95);
            color: white;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
            animation: shake 0.5s ease;
            z-index: 1000;
            text-align: center;
        }

        .error-message .emoji {
            font-size: 40px;
            margin-bottom: 8px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translate(-50%, -50%); }
            25% { transform: translate(calc(-50% - 8px), -50%); }
            75% { transform: translate(calc(-50% + 8px), -50%); }
        }

        .placed-node {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 18px rgba(0,0,0,0.3);
            z-index: 20;
            animation: popIn 0.3s ease;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .placed-node:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 22px rgba(0,0,0,0.4);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        .placed-node-icon {
            font-size: 18px;
            margin-bottom: 3px;
        }

        .placed-node-label {
            font-size: 9px;
            font-weight: 600;
            color: white;
            text-align: center;
        }

        .robot-container {
            position: fixed;
            top: 50%;
            left: -60px;
            transform: translateY(-50%);
            z-index: 1000;
            pointer-events: none;
        }

        .robot {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: robotRun 0.5s steps(2) infinite;
        }

        .robot-head {
            width: 30px;
            height: 22px;
            background: #00ff00;
            border: 2px solid #00cc00;
            position: relative;
            margin-bottom: 4px;
            border-radius: 4px;
        }

        .robot-eye {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #000;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 2px;
        }

        .robot-body {
            width: 45px;
            height: 30px;
            background: #00ff00;
            border: 2px solid #00cc00;
            border-radius: 4px;
            position: relative;
        }

        .robot-arm {
            position: absolute;
            width: 12px;
            height: 22px;
            background: #00ff00;
            border: 2px solid #00cc00;
            border-radius: 2px;
            top: 4px;
        }

        .robot-arm.left {
            left: -14px;
            animation: armLeft 0.25s ease-in-out infinite alternate;
        }

        .robot-arm.right {
            right: -14px;
            animation: armRight 0.25s ease-in-out infinite alternate;
        }

        .robot-leg {
            width: 12px;
            height: 15px;
            background: #00ff00;
            border: 2px solid #00cc00;
            border-radius: 2px;
        }

        .robot-legs {
            display: flex;
            gap: 8px;
            margin-top: 2px;
        }

        .robot-leg.left {
            animation: legLeft 0.25s ease-in-out infinite alternate;
        }

        .robot-leg.right {
            animation: legRight 0.25s ease-in-out infinite alternate;
        }

        @keyframes robotRun {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        @keyframes armLeft {
            0% { transform: rotate(-30deg); }
            100% { transform: rotate(30deg); }
        }

        @keyframes armRight {
            0% { transform: rotate(30deg); }
            100% { transform: rotate(-30deg); }
        }

        @keyframes legLeft {
            0% { transform: rotate(-20deg); }
            100% { transform: rotate(20deg); }
        }

        @keyframes legRight {
            0% { transform: rotate(20deg); }
            100% { transform: rotate(-20deg); }
        }

        .robot-shadow {
            width: 38px;
            height: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            margin-top: 4px;
            animation: shadow 0.25s ease-in-out infinite alternate;
        }

        @keyframes shadow {
            0% { transform: scaleX(1); opacity: 0.5; }
            100% { transform: scaleX(0.8); opacity: 0.3; }
        }

        .robot-track {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 25px;
            background: linear-gradient(90deg, 
                #333 0%, #444 50%, #333 100%);
            background-size: 40px 25px;
            animation: trackMove 0.5s linear infinite;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .robot-track.active {
            opacity: 0.8;
        }

        @keyframes trackMove {
            from { background-position: 0 0; }
            to { background-position: 40px 0; }
        }

        .warning-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }

        .warning-modal {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
            border: 3px solid #f59e0b;
            animation: popIn 0.3s ease;
        }

        .warning-icon {
            width: 65px;
            height: 65px;
            background: #fef3c7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 32px;
        }

        .warning-title {
            color: #dc2626;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .warning-text {
            color: #4b5563;
            font-size: 13px;
            line-height: 1.7;
            margin-bottom: 8px;
        }

        .warning-reason {
            color: #6b7280;
            font-size: 12px;
            background: #f3f4f6;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: left;
        }

        .warning-btn {
            padding: 10px 30px;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .warning-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }

        .success-loop-modal {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
            border: 3px solid #22c55e;
            animation: popIn 0.3s ease;
        }

        .success-loop-icon {
            width: 65px;
            height: 65px;
            background: #dcfce7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 32px;
        }

        .success-loop-title {
            color: #16a34a;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .success-loop-text {
            color: #4b5563;
            font-size: 13px;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .success-loop-btn {
            padding: 10px 30px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .success-loop-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
        }

        .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">补全闭环图</h1>
            <div class="mode-indicator" id="modeIndicator">线性模式：感知→决策→行动</div>
            <button class="submit-btn" id="submitBtn" disabled>测试运行</button>
        </div>
        
        <div class="main-content">
            <div class="drop-zone">
                <div class="circle-container">
                    <div class="arrow-container">
                        <svg width="550" height="320" viewBox="0 0 550 320">
                            <defs>
                                <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                                    <polygon points="0 0, 10 3.5, 0 7" fill="#4ade80" />
                                </marker>
                                <marker id="arrowhead-green-large" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
                                    <polygon points="0 0, 12 4.5, 0 9" fill="#4ade80" />
                                </marker>
                            </defs>

                            <line class="arrow-line line-arrow-1" x1="105" y1="160" x2="230" y2="160" marker-end="url(#arrowhead-green)" />

                            <line class="arrow-line line-arrow-2" x1="320" y1="160" x2="445" y2="160" marker-end="url(#arrowhead-green)" />

                            <line class="arrow-line triangle-arrow-1 hidden" x1="275" y1="45" x2="440" y2="230" stroke-width="4" marker-end="url(#arrowhead-green-large)" />

                            <line class="arrow-line triangle-arrow-2 hidden" x1="410" y1="270" x2="140" y2="270" stroke-width="4" marker-end="url(#arrowhead-green-large)" />

                            <line class="arrow-line triangle-arrow-3 hidden" x1="170" y1="230" x2="140" y2="55" stroke-width="4" marker-end="url(#arrowhead-green-large)" />
                        </svg>
                    </div>

                    <div class="drop-target sense" data-target="sense"></div>
                    <div class="drop-target decision" data-target="decision"></div>
                    <div class="drop-target action" data-target="action"></div>
                </div>
            </div>

            <div class="modules-panel">
                <div class="modules-title">可用模块</div>
                <div class="modules-list">
                    <div class="module module-sense" draggable="true" data-module="sense">
                        <div class="module-icon">👁️</div>
                        <div class="module-info">
                            <div class="module-label">感知</div>
                            <div class="module-desc">收集信息，识别环境</div>
                        </div>
                    </div>

                    <div class="module module-decision" draggable="true" data-module="decision">
                        <div class="module-icon">🧠</div>
                        <div class="module-info">
                            <div class="module-label">决策</div>
                            <div class="module-desc">分析判断，制定策略</div>
                        </div>
                    </div>

                    <div class="module module-action" draggable="true" data-module="action">
                        <div class="module-icon">⚡</div>
                        <div class="module-info">
                            <div class="module-label">行动</div>
                            <div class="module-desc">执行计划，产生影响</div>
                        </div>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const modules = document.querySelectorAll('.module');
        const dropTargets = document.querySelectorAll('.drop-target');
        const circleContainer = document.querySelector('.circle-container');
        const submitBtn = document.getElementById('submitBtn');
        const modeIndicator = document.getElementById('modeIndicator');
        const progressFill = document.getElementById('progressFill');

        let draggedModule = null;
        let placedNodes = {};
        let currentMode = 'linear';
        let isRunning = false;

        modules.forEach(module => {
            module.addEventListener('dragstart', dragStart);
            module.addEventListener('dragend', dragEnd);
        });

        dropTargets.forEach(target => {
            target.addEventListener('dragover', dragOver);
            target.addEventListener('dragleave', dragLeave);
            target.addEventListener('drop', drop);
        });

        submitBtn.addEventListener('click', handleSubmit);

        function clearAllPlacedNodes() {
            document.querySelectorAll('.placed-node').forEach(node => node.remove());
            placedNodes = {};
            
            dropTargets.forEach(target => target.classList.remove('filled'));
            modules.forEach(module => {
                module.classList.remove('used');
                module.draggable = true;
            });
            
            updateSubmitButton();
            updateProgress();
        }

        function dragStart(e) {
            if (e.target.classList.contains('used')) {
                e.preventDefault();
                return;
            }
            draggedModule = e.target;
            draggedModule.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function dragEnd() {
            if (draggedModule) {
                draggedModule.classList.remove('dragging');
                draggedModule = null;
            }
        }

        function dragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            e.target.classList.add('drag-over');
        }

        function dragLeave(e) {
            e.target.classList.remove('drag-over');
        }

        function drop(e) {
            e.preventDefault();
            e.target.classList.remove('drag-over');

            const target = e.target.closest('.drop-target');
            if (!target || !draggedModule) return;

            const moduleType = draggedModule.dataset.module;
            const targetType = target.dataset.target;

            if (!placedNodes[targetType]) {
                const placedNode = createPlacedNode(moduleType);
                const targetRect = target.getBoundingClientRect();
                const containerRect = circleContainer.getBoundingClientRect();
                
                placedNode.style.left = `${targetRect.left - containerRect.left}px`;
                placedNode.style.top = `${targetRect.top - containerRect.top}px`;
                
                circleContainer.appendChild(placedNode);
                placedNodes[targetType] = { node: placedNode, type: moduleType };
                
                target.classList.add('filled');
                draggedModule.classList.add('used');
                draggedModule.draggable = false;

                updateSubmitButton();
                updateProgress();
            }
        }

        function createPlacedNode(type) {
            const node = document.createElement('div');
            node.className = `placed-node module-${type}`;
            node.dataset.type = type;
            
            const icons = {
                'sense': '👁️',
                'decision': '🧠',
                'action': '⚡'
            };
            
            const labels = {
                'sense': '感知',
                'decision': '决策',
                'action': '行动'
            };

            const colors = {
                'sense': 'linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%)',
                'decision': 'linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%)',
                'action': 'linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%)'
            };
            
            node.style.background = colors[type];
            node.innerHTML = `
                <div class="placed-node-icon">${icons[type]}</div>
                <div class="placed-node-label">${labels[type]}</div>
            `;
            
            node.addEventListener('click', removePlacedNode);
            
            return node;
        }

        function removePlacedNode(e) {
            const node = e.target.closest('.placed-node');
            if (!node) return;

            const type = node.dataset.type;
            
            node.remove();
            
            for (const [targetType, data] of Object.entries(placedNodes)) {
                if (data.type === type) {
                    delete placedNodes[targetType];
                    const target = document.querySelector(`.drop-target[data-target="${targetType}"]`);
                    if (target) {
                        target.classList.remove('filled');
                    }
                    break;
                }
            }
            
            const module = document.querySelector(`.module[data-module="${type}"]`);
            if (module) {
                module.classList.remove('used');
                module.draggable = true;
            }

            updateSubmitButton();
            updateProgress();
        }

        function updateSubmitButton() {
            const count = Object.keys(placedNodes).length;
            submitBtn.disabled = count < 3;
        }

        function updateProgress() {
            const count = Object.keys(placedNodes).length;
            progressFill.style.width = `${(count / 3) * 100}%`;
        }

        function handleSubmit() {
            if (isRunning) return;
            
            if (currentMode === 'linear') {
                handleLinearSubmit();
            } else {
                handleTriangleSubmit();
            }
        }

        function handleTriangleSubmit() {
            if (Object.keys(placedNodes).length < 3) return;

            const placedTypes = [];
            const order = ['sense', 'decision', 'action'];
            
            order.forEach(key => {
                if (placedNodes[key]) {
                    placedTypes.push(placedNodes[key].type);
                }
            });

            const isCorrect = placedTypes.join(',') === 'sense,decision,action';

            if (!isCorrect) {
                showError('顺序错误！请按正确顺序放置：1.感知 → 2.决策 → 3.行动');
                return;
            }

            runRobotLoop();
        }

        function handleLinearSubmit() {
            if (Object.keys(placedNodes).length < 3) return;

            const placedTypes = [];
            const order = ['sense', 'decision', 'action'];
            
            order.forEach(key => {
                if (placedNodes[key]) {
                    placedTypes.push(placedNodes[key].type);
                }
            });

            const isCorrect = placedTypes.join(',') === 'sense,decision,action';

            if (!isCorrect) {
                const errorMsg = document.createElement('div');
                errorMsg.className = 'error-message';
                errorMsg.innerHTML = `
                    <div class="emoji">❌</div>
                    顺序错误！<br>
                    请按正确顺序放置：<br>
                    1. 感知 → 2. 决策 → 3. 行动
                `;
                document.body.appendChild(errorMsg);
                
                setTimeout(() => {
                    errorMsg.remove();
                }, 3000);
                return;
            }

            runRobotOnce();
        }

        function runRobotOnce() {
            isRunning = true;
            submitBtn.disabled = true;

            const containerRect = circleContainer.getBoundingClientRect();
            const senseTarget = document.querySelector('.drop-target.sense');
            const actionTarget = document.querySelector('.drop-target.action');
            const senseRect = senseTarget.getBoundingClientRect();
            const actionRect = actionTarget.getBoundingClientRect();

            const startX = senseRect.left + senseRect.width / 2 - containerRect.left - 60;
            const endX = actionRect.left + actionRect.width / 2 - containerRect.left - 60;
            const trackY = senseRect.top + senseRect.height / 2 - containerRect.top;

            const track = document.createElement('div');
            track.className = 'robot-track active';
            document.body.appendChild(track);

            const robotContainer = document.createElement('div');
            robotContainer.className = 'robot-container';
            robotContainer.innerHTML = `
                <div class="robot">
                    <div class="robot-head"><div class="robot-eye"></div></div>
                    <div class="robot-body">
                        <div class="robot-arm left"></div>
                        <div class="robot-arm right"></div>
                    </div>
                    <div class="robot-legs">
                        <div class="robot-leg left"></div>
                        <div class="robot-leg right"></div>
                    </div>
                </div>
                <div class="robot-shadow"></div>
            `;
            document.body.appendChild(robotContainer);
            robotContainer.style.top = `${trackY - 35}px`;
            robotContainer.style.left = `${startX}px`;

            const duration = 2500;
            const startTime = Date.now();

            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);

                const currentX = startX + (endX - startX) * progress;
                robotContainer.style.left = `${currentX}px`;

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    setTimeout(() => {
                        track.remove();
                        robotContainer.remove();
                        showWarningModal();
                        isRunning = false;
                        submitBtn.disabled = false;
                    }, 300);
                }
            }

            requestAnimationFrame(animate);
        }

        function runRobotLoop() {
            isRunning = true;
            submitBtn.disabled = true;
            
            const track = document.createElement('div');
            track.className = 'robot-track active';
            document.body.appendChild(track);

            const robotContainer = document.createElement('div');
            robotContainer.className = 'robot-container';
            robotContainer.innerHTML = `
                <div class="robot">
                    <div class="robot-head"><div class="robot-eye"></div></div>
                    <div class="robot-body">
                        <div class="robot-arm left"></div>
                        <div class="robot-arm right"></div>
                    </div>
                    <div class="robot-legs">
                        <div class="robot-leg left"></div>
                        <div class="robot-leg right"></div>
                    </div>
                </div>
                <div class="robot-shadow"></div>
            `;
            document.body.appendChild(robotContainer);

            let laps = 0;
            let pos = -60;
            const duration = 1500;
            const startTime = Date.now();

            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = elapsed / duration;
                
                pos = -60 + progress * (window.innerWidth + 120);
                robotContainer.style.left = `${pos}px`;

                if (pos >= window.innerWidth + 60) {
                    laps++;
                    pos = -60;
                    startTime = Date.now();
                }

                if (laps < 3) {
                    requestAnimationFrame(animate);
                } else {
                    setTimeout(() => {
                        track.remove();
                        robotContainer.remove();
                        showSuccessLoopModal();
                        isRunning = false;
                    }, 300);
                }
            }

            requestAnimationFrame(animate);
        }

        function showWarningModal() {
            const overlay = document.createElement('div');
            overlay.className = 'warning-overlay';
            overlay.innerHTML = `
                <div class="warning-modal">
                    <div class="warning-icon">⚠️</div>
                    <div class="warning-title">犯规出局！</div>
                    <div class="warning-text">
                        突发情况，失控机器人撞过来
                    </div>
                    <div class="warning-text">
                        穿过空隙后，没检查被撞倒了
                    </div>
                    <div class="warning-reason">
                        💡 <strong>原因分析：</strong><br>
                        线性模式（感知→决策→行动）只能执行一次，无法持续适应环境变化。
                    </div>
                    <div style="background:#fffbeb;padding:12px;border-radius:6px;margin-bottom:15px;text-align:left;">
                        <strong>🤔 思考：</strong>要构成闭环，需要把"行动"和"感知"连接起来，形成"感知→决策→行动→再感知"的循环。<br><br>
                        请选择应该连接的两个模块：
                        <div style="margin-top:10px;">
                            <label style="display:block;margin:5px 0;cursor:pointer;">
                                <input type="radio" name="connect" value="sense-action" checked> <strong>感知 ↔ 行动</strong>（构成闭环）
                            </label>
                            <label style="display:block;margin:5px 0;cursor:pointer;">
                                <input type="radio" name="connect" value="sense-decision"> 感知 ↔ 决策
                            </label>
                            <label style="display:block;margin:5px 0;cursor:pointer;">
                                <input type="radio" name="connect" value="decision-action"> 决策 ↔ 行动
                            </label>
                        </div>
                    </div>
                    <button class="warning-btn" id="continueBtn">创建闭环</button>
                </div>
            `;

            document.body.appendChild(overlay);

            document.getElementById('continueBtn').addEventListener('click', () => {
                const selected = document.querySelector('input[name="connect"]:checked').value;
                overlay.remove();
                if (selected === 'sense-action') {
                    switchToTriangleMode();
                } else {
                    showError('选择错误！只有将"行动"连接到"感知"才能形成闭环。');
                }
            });
        }

        function showSuccessLoopModal() {
            const overlay = document.createElement('div');
            overlay.className = 'warning-overlay';
            overlay.innerHTML = `
                <div class="success-loop-modal">
                    <div class="success-loop-icon">🎉</div>
                    <div class="success-loop-title">闭环成功！</div>
                    <div class="success-loop-text">
                        机器人成功完成三圈测试！<br><br>
                        通过"感知→决策→行动→再感知"的闭环，机器人能够持续适应环境，稳定运行。
                    </div>
                    <button class="success-loop-btn" id="resetBtn">重新开始</button>
                </div>
            `;
            
            document.body.appendChild(overlay);
            
            document.getElementById('resetBtn').addEventListener('click', () => {
                overlay.remove();
                resetToLinearMode();
            });
        }

        function switchToTriangleMode() {
            currentMode = 'triangle';
            modeIndicator.textContent = '闭环模式：感知→决策→行动→再感知';

            document.querySelectorAll('.line-arrow-1, .line-arrow-2').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.triangle-arrow-1, .triangle-arrow-2, .triangle-arrow-3').forEach(el => el.classList.remove('hidden'));

            const senseTarget = document.querySelector('.drop-target.sense');
            const decisionTarget = document.querySelector('.drop-target.decision');
            const actionTarget = document.querySelector('.drop-target.action');

            senseTarget.style.left = '275px';
            senseTarget.style.top = '15px';
            senseTarget.style.transform = 'translate(-50%, -50%)';

            decisionTarget.style.left = '450px';
            decisionTarget.style.top = '250px';
            decisionTarget.style.transform = 'translate(-50%, -50%)';

            actionTarget.style.left = '100px';
            actionTarget.style.top = '250px';
            actionTarget.style.transform = 'translate(-50%, -50%)';

            document.querySelectorAll('.placed-node').forEach(node => {
                const type = node.dataset.type;
                let target;
                if (type === 'sense') target = senseTarget;
                else if (type === 'decision') target = decisionTarget;
                else if (type === 'action') target = actionTarget;

                if (target) {
                    const targetRect = target.getBoundingClientRect();
                    const containerRect = circleContainer.getBoundingClientRect();
                    node.style.left = `${targetRect.left - containerRect.left}px`;
                    node.style.top = `${targetRect.top - containerRect.top}px`;
                }
            });
        }

        function resetToLinearMode() {
            currentMode = 'linear';
            modeIndicator.textContent = '线性模式：感知→决策→行动';
            clearAllPlacedNodes();
            
            document.querySelectorAll('.line-arrow-1, .line-arrow-2').forEach(el => el.classList.remove('hidden'));
            document.querySelectorAll('.triangle-arrow-1, .triangle-arrow-2, .triangle-arrow-3').forEach(el => el.classList.add('hidden'));
            
            const senseTarget = document.querySelector('.drop-target.sense');
            const decisionTarget = document.querySelector('.drop-target.decision');
            const actionTarget = document.querySelector('.drop-target.action');
            
            senseTarget.style.left = '30px';
            senseTarget.style.top = '50%';
            senseTarget.style.transform = 'translateY(-50%)';
            
            decisionTarget.style.left = '275px';
            decisionTarget.style.top = '50%';
            decisionTarget.style.transform = 'translate(-50%, -50%)';
            
            actionTarget.style.left = '';
            actionTarget.style.right = '30px';
            actionTarget.style.top = '50%';
            actionTarget.style.transform = 'translateY(-50%)';
        }

        function showError(msg) {
            const errorMsg = document.createElement('div');
            errorMsg.className = 'error-message';
            errorMsg.innerHTML = `
                <div class="emoji">❌</div>
                ${msg}
            `;
            document.body.appendChild(errorMsg);
            
            setTimeout(() => {
                errorMsg.remove();
            }, 3000);
        }
    </script>
</body>
</html>
