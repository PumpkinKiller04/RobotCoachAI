<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI创意广场 - 机器人设计方案展示</title>
    <link rel="preconnect" href="https://fonts.googleapis.cn">
    <link rel="preconnect" href="https://fonts.gstatic.cn" crossorigin>
    <link href="https://fonts.googleapis.cn/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        .header h1 {
            font-size: 36px;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }
        .header p {
            font-size: 18px;
            color: rgba(255,255,255,0.9);
        }
        .search-bar {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            gap: 10px;
        }
        .search-input {
            padding: 12px 20px;
            width: 300px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .search-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.5);
        }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
        }
        .stat-item {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: white;
        }
        .stat-label {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }
        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
        }
        .card-header {
            background: linear-gradient(135deg, #8b5a2b 0%, #a0522d 100%);
            padding: 20px;
            color: white;
        }
        .card-author {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .author-avatar {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
        }
        .author-info {
            display: flex;
            flex-direction: column;
        }
        .author-name {
            font-size: 16px;
            font-weight: 600;
        }
        .submit-time {
            font-size: 12px;
            opacity: 0.8;
        }
        .card-body {
            padding: 20px;
        }
        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: #8b5a2b;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 2px solid #d4a574;
        }
        .design-item {
            display: flex;
            margin-bottom: 12px;
            align-items: flex-start;
        }
        .design-label {
            width: 85px;
            font-weight: 600;
            color: #6b4423;
            flex-shrink: 0;
        }
        .design-value {
            flex: 1;
            color: #333;
            background: #fff8e7;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
        }
        .card-actions {
            padding: 15px 20px;
            border-top: 1px solid #eee;
            background: #fafafa;
        }
        .action-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }
        .like-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 15px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .like-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
        }
        .like-btn.liked {
            background: linear-gradient(135deg, #ccc 0%, #999 100%);
        }
        .comment-section {
            margin-top: 10px;
        }
        .comment-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 8px;
            resize: none;
        }
        .comment-btn {
            float: right;
            padding: 6px 16px;
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 13px;
            transition: transform 0.2s;
        }
        .comment-btn:hover {
            transform: scale(1.05);
        }
        .comments-list {
            margin-top: 15px;
            max-height: 150px;
            overflow-y: auto;
        }
        .comment-item {
            padding: 10px;
            background: #fff;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 3px solid #4ecdc4;
        }
        .comment-author {
            font-weight: 600;
            font-size: 13px;
            color: #666;
            margin-bottom: 4px;
        }
        .comment-content {
            font-size: 14px;
            color: #333;
        }
        .comment-time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }
        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 15px;
        }
        .empty-state p {
            font-size: 16px;
            opacity: 0.9;
        }
        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
            padding: 50px;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @media (max-width: 768px) {
            .header h1 {
                font-size: 28px;
            }
            .gallery {
                grid-template-columns: 1fr;
            }
            .stats-bar {
                flex-wrap: wrap;
                gap: 15px;
            }
            .search-input {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 AI创意广场</h1>
            <p>探索全国总教练的创意设计方案</p>
        </div>
        
        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索场景、任务、传感器...">
            <button class="search-btn" onclick="filterCards()">搜索</button>
        </div>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">作品总数</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="uniqueAuthors">0</div>
                <div class="stat-label">创意作者</div>
            </div>
        </div>
        
        <div class="gallery" id="gallery">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>正在加载创意作品...</p>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://quickform.cn/api/kzw1h47nrm/all';
        let allProjects = [];
        
        async function loadProjects() {
            try {
                const response = await fetch(API_URL);
                if (response.ok) {
                    const data = await response.json();
                    processData(data);
                } else {
                    document.getElementById('gallery').innerHTML = `
                        <div class="empty-state">
                            <h3>📭 暂无作品</h3>
                            <p>还没有同学提交设计方案，快来成为第一个创作者吧！</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('gallery').innerHTML = `
                    <div class="empty-state">
                        <h3>🔌 网络连接失败</h3>
                        <p>无法连接到服务器，请稍后重试</p>
                    </div>
                `;
            }
        }
        
        function processData(data) {
            let submissions = [];

            if (Array.isArray(data)) {
                submissions = data;
            } else if (data && data.submissions && Array.isArray(data.submissions)) {
                submissions = data.submissions;
            } else if (data && data.data && Array.isArray(data.data)) {
                submissions = data.data;
            }

            submissions.sort((a, b) => {
                const timeA = a.submitted_at || a.created_at || '';
                const timeB = b.submitted_at || b.created_at || '';
                return timeB.localeCompare(timeA);
            });

            allProjects = submissions.map(item => {
                const typeField = item['题目6'] || item['\u9898\u76ee6'] || '';
                const isDesign = typeField === '设计方案';

                return {
                    author: item['姓名'] || item['\u59d3\u540d'] || '匿名创作者',
                    scene: item['题目1'] || item['\u9898\u76ee1'] || '',
                    task: item['题目2'] || item['\u9898\u76ee2'] || '',
                    sensors: item['题目3'] || item['\u9898\u76ee3'] || '',
                    training: item['题目4'] || item['\u9898\u76ee4'] || '',
                    feedback: item['题目5'] || item['\u9898\u76ee5'] || '',
                    time: item.submitted_at || item.created_at || new Date().toISOString(),
                    type: isDesign ? 'design' : 'analysis'
                };
            });

            updateStats();
            renderCards(allProjects);
        }
        
        function updateStats() {
            document.getElementById('totalCount').textContent = allProjects.length;
            const authors = new Set(allProjects.map(p => p.author));
            document.getElementById('uniqueAuthors').textContent = authors.size;
        }
        
        function renderCards(projects) {
            if (projects.length === 0) {
                document.getElementById('gallery').innerHTML = `
                    <div class="empty-state">
                        <h3>🔍 未找到匹配作品</h3>
                        <p>尝试使用其他关键词搜索</p>
                    </div>
                `;
                return;
            }
            
            const cardsHTML = projects.map(project => createCard(project)).join('');
            document.getElementById('gallery').innerHTML = cardsHTML;
        }
        
        function createCard(project) {
            const avatar = project.author.charAt(0).toUpperCase();
            const formattedTime = formatTime(project.time);

            const commentsHTML = project.comments ? project.comments.map((c, idx) => `
                <div class="comment-item">
                    <div class="comment-author">${escapeHtml(c.author || '匿名')}</div>
                    <div class="comment-content">${escapeHtml(c.content)}</div>
                    <div class="comment-time">${formatTime(c.time)}</div>
                </div>
            `).join('') : '';

            return `
                <div class="card" data-project-id="${project.id}">
                    <div class="card-header">
                        <div class="card-author">
                            <div class="author-avatar">${avatar}</div>
                            <div class="author-info">
                                <div class="author-name">${escapeHtml(project.author)}</div>
                                <div class="submit-time">${formattedTime}</div>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="card-title">🤖 我的机器人设计</div>
                        <div class="design-item">
                            <span class="design-label">场景:</span>
                            <span class="design-value">${escapeHtml(project.scene) || '未填写'}</span>
                        </div>
                        <div class="design-item">
                            <span class="design-label">任务:</span>
                            <span class="design-value">${escapeHtml(project.task) || '未填写'}</span>
                        </div>
                        <div class="design-item">
                            <span class="design-label">传感器:</span>
                            <span class="design-value">${escapeHtml(project.sensors) || '未填写'}</span>
                        </div>
                        <div class="design-item">
                            <span class="design-label">训练方法:</span>
                            <span class="design-value">${escapeHtml(project.training) || '未填写'}</span>
                        </div>
                        <div class="design-item">
                            <span class="design-label">反馈检查项:</span>
                            <span class="design-value">${escapeHtml(project.feedback) || '未填写'}</span>
                        </div>
                    </div>
                    <div class="card-actions">
                        <div class="action-row">
                            <button class="like-btn" onclick="likeProject('${project.id}')">
                                <span>🌸</span>
                                <span>${project.likes || 0}</span>
                            </button>
                        </div>
                        <div class="comment-section">
                            <textarea class="comment-input" rows="2" id="comment-${project.id}" placeholder="写下你的评论..."></textarea>
                            <button class="comment-btn" onclick="submitComment('${project.id}')">发表评论</button>
                            <div class="comments-list" id="comments-${project.id}">
                                ${commentsHTML || '<p style="color:#999;font-size:13px;">暂无评论，快来发表第一条评论吧！</p>'}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }
        
        function formatTime(timeString) {
            if (!timeString) return '未知时间';
            try {
                const date = new Date(timeString);
                const month = date.getMonth() + 1;
                const day = date.getDate();
                const hours = date.getHours().toString().padStart(2, '0');
                const minutes = date.getMinutes().toString().padStart(2, '0');
                return `${month}月${day}日 ${hours}:${minutes}`;
            } catch {
                return '未知时间';
            }
        }
        
        function filterCards() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            
            if (!keyword) {
                renderCards(allProjects);
                return;
            }
            
            const filtered = allProjects.filter(project => {
                return project.scene.toLowerCase().includes(keyword) ||
                       project.task.toLowerCase().includes(keyword) ||
                       project.sensors.toLowerCase().includes(keyword) ||
                       project.training.toLowerCase().includes(keyword) ||
                       project.feedback.toLowerCase().includes(keyword) ||
                       project.author.toLowerCase().includes(keyword);
            });
            
            renderCards(filtered);
        }
        
        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                filterCards();
            }
        });
        
        loadProjects();
    </script>
</body>
</html>
